<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2266aa"/>
    </marker>
    <marker id="arrow-indigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#283593"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e65100"/>
    </marker>
    <marker id="arrow-magenta" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7b1fa2"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00838f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="980" height="640" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="490" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Line Topology — Latch + AND Gate Backpressure</text>

  <!-- a0 (pattern AND gate) -->
  <rect x="460" y="45" width="70" height="40" fill="#e8eaf6" stroke="#283593" rx="6" stroke-width="2"/>
  <text x="495" y="62" text-anchor="middle" font-weight="bold" fill="#283593">a0</text>
  <text x="495" y="77" text-anchor="middle" font-size="10" fill="#283593">AND</text>

  <!-- === STREAK BREAK DETECTORS === -->

  <!-- sbd0 -->
  <rect x="260" y="100" width="110" height="40" fill="#ffebee" stroke="#c62828" rx="20" stroke-width="2"/>
  <text x="315" y="115" text-anchor="middle" font-weight="bold" font-size="10" fill="#c62828">sbd0</text>
  <text x="315" y="132" text-anchor="middle" font-size="8" fill="#c62828">Streak Break (1,-1|-1,1)</text>

  <!-- sbd1 -->
  <rect x="630" y="100" width="110" height="40" fill="#e3f2fd" stroke="#1565c0" rx="20" stroke-width="2"/>
  <text x="685" y="115" text-anchor="middle" font-weight="bold" font-size="10" fill="#1565c0">sbd1</text>
  <text x="685" y="132" text-anchor="middle" font-size="8" fill="#1565c0">Streak Break (1,-1|-1,1)</text>

  <!-- === MAIN CHAIN ROW (y=185) === -->

  <!-- InputNode -->
  <rect x="20" y="175" width="80" height="60" fill="#e0e0e0" stroke="#666" rx="6" stroke-width="2"/>
  <text x="60" y="200" text-anchor="middle" font-weight="bold" fill="#333">in0</text>
  <text x="60" y="215" text-anchor="middle" font-size="10" fill="#555">Input</text>
  <text x="60" y="227" text-anchor="middle" font-size="9" fill="#555">[-1,1,1,-1]→</text>

  <!-- readLatch -->
  <rect x="160" y="185" width="70" height="36" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="195" y="200" text-anchor="middle" font-weight="bold" font-size="9" fill="#00838f">readLatch</text>
  <text x="195" y="214" text-anchor="middle" font-size="8" fill="#00838f">LATCH</text>

  <!-- i0 -->
  <rect x="295" y="175" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="340" y="195" text-anchor="middle" font-weight="bold" fill="#e65100">i0</text>
  <text x="340" y="210" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="340" y="225" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- detectorLatch -->
  <rect x="450" y="185" width="70" height="36" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="485" y="200" text-anchor="middle" font-weight="bold" font-size="9" fill="#00838f">detectorLatch</text>
  <text x="485" y="214" text-anchor="middle" font-size="8" fill="#00838f">LATCH</text>

  <!-- i1 -->
  <rect x="585" y="175" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="630" y="195" text-anchor="middle" font-weight="bold" fill="#e65100">i1</text>
  <text x="630" y="210" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="630" y="225" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- === AND GATES (control row, y=285) === -->

  <!-- readGate -->
  <rect x="160" y="285" width="70" height="36" fill="#f3e5f5" stroke="#7b1fa2" rx="6" stroke-width="2"/>
  <text x="195" y="300" text-anchor="middle" font-weight="bold" font-size="9" fill="#7b1fa2">readGate</text>
  <text x="195" y="314" text-anchor="middle" font-size="8" fill="#7b1fa2">AND</text>

  <!-- syncGate -->
  <rect x="450" y="285" width="70" height="36" fill="#f3e5f5" stroke="#7b1fa2" rx="6" stroke-width="2"/>
  <text x="485" y="300" text-anchor="middle" font-weight="bold" font-size="9" fill="#7b1fa2">syncGate</text>
  <text x="485" y="314" text-anchor="middle" font-size="8" fill="#7b1fa2">AND</text>

  <!-- === STREAK DETECTORS === -->

  <!-- sd0 -->
  <rect x="260" y="345" width="100" height="40" fill="#e8f5e9" stroke="#2e7d32" rx="20" stroke-width="2"/>
  <text x="310" y="360" text-anchor="middle" font-weight="bold" font-size="10" fill="#2e7d32">sd0</text>
  <text x="310" y="377" text-anchor="middle" font-size="8" fill="#2e7d32">Streak (-1,-1|1,1)</text>

  <!-- sd1 -->
  <rect x="630" y="345" width="100" height="40" fill="#e8f5e9" stroke="#2e7d32" rx="20" stroke-width="2"/>
  <text x="680" y="360" text-anchor="middle" font-weight="bold" font-size="10" fill="#2e7d32">sd1</text>
  <text x="680" y="377" text-anchor="middle" font-size="8" fill="#2e7d32">Streak (-1,-1|1,1)</text>

  <!-- === CHAIN CONNECTIONS === -->

  <!-- inputToReadLatch -->
  <line x1="100" y1="203" x2="158" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="129" y="196" text-anchor="middle" font-size="7" fill="#555">inputToReadLatch</text>

  <!-- readLatchToI0 -->
  <line x1="230" y1="203" x2="293" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="262" y="196" text-anchor="middle" font-size="7" fill="#333">readLatchToI0</text>

  <!-- i0ToDetectorLatch -->
  <line x1="385" y1="203" x2="448" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="417" y="196" text-anchor="middle" font-size="7" fill="#333">i0ToDetectorLatch</text>

  <!-- detectorLatchToI1 -->
  <line x1="520" y1="203" x2="583" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="552" y="196" text-anchor="middle" font-size="7" fill="#333">detectorLatchToI1</text>

  <!-- === CONTROL CONNECTIONS === -->

  <!-- in0ReadyToReadGate -->
  <line x1="100" y1="225" x2="100" y2="300" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="100" y1="300" x2="158" y2="300" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="75" y="268" text-anchor="middle" font-size="7" fill="#7b1fa2">in0Ready</text>
  <text x="75" y="278" text-anchor="middle" font-size="7" fill="#7b1fa2">ToReadGate</text>

  <!-- readGateToReadLatch -->
  <line x1="195" y1="285" x2="195" y2="223" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="195" y="253" text-anchor="middle" font-size="7" fill="#00838f">readGateTo</text>
  <text x="195" y="263" text-anchor="middle" font-size="7" fill="#00838f">ReadLatch</text>

  <!-- syncGateToDetectorLatch -->
  <line x1="485" y1="285" x2="485" y2="223" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="485" y="258" text-anchor="middle" font-size="7" fill="#00838f">syncGateTo</text>
  <text x="485" y="268" text-anchor="middle" font-size="7" fill="#00838f">DetectorLatch</text>

  <!-- detectorLatchAckToReadGate -->
  <path d="M465,221 L465,265 L175,265 L175,283" fill="none" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="320" y="260" text-anchor="middle" font-size="7" fill="#7b1fa2">detectorLatchAckToReadGate</text>

  <!-- sbd0DoneToSyncGate -->
  <line x1="315" y1="140" x2="315" y2="300" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="315" y1="300" x2="448" y2="300" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="405" y="291" text-anchor="middle" font-size="7" fill="#7b1fa2">sbd0DoneToSyncGate</text>

  <!-- sd0DoneToSyncGate -->
  <line x1="310" y1="345" x2="310" y2="310" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="310" y1="310" x2="448" y2="310" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="382" y="320" text-anchor="middle" font-size="7" fill="#7b1fa2">sd0DoneToSyncGate</text>

  <!-- === EDGE CONNECTIONS === -->

  <!-- i0 -> sbd0 (old value, blue) -->
  <line x1="315" y1="175" x2="290" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="290" y="158" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i0 -> sbd0 (new value, blue) -->
  <line x1="365" y1="175" x2="355" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="372" y="158" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i0 -> sd0 (old value, blue) -->
  <line x1="315" y1="235" x2="290" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="290" y="295" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i0 -> sd0 (new value, blue) -->
  <line x1="365" y1="235" x2="345" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="343" y="295" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i1 -> sbd1 (old value, blue) -->
  <line x1="610" y1="175" x2="655" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="622" y="153" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i1 -> sbd1 (new value, blue) -->
  <line x1="650" y1="175" x2="720" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="697" y="153" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i1 -> sd1 (old value, blue) -->
  <line x1="610" y1="235" x2="655" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="622" y="295" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i1 -> sd1 (new value, blue) -->
  <line x1="650" y1="235" x2="710" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="692" y="295" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- sbd0 -> a0 (indigo) -->
  <line x1="345" y1="100" x2="465" y2="85" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="405" y="88" text-anchor="middle" font-size="8" fill="#283593">0|1</text>

  <!-- sbd1 -> a0 (indigo) -->
  <line x1="655" y1="100" x2="525" y2="85" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="590" y="88" text-anchor="middle" font-size="8" fill="#283593">0|1</text>

  <!-- sd0 -> sd1 (green signal) -->
  <line x1="360" y1="365" x2="628" y2="365" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="494" y="361" text-anchor="middle" font-size="8" fill="#2e7d32">0|1</text>

  <!-- sd1 -> i1 (struct pointer, dashed orange) -->
  <line x1="715" y1="345" x2="670" y2="237" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- sd1 -> sbd1 (struct pointer, dashed orange) -->
  <line x1="700" y1="345" x2="700" y2="140" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- Behavior note -->
  <rect x="20" y="410" width="310" height="55" fill="#fff9c4" stroke="#f9a825" rx="4"/>
  <text x="175" y="428" text-anchor="middle" font-size="10" fill="#f57f17">Latches hold values. AND gates control release.</text>
  <text x="175" y="442" text-anchor="middle" font-size="9" fill="#f57f17">detectorLatch acks readGate after releasing →</text>
  <text x="175" y="456" text-anchor="middle" font-size="9" fill="#f57f17">backpressure: one value per pipeline cycle.</text>

  <!-- === LEGEND === -->
  <rect x="20" y="480" width="560" height="156" fill="#f0f0f0" rx="4" stroke="#ccc"/>

  <text x="85" y="498" text-anchor="start" font-weight="bold" fill="#333" font-size="11">Color</text>
  <text x="210" y="498" text-anchor="start" font-weight="bold" fill="#333" font-size="11">Description</text>
  <line x1="30" y1="503" x2="570" y2="503" stroke="#ccc" stroke-width="1"/>
  <line x1="200" y1="485" x2="200" y2="631" stroke="#ccc" stroke-width="0.5"/>

  <!-- Row 1 -->
  <line x1="40" y1="518" x2="70" y2="518" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="85" y="522" text-anchor="start" fill="#333" font-size="10">Chain</text>
  <text x="210" y="522" text-anchor="start" fill="#666" font-size="10">Data flow along inhibitor chain</text>

  <!-- Row 2 -->
  <line x1="40" y1="534" x2="70" y2="534" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="85" y="538" text-anchor="start" fill="#2266aa" font-size="10">Edge</text>
  <text x="210" y="538" text-anchor="start" fill="#666" font-size="10">Old + new values from inhibitor to detectors</text>

  <!-- Row 3 -->
  <line x1="40" y1="550" x2="70" y2="550" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="85" y="554" text-anchor="start" fill="#283593" font-size="10">AND out</text>
  <text x="210" y="554" text-anchor="start" fill="#666" font-size="10">Streak break outputs to pattern AND gate</text>

  <!-- Row 4 -->
  <line x1="40" y1="566" x2="70" y2="566" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="85" y="570" text-anchor="start" fill="#7b1fa2" font-size="10">Signal</text>
  <text x="210" y="570" text-anchor="start" fill="#666" font-size="10">Ready/done/ack signals to AND gates</text>

  <!-- Row 5 -->
  <line x1="40" y1="582" x2="70" y2="582" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="85" y="586" text-anchor="start" fill="#00838f" font-size="10">Release</text>
  <text x="210" y="586" text-anchor="start" fill="#666" font-size="10">AND gate output triggers latch to release value</text>

  <!-- Row 6 -->
  <line x1="40" y1="598" x2="70" y2="598" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="85" y="602" text-anchor="start" fill="#2e7d32" font-size="10">Streak</text>
  <text x="210" y="602" text-anchor="start" fill="#666" font-size="10">Streak detector signal chain sd0 to sd1</text>

  <!-- Row 7 -->
  <line x1="40" y1="614" x2="70" y2="614" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <text x="85" y="618" text-anchor="start" fill="#e65100" font-size="10">Pointer</text>
  <text x="210" y="618" text-anchor="start" fill="#666" font-size="10">Struct pointer to inhibitor/detector node</text>
</svg>
