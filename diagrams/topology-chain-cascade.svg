<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1380 640" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2266aa"/>
    </marker>
    <marker id="arrow-indigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#283593"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e65100"/>
    </marker>
    <marker id="arrow-magenta" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7b1fa2"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00838f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1380" height="640" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="690" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Line Topology — Latch + AND Gate Backpressure</text>

  <!-- a0 (pattern AND gate) -->
  <rect x="640" y="45" width="70" height="40" fill="#e8eaf6" stroke="#283593" rx="6" stroke-width="2"/>
  <text x="675" y="62" text-anchor="middle" font-weight="bold" fill="#283593">a0</text>
  <text x="675" y="77" text-anchor="middle" font-size="10" fill="#283593">AND</text>

  <!-- === STREAK BREAK DETECTORS === -->

  <!-- sbd0 -->
  <rect x="380" y="55" width="110" height="40" fill="#ffebee" stroke="#c62828" rx="20" stroke-width="2"/>
  <text x="435" y="70" text-anchor="middle" font-weight="bold" font-size="10" fill="#c62828">sbd0</text>
  <text x="435" y="87" text-anchor="middle" font-size="8" fill="#c62828">Streak Break (1,-1|-1,1)</text>

  <!-- sbd1 -->
  <rect x="970" y="55" width="110" height="40" fill="#e3f2fd" stroke="#1565c0" rx="20" stroke-width="2"/>
  <text x="1025" y="70" text-anchor="middle" font-weight="bold" font-size="10" fill="#1565c0">sbd1</text>
  <text x="1025" y="87" text-anchor="middle" font-size="8" fill="#1565c0">Streak Break (1,-1|-1,1)</text>

  <!-- === MAIN CHAIN ROW (y=195) === -->

  <!-- InputNode -->
  <rect x="20" y="195" width="80" height="60" fill="#e0e0e0" stroke="#666" rx="6" stroke-width="2"/>
  <text x="60" y="220" text-anchor="middle" font-weight="bold" fill="#333">in0</text>
  <text x="60" y="235" text-anchor="middle" font-size="10" fill="#555">Input</text>
  <text x="60" y="247" text-anchor="middle" font-size="9" fill="#555">[-1,1,1,-1]→</text>

  <!-- readLatch -->
  <rect x="250" y="205" width="70" height="36" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="285" y="220" text-anchor="middle" font-weight="bold" font-size="9" fill="#00838f">readLatch</text>
  <text x="285" y="234" text-anchor="middle" font-size="8" fill="#00838f">LATCH</text>

  <!-- i0 -->
  <rect x="500" y="195" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="545" y="215" text-anchor="middle" font-weight="bold" fill="#e65100">i0</text>
  <text x="545" y="230" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="545" y="245" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- detectorLatch -->
  <rect x="780" y="195" width="70" height="36" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="815" y="210" text-anchor="middle" font-weight="bold" font-size="9" fill="#00838f">detectorLatch</text>
  <text x="815" y="224" text-anchor="middle" font-size="8" fill="#00838f">LATCH</text>

  <!-- i1 -->
  <rect x="1060" y="195" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="1105" y="215" text-anchor="middle" font-weight="bold" fill="#e65100">i1</text>
  <text x="1105" y="230" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="1105" y="245" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- === AND GATES === -->

  <!-- readGate -->
  <rect x="250" y="305" width="70" height="36" fill="#f3e5f5" stroke="#7b1fa2" rx="6" stroke-width="2"/>
  <text x="285" y="320" text-anchor="middle" font-weight="bold" font-size="9" fill="#7b1fa2">readGate</text>
  <text x="285" y="334" text-anchor="middle" font-size="8" fill="#7b1fa2">AND</text>

  <!-- syncGate -->
  <rect x="600" y="145" width="70" height="36" fill="#f3e5f5" stroke="#7b1fa2" rx="6" stroke-width="2"/>
  <text x="635" y="160" text-anchor="middle" font-weight="bold" font-size="9" fill="#7b1fa2">syncGate</text>
  <text x="635" y="174" text-anchor="middle" font-size="8" fill="#7b1fa2">AND</text>

  <!-- === STREAK DETECTORS === -->

  <!-- sd0 -->
  <rect x="120" y="100" width="100" height="40" fill="#e8f5e9" stroke="#2e7d32" rx="20" stroke-width="2"/>
  <text x="170" y="115" text-anchor="middle" font-weight="bold" font-size="10" fill="#2e7d32">sd0</text>
  <text x="170" y="132" text-anchor="middle" font-size="8" fill="#2e7d32">Streak (-1,-1|1,1)</text>

  <!-- sd1 -->
  <rect x="1230" y="100" width="100" height="40" fill="#e8f5e9" stroke="#2e7d32" rx="20" stroke-width="2"/>
  <text x="1280" y="115" text-anchor="middle" font-weight="bold" font-size="10" fill="#2e7d32">sd1</text>
  <text x="1280" y="132" text-anchor="middle" font-size="8" fill="#2e7d32">Streak (-1,-1|1,1)</text>

  <!-- === CHAIN CONNECTIONS === -->

  <!-- inputToReadLatch -->
  <line x1="100" y1="223" x2="248" y2="223" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="174" y="216" text-anchor="middle" font-size="7" fill="#555">inputToReadLatch</text>

  <!-- readLatchToI0 -->
  <line x1="320" y1="223" x2="498" y2="223" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="409" y="216" text-anchor="middle" font-size="7" fill="#333">readLatchToI0</text>

  <!-- i0ToDetectorLatch -->
  <line x1="590" y1="213" x2="778" y2="213" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="684" y="207" text-anchor="middle" font-size="7" fill="#333">i0ToDetectorLatch</text>

  <!-- detectorLatchToI1 -->
  <line x1="852" y1="213" x2="1058" y2="213" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="955" y="207" text-anchor="middle" font-size="7" fill="#333">detectorLatchToI1</text>

  <!-- === CONTROL CONNECTIONS === -->

  <!-- in0ReadyToReadGate -->
  <line x1="60" y1="255" x2="60" y2="320" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="60" y1="320" x2="248" y2="320" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="40" y="285" text-anchor="middle" font-size="7" fill="#7b1fa2">in0Ready</text>
  <text x="40" y="295" text-anchor="middle" font-size="7" fill="#7b1fa2">ToReadGate</text>

  <!-- readGateToReadLatch -->
  <line x1="285" y1="305" x2="285" y2="243" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="290" y="268" text-anchor="start" font-size="7" fill="#00838f">readGateTo</text>
  <text x="290" y="278" text-anchor="start" font-size="7" fill="#00838f">ReadLatch</text>

  <!-- syncGateToDetectorLatch -->
  <path d="M670,163 L815,163 L815,193" fill="none" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="742" y="156" text-anchor="middle" font-size="7" fill="#00838f">syncGateToDetectorLatch</text>

  <!-- detectorLatchAckToReadGate -->
  <path d="M780,231 L780,290 L265,290 L265,303" fill="none" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="522" y="284" text-anchor="middle" font-size="7" fill="#7b1fa2">detectorLatchAckToReadGate</text>

  <!-- sbd0DoneToSyncGate -->
  <path d="M435,95 L435,135 L635,135 L635,145" fill="none" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="535" y="129" text-anchor="middle" font-size="7" fill="#7b1fa2">sbd0DoneToSyncGate</text>

  <!-- sd0DoneToSyncGate -->
  <path d="M220,120 L220,163 L600,163" fill="none" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="410" y="157" text-anchor="middle" font-size="7" fill="#7b1fa2">sd0DoneToSyncGate</text>

  <!-- === EDGE CONNECTIONS === -->

  <!-- i0 -> sbd0 (old value, blue) -->
  <line x1="510" y1="195" x2="400" y2="95" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="438" y="153" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i0 -> sbd0 (new value, blue) -->
  <line x1="560" y1="195" x2="490" y2="95" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="500" y="78" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i0 -> sd0 (old value, blue) -->
  <line x1="500" y1="195" x2="170" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="310" y="173" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i0 -> sd0 (new value, blue) -->
  <line x1="500" y1="195" x2="205" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="460" y="185" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i1 -> sbd1 (old value, blue) -->
  <line x1="1070" y1="195" x2="1000" y2="95" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="1026" y="152" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i1 -> sbd1 (new value, blue) -->
  <line x1="1130" y1="195" x2="1075" y2="95" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="1118" y="140" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i1 -> sd1 (old value, blue) -->
  <line x1="1150" y1="195" x2="1255" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="1188" y="178" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i1 -> sd1 (new value, blue) -->
  <line x1="1150" y1="195" x2="1295" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="1232" y="178" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- sbd0 -> a0 (indigo) -->
  <line x1="490" y1="75" x2="638" y2="65" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="564" y="68" text-anchor="middle" font-size="8" fill="#283593">0|1</text>

  <!-- sbd1 -> a0 (indigo) -->
  <line x1="970" y1="75" x2="712" y2="65" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="841" y="68" text-anchor="middle" font-size="8" fill="#283593">0|1</text>

  <!-- sd0 -> sd1 (green signal) -->
  <line x1="220" y1="120" x2="1228" y2="120" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="724" y="114" text-anchor="middle" font-size="8" fill="#2e7d32">0|1</text>

  <!-- sd1 -> i1 (struct pointer, dashed orange) -->
  <line x1="1230" y1="140" x2="1152" y2="193" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- sd1 -> sbd1 (struct pointer, dashed orange) -->
  <line x1="1230" y1="120" x2="1082" y2="77" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- Behavior note -->
  <rect x="20" y="410" width="310" height="55" fill="#fff9c4" stroke="#f9a825" rx="4"/>
  <text x="175" y="428" text-anchor="middle" font-size="10" fill="#f57f17">Latches hold values. AND gates control release.</text>
  <text x="175" y="442" text-anchor="middle" font-size="9" fill="#f57f17">detectorLatch acks readGate after releasing →</text>
  <text x="175" y="456" text-anchor="middle" font-size="9" fill="#f57f17">backpressure: one value per pipeline cycle.</text>

  <!-- === LEGEND === -->
  <rect x="20" y="480" width="560" height="156" fill="#f0f0f0" rx="4" stroke="#ccc"/>

  <text x="85" y="498" text-anchor="start" font-weight="bold" fill="#333" font-size="11">Color</text>
  <text x="210" y="498" text-anchor="start" font-weight="bold" fill="#333" font-size="11">Description</text>
  <line x1="30" y1="503" x2="570" y2="503" stroke="#ccc" stroke-width="1"/>
  <line x1="200" y1="485" x2="200" y2="631" stroke="#ccc" stroke-width="0.5"/>

  <!-- Row 1 -->
  <line x1="40" y1="518" x2="70" y2="518" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="85" y="522" text-anchor="start" fill="#333" font-size="10">Chain</text>
  <text x="210" y="522" text-anchor="start" fill="#666" font-size="10">Data flow along inhibitor chain</text>

  <!-- Row 2 -->
  <line x1="40" y1="534" x2="70" y2="534" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="85" y="538" text-anchor="start" fill="#2266aa" font-size="10">Edge</text>
  <text x="210" y="538" text-anchor="start" fill="#666" font-size="10">Old + new values from inhibitor to detectors</text>

  <!-- Row 3 -->
  <line x1="40" y1="550" x2="70" y2="550" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="85" y="554" text-anchor="start" fill="#283593" font-size="10">AND out</text>
  <text x="210" y="554" text-anchor="start" fill="#666" font-size="10">Streak break outputs to pattern AND gate</text>

  <!-- Row 4 -->
  <line x1="40" y1="566" x2="70" y2="566" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="85" y="570" text-anchor="start" fill="#7b1fa2" font-size="10">Signal</text>
  <text x="210" y="570" text-anchor="start" fill="#666" font-size="10">Ready/done/ack signals to AND gates</text>

  <!-- Row 5 -->
  <line x1="40" y1="582" x2="70" y2="582" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="85" y="586" text-anchor="start" fill="#00838f" font-size="10">Release</text>
  <text x="210" y="586" text-anchor="start" fill="#666" font-size="10">AND gate output triggers latch to release value</text>

  <!-- Row 6 -->
  <line x1="40" y1="598" x2="70" y2="598" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="85" y="602" text-anchor="start" fill="#2e7d32" font-size="10">Streak</text>
  <text x="210" y="602" text-anchor="start" fill="#666" font-size="10">Streak detector signal chain sd0 to sd1</text>

  <!-- Row 7 -->
  <line x1="40" y1="614" x2="70" y2="614" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <text x="85" y="618" text-anchor="start" fill="#e65100" font-size="10">Pointer</text>
  <text x="210" y="618" text-anchor="start" fill="#666" font-size="10">Struct pointer to inhibitor/detector node</text>
</svg>
