<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2266aa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Line Topology — ChainInhibitor + CascadeAndGate</text>

  <!-- xor0 (XOR between i0 and i1) -->
  <rect x="210" y="50" width="80" height="40" fill="#ffebee" stroke="#c62828" rx="20" stroke-width="2"/>
  <text x="250" y="68" text-anchor="middle" font-weight="bold" font-size="10" fill="#c62828">xor0</text>
  <text x="250" y="82" text-anchor="middle" font-size="9" fill="#c62828">XOR</text>

  <!-- xor1 (XOR on i1) -->
  <rect x="370" y="50" width="80" height="40" fill="#e3f2fd" stroke="#1565c0" rx="20" stroke-width="2"/>
  <text x="410" y="68" text-anchor="middle" font-weight="bold" font-size="10" fill="#1565c0">xor1</text>
  <text x="410" y="82" text-anchor="middle" font-size="9" fill="#1565c0">XOR</text>

  <!-- InputNode -->
  <rect x="20" y="120" width="80" height="60" fill="#e0e0e0" stroke="#666" rx="6" stroke-width="2"/>
  <text x="60" y="145" text-anchor="middle" font-weight="bold" fill="#333">in0</text>
  <text x="60" y="160" text-anchor="middle" font-size="10" fill="#555">Input</text>
  <text x="60" y="172" text-anchor="middle" font-size="9" fill="#555">[0,1,1,0]→</text>

  <!-- i0 -->
  <rect x="140" y="120" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="185" y="140" text-anchor="middle" font-weight="bold" fill="#e65100">i0</text>
  <text x="185" y="155" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="185" y="170" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- i1 -->
  <rect x="365" y="120" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="410" y="140" text-anchor="middle" font-weight="bold" fill="#e65100">i1</text>
  <text x="410" y="155" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="410" y="170" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- === CONNECTIONS === -->

  <!-- in0 -> i0 -->
  <line x1="100" y1="150" x2="138" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- i0 -> i1 -->
  <line x1="230" y1="150" x2="363" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- i0 <-> xor0 -->
  <line x1="185" y1="120" x2="220" y2="90" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="225" y1="90" x2="190" y2="120" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- i1 <-> xor0 -->
  <line x1="400" y1="120" x2="280" y2="90" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="275" y1="90" x2="395" y2="120" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- i1 <-> xor1 (left side) -->
  <line x1="400" y1="120" x2="395" y2="90" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="405" y1="90" x2="405" y2="120" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- i1 <-> xor1 (right side) -->
  <line x1="420" y1="120" x2="425" y2="90" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="415" y1="90" x2="415" y2="120" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Behavior note -->
  <rect x="20" y="220" width="200" height="55" fill="#fff9c4" stroke="#f9a825" rx="4"/>
  <text x="120" y="238" text-anchor="middle" font-size="10" fill="#f57f17">Chain inhibitor: hold + send</text>
  <text x="120" y="252" text-anchor="middle" font-size="9" fill="#f57f17">Always sends HeldValue (cascade)</text>
  <text x="120" y="266" text-anchor="middle" font-size="9" fill="#f57f17">and new value (recognition)</text>

  <!-- === LEGEND === -->
  <rect x="20" y="300" width="460" height="60" fill="#f0f0f0" rx="4" stroke="#ccc"/>

  <!-- Column headers -->
  <text x="85" y="318" text-anchor="start" font-weight="bold" fill="#333" font-size="11">Color</text>
  <text x="210" y="318" text-anchor="start" font-weight="bold" fill="#333" font-size="11">Description</text>
  <line x1="30" y1="323" x2="470" y2="323" stroke="#ccc" stroke-width="1"/>
  <line x1="200" y1="305" x2="200" y2="355" stroke="#ccc" stroke-width="0.5"/>

  <!-- Row 1 -->
  <line x1="40" y1="338" x2="70" y2="338" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="85" y="342" text-anchor="start" fill="#333" font-size="10">Chain</text>
  <text x="210" y="342" text-anchor="start" fill="#666" font-size="10">Data flow from inhibitor to next</text>

  <!-- Row 2 -->
  <line x1="40" y1="354" x2="70" y2="354" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="85" y="358" text-anchor="start" fill="#2266aa" font-size="10">Edge</text>
  <text x="210" y="358" text-anchor="start" fill="#666" font-size="10">XOR between adjacent inhibitors</text>
</svg>
