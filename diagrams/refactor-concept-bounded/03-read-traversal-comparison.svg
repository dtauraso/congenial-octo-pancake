  <text class="title-text" x="600" y="30" text-anchor="middle" font-weight="600" fill="#222" stroke="none">Read-traversal cost per task — current vs. target</text>
  <text class="subtitle" x="600" y="52" text-anchor="middle" font-weight="400" fill="#555" stroke="none">Each task is one piece of work. Boxes = files you must open to do it. Current layout is the layered version; target is concept-bounded.</text>

