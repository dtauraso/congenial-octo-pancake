    <text class="col-header" x="950" y="90" font-weight="600" fill="#2e7d32" stroke="none">Target — files to open</text>
    <text class="col-header" x="950" y="105" font-weight="300" fill="#666" stroke="none">concept-bounded</text>
  </g>

