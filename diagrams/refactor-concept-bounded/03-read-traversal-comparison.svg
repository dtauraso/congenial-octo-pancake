    .task-label { font-size: 13px; }
    .col-header { font-size: 12px; }
    .file-chip { fill: #ffffff; stroke: #888; stroke-width: 1; }
    .file-chip-current { fill: #ffebee; stroke: #c62828; stroke-width: 1; }
    .file-chip-target { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1; }
    .file-chip-text { font-size: 10px; }
    .count-big { font-size: 22px; }
    .arrow { stroke: #999; stroke-width: 1; fill: none; }
    .row-divider { stroke: #ddd; stroke-width: 1; }
    .note { font-size: 11px; }
  </style>

  <defs>
