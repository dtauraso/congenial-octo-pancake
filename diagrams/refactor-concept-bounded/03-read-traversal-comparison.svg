    <text class="count-big" x="500" y="510" text-anchor="middle" font-weight="600" fill="#c62828" stroke="none">21</text>
    <text class="task-label" x="500" y="530" text-anchor="middle" font-weight="300" fill="#666" stroke="none">layered</text>
    <text class="count-big" x="1000" y="510" text-anchor="middle" font-weight="600" fill="#2e7d32" stroke="none">7</text>
    <text class="task-label" x="1000" y="530" text-anchor="middle" font-weight="300" fill="#666" stroke="none">concept-bounded</text>
