  <g id="explanation-band">
    <rect x="40" y="560" width="1120" height="135" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    <text class="task-label" x="60" y="585" font-weight="600" fill="#f57f17" stroke="none">Why the cost matters for machine readers</text>
    <text class="note" x="60" y="607" font-weight="400" fill="#222" stroke="none">Each file open = tokens spent loading + tokens spent re-deriving the concept from a partial view. The cost compounds: 8 partial views</text>
    <text class="note" x="60" y="625" font-weight="400" fill="#222" stroke="none">in context don't add up to one whole — they fragment attention and inflate the prompt past cache, forcing re-projection on every turn.</text>
    <text class="note" x="60" y="647" font-weight="400" fill="#222" stroke="none">Industry response: better retrieval, bigger context, agentic file-hopping. All compensate for fragmentation; none remove it.</text>
    <text class="note" x="60" y="665" font-weight="400" fill="#222" stroke="none">Concept-bounded response: the file boundary IS the retrieval. The model concept and the file are the same unit. No reconstruction needed.</text>
    <text class="note" x="60" y="683" font-weight="300" fill="#666" stroke="none">3× fewer opens, 100% of the concept per open.</text>
  </g>
