  <desc>
    Comparison of files-to-read per common task, current vs. target.
    Three tasks shown: follow a pulse, add a node kind, reason about
    pause/step/resume. Each row shows the file traversal as a chain
    of boxes. Current layouts force 5–8 file reads; target layouts
    reduce to 2–3.
  </desc>
  <style>
