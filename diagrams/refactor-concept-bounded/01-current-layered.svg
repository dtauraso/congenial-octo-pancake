<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="400">
  <metadata>
    {
      "diagram": "substrate-r-current-layered",
      "concepts": [
        {"id": "node", "label": "Node concept", "files": ["Node.tsx", "node-kinds.tsx", "node-kinds-readgate.tsx", "node-kinds-chain-inhibitor.tsx", "registry.tsx", "RSubstrateNode.tsx", "ManualTakeButton.tsx"]},
        {"id": "wire", "label": "Wire concept", "files": ["Wire.tsx", "wire-phase.ts", "edge-path.ts", "EdgeLabels.tsx", "RSubstrateEdge.tsx"]},
        {"id": "slot", "label": "Slot concept", "files": ["Node.tsx (slot map)", "spec.ts (validation)"]},
        {"id": "axis", "label": "Axis concept", "files": ["pause-axis.ts", "useTickDriver.ts"]},
        {"id": "fork", "label": "Dispatch fork", "files": ["TopologyRoot.tsx (test path)", "RSubstrateNode.tsx (editor)", "RSubstrateEdge.tsx (editor)"]}
      ],
      "duplications": [
        {"file": "RSubstrateNode.tsx", "appears_in": ["node", "fork"]},
        {"file": "RSubstrateEdge.tsx", "appears_in": ["wire", "fork"]},
        {"file": "pause-axis.ts", "appears_in": ["wire", "axis"]},
        {"file": "Node.tsx", "appears_in": ["node", "slot"]}
      ],
      "summary": "16 files, 4 model concepts. Files appear in multiple concept boxes — fragmentation."
    }
  </metadata>
  <desc>
    Current substrate-r/ layout. Each model concept (Node, Wire, Slot, Axis)
    is fragmented across 4–7 files because decomposition follows the layer
    axis (type, geometry, animation, dispatch, registry) instead of the
    concept axis. Some files appear in multiple concept boxes — that's the
    fragmentation tax made visible.
  </desc>
  <style>
    .diagram-bg { fill: #fafafa; }
    .title-text { font-size: 16px; font-weight: 600; fill: #222; }
    .subtitle { font-size: 12px; fill: #555; }
    .concept-box { fill: #ffffff; stroke: #888; stroke-width: 1.5; }
    .concept-box-node { fill: #fff3e0; stroke: #e65100; stroke-width: 1.5; }
    .concept-box-wire { fill: #e0f7fa; stroke: #00838f; stroke-width: 1.5; }
    .concept-box-slot { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1.5; }
    .concept-box-axis { fill: #f3e5f5; stroke: #7b1fa2; stroke-width: 1.5; }
    .concept-box-fork { fill: #ffebee; stroke: #c62828; stroke-width: 1.5; stroke-dasharray: 5 3; }
    .concept-label { font-size: 13px; }
    .file-label { font-size: 11px; }
    .file-count { font-size: 11px; font-style: italic; }
    .note { font-size: 11px; }
  </style>

  <rect class="diagram-bg" x="0" y="0" width="1120" height="720" rx="8"/>
  <text class="title-text" x="560" y="30" text-anchor="middle" font-weight="600" fill="#222" stroke="none">substrate-r/ — current layout (layer axis)</text>
  <text class="subtitle" x="560" y="52" text-anchor="middle" font-weight="400" fill="#555" stroke="none">16 files. Each model concept is scattered across 4–7 files. Files repeated across boxes = fragmentation.</text>

  <g id="box-node" data-role="concept-box" data-concept="node">
    <rect class="concept-box-node" x="40" y="90" width="500" height="260" rx="8"/>
    <text class="concept-label" x="290" y="115" text-anchor="middle" font-weight="600" fill="#e65100" stroke="none">Node concept — 7 files</text>
    <text class="file-label" x="60" y="145" font-weight="400" fill="#222" stroke="none">Node.tsx                              (slot map + rule + render)</text>
    <text class="file-label" x="60" y="165" font-weight="400" fill="#222" stroke="none">node-kinds.tsx                        (kind registry table)</text>
    <text class="file-label" x="60" y="185" font-weight="400" fill="#222" stroke="none">node-kinds-readgate.tsx               (one kind)</text>
    <text class="file-label" x="60" y="205" font-weight="400" fill="#222" stroke="none">node-kinds-chain-inhibitor.tsx        (one kind)</text>
    <text class="file-label" x="60" y="225" font-weight="400" fill="#222" stroke="none">registry.tsx                          (kind lookup)</text>
    <text class="file-label" x="60" y="245" font-weight="400" fill="#c62828" stroke="none">RSubstrateNode.tsx                    (editor dispatch ←)</text>
    <text class="file-label" x="60" y="265" font-weight="400" fill="#222" stroke="none">ManualTakeButton.tsx                  (UI affordance)</text>
    <text class="note" x="60" y="305" font-weight="300" fill="#666" stroke="none">"what is a Node" → read 7 files, reconstruct the concept.</text>
    <text class="note" x="60" y="322" font-weight="300" fill="#666" stroke="none">"add a kind" → edit 3 of them + a test.</text>
  </g>

  <g id="box-wire" data-role="concept-box" data-concept="wire">
    <rect class="concept-box-wire" x="580" y="90" width="500" height="260" rx="8"/>
    <text class="concept-label" x="830" y="115" text-anchor="middle" font-weight="600" fill="#00838f" stroke="none">Wire concept — 5 files</text>
    <text class="file-label" x="600" y="145" font-weight="400" fill="#222" stroke="none">Wire.tsx                              (RAF + in-flight render)</text>
    <text class="file-label" x="600" y="165" font-weight="400" fill="#222" stroke="none">wire-phase.ts                         (phase type)</text>
    <text class="file-label" x="600" y="185" font-weight="400" fill="#222" stroke="none">edge-path.ts                          (geometry, arc length)</text>
    <text class="file-label" x="600" y="205" font-weight="400" fill="#222" stroke="none">EdgeLabels.tsx                        (value label render)</text>
    <text class="file-label" x="600" y="225" font-weight="400" fill="#c62828" stroke="none">RSubstrateEdge.tsx                    (editor dispatch ←)</text>
    <text class="file-label" x="600" y="245" font-weight="400" fill="#7b1fa2" stroke="none">pause-axis.ts                         (read by Wire, also Axis box ↓)</text>
    <text class="note" x="600" y="305" font-weight="300" fill="#666" stroke="none">"how does a pulse travel" → read 5 files.</text>
    <text class="note" x="600" y="322" font-weight="300" fill="#666" stroke="none">Type, geometry, animation, dispatch each in its own file.</text>
  </g>

  <g id="box-slot" data-role="concept-box" data-concept="slot">
    <rect class="concept-box-slot" x="40" y="380" width="320" height="150" rx="8"/>
    <text class="concept-label" x="200" y="405" text-anchor="middle" font-weight="600" fill="#2e7d32" stroke="none">Slot concept — embedded</text>
    <text class="file-label" x="60" y="430" font-weight="400" fill="#e65100" stroke="none">Node.tsx (slot map lives inside ↑)</text>
    <text class="file-label" x="60" y="450" font-weight="400" fill="#222" stroke="none">spec.ts (slot validation)</text>
    <text class="note" x="60" y="485" font-weight="300" fill="#666" stroke="none">Slot has no file of its own — its</text>
    <text class="note" x="60" y="502" font-weight="300" fill="#666" stroke="none">behavior is split between Node and spec.</text>
  </g>

  <g id="box-axis" data-role="concept-box" data-concept="axis">
    <rect class="concept-box-axis" x="380" y="380" width="220" height="150" rx="8"/>
    <text class="concept-label" x="490" y="405" text-anchor="middle" font-weight="600" fill="#7b1fa2" stroke="none">Axis concept — 2 files</text>
    <text class="file-label" x="400" y="430" font-weight="400" fill="#222" stroke="none">pause-axis.ts</text>
    <text class="file-label" x="400" y="450" font-weight="400" fill="#222" stroke="none">useTickDriver.ts</text>
    <text class="note" x="400" y="485" font-weight="300" fill="#666" stroke="none">Driver may duplicate axis;</text>
    <text class="note" x="400" y="502" font-weight="300" fill="#666" stroke="none">needs audit.</text>
  </g>

  <g id="box-fork" data-role="concept-box" data-concept="fork">
    <rect class="concept-box-fork" x="620" y="380" width="460" height="150" rx="8"/>
    <text class="concept-label" x="850" y="405" text-anchor="middle" font-weight="600" fill="#c62828" stroke="none">Dispatch fork — compensating mechanism</text>
    <text class="file-label" x="640" y="430" font-weight="400" fill="#222" stroke="none">TopologyRoot.tsx        (test-path dispatch — one tree)</text>
    <text class="file-label" x="640" y="450" font-weight="400" fill="#222" stroke="none">RSubstrateNode.tsx      (editor-path dispatch — second tree)</text>
    <text class="file-label" x="640" y="470" font-weight="400" fill="#222" stroke="none">RSubstrateEdge.tsx      (editor-path dispatch — second tree)</text>
    <text class="note" x="640" y="500" font-weight="300" fill="#666" stroke="none">CLAUDE.md "substrate-landing rule" exists to keep these two trees synchronized.</text>
    <text class="note" x="640" y="517" font-weight="300" fill="#666" stroke="none">The rule is compensating mechanism — the fork shouldn't exist.</text>
  </g>

  <g id="summary-band">
    <rect x="40" y="565" width="1040" height="120" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    <text class="concept-label" x="60" y="590" font-weight="600" fill="#f57f17" stroke="none">Symptom inventory</text>
    <text class="note" x="60" y="612" font-weight="400" fill="#222" stroke="none">• 16 files for 4 concepts. To reason about one concept you visit 4–7 files and reconstruct it in your head.</text>
    <text class="note" x="60" y="630" font-weight="400" fill="#222" stroke="none">• Files appear in multiple concept boxes (pause-axis, RSubstrateNode, RSubstrateEdge, Node) — the layout lies about distinctions.</text>
    <text class="note" x="60" y="648" font-weight="400" fill="#222" stroke="none">• CLAUDE.md needs a "substrate-landing rule" to compensate for the dispatch fork — rule layer covering a structural mistake.</text>
    <text class="note" x="60" y="666" font-weight="400" fill="#222" stroke="none">• Boundaries are by technical role (type / geometry / animation / dispatch), not by model concept. Wrong axis.</text>
  </g>
</svg>
