<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2266aa"/>
    </marker>
    <marker id="arrow-indigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#283593"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e65100"/>
    </marker>
    <marker id="arrow-magenta" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7b1fa2"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00838f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="650" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Line Topology — After Move Right (Latch + AND Gate Backpressure)</text>

  <!-- a0 (pattern AND gate) -->
  <rect x="500" y="45" width="70" height="40" fill="#e8eaf6" stroke="#283593" rx="6" stroke-width="2"/>
  <text x="535" y="62" text-anchor="middle" font-weight="bold" fill="#283593">a0</text>
  <text x="535" y="77" text-anchor="middle" font-size="10" fill="#283593">AND</text>

  <!-- === STREAK BREAK DETECTORS === -->

  <!-- sbd0 (on i0) -->
  <rect x="260" y="100" width="110" height="40" fill="#ffebee" stroke="#c62828" rx="20" stroke-width="2"/>
  <text x="315" y="115" text-anchor="middle" font-weight="bold" font-size="10" fill="#c62828">sbd0</text>
  <text x="315" y="132" text-anchor="middle" font-size="8" fill="#c62828">Streak Break (1,-1|-1,1)</text>

  <!-- sbd1 (on i1, moved from self-loop) -->
  <rect x="600" y="100" width="110" height="40" fill="#e3f2fd" stroke="#1565c0" rx="20" stroke-width="2"/>
  <text x="655" y="115" text-anchor="middle" font-weight="bold" font-size="10" fill="#1565c0">sbd1</text>
  <text x="655" y="132" text-anchor="middle" font-size="8" fill="#1565c0">Streak Break (1,-1|-1,1)</text>

  <!-- === MAIN CHAIN ROW (y=185) === -->

  <!-- InputNode -->
  <rect x="20" y="175" width="80" height="60" fill="#e0e0e0" stroke="#666" rx="6" stroke-width="2"/>
  <text x="60" y="200" text-anchor="middle" font-weight="bold" fill="#333">in0</text>
  <text x="60" y="215" text-anchor="middle" font-size="10" fill="#555">Input</text>
  <text x="60" y="227" text-anchor="middle" font-size="9" fill="#555">[-1,1,1,-1]→</text>

  <!-- readLatch -->
  <rect x="150" y="185" width="70" height="36" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="185" y="200" text-anchor="middle" font-weight="bold" font-size="9" fill="#00838f">readLatch</text>
  <text x="185" y="214" text-anchor="middle" font-size="8" fill="#00838f">LATCH</text>

  <!-- i0 -->
  <rect x="320" y="175" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="365" y="195" text-anchor="middle" font-weight="bold" fill="#e65100">i0</text>
  <text x="365" y="210" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="365" y="225" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- detectorLatch (between i0 and i1) -->
  <rect x="490" y="185" width="70" height="36" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="525" y="200" text-anchor="middle" font-weight="bold" font-size="9" fill="#00838f">detectorLatch</text>
  <text x="525" y="214" text-anchor="middle" font-size="8" fill="#00838f">LATCH</text>

  <!-- i1 -->
  <rect x="660" y="175" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="705" y="195" text-anchor="middle" font-weight="bold" fill="#e65100">i1</text>
  <text x="705" y="210" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="705" y="225" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- detectorLatch1 (between i1 and i2) -->
  <rect x="830" y="185" width="70" height="36" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="865" y="200" text-anchor="middle" font-weight="bold" font-size="9" fill="#00838f">detectorLatch1</text>
  <text x="865" y="214" text-anchor="middle" font-size="8" fill="#00838f">LATCH</text>

  <!-- i2 -->
  <rect x="970" y="175" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="1015" y="195" text-anchor="middle" font-weight="bold" fill="#e65100">i2</text>
  <text x="1015" y="210" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="1015" y="225" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- === AND GATES (control row, y=285) === -->

  <!-- readGate -->
  <rect x="150" y="285" width="70" height="36" fill="#f3e5f5" stroke="#7b1fa2" rx="6" stroke-width="2"/>
  <text x="185" y="300" text-anchor="middle" font-weight="bold" font-size="9" fill="#7b1fa2">readGate</text>
  <text x="185" y="314" text-anchor="middle" font-size="8" fill="#7b1fa2">AND</text>

  <!-- syncGate (controls detectorLatch) -->
  <rect x="490" y="285" width="70" height="36" fill="#f3e5f5" stroke="#7b1fa2" rx="6" stroke-width="2"/>
  <text x="525" y="300" text-anchor="middle" font-weight="bold" font-size="9" fill="#7b1fa2">syncGate</text>
  <text x="525" y="314" text-anchor="middle" font-size="8" fill="#7b1fa2">AND</text>

  <!-- syncGate1 (controls detectorLatch1) -->
  <rect x="830" y="285" width="70" height="36" fill="#f3e5f5" stroke="#7b1fa2" rx="6" stroke-width="2"/>
  <text x="865" y="300" text-anchor="middle" font-weight="bold" font-size="9" fill="#7b1fa2">syncGate1</text>
  <text x="865" y="314" text-anchor="middle" font-size="8" fill="#7b1fa2">AND</text>

  <!-- === STREAK DETECTORS === -->

  <!-- sd0 (on i0) -->
  <rect x="265" y="345" width="100" height="40" fill="#e8f5e9" stroke="#2e7d32" rx="20" stroke-width="2"/>
  <text x="315" y="360" text-anchor="middle" font-weight="bold" font-size="10" fill="#2e7d32">sd0</text>
  <text x="315" y="377" text-anchor="middle" font-size="8" fill="#2e7d32">Streak (-1,-1|1,1)</text>

  <!-- sd1 (on i1, moved from self-loop) -->
  <rect x="605" y="345" width="100" height="40" fill="#e8f5e9" stroke="#2e7d32" rx="20" stroke-width="2"/>
  <text x="655" y="360" text-anchor="middle" font-weight="bold" font-size="10" fill="#2e7d32">sd1</text>
  <text x="655" y="377" text-anchor="middle" font-size="8" fill="#2e7d32">Streak (-1,-1|1,1)</text>

  <!-- === CHAIN CONNECTIONS === -->

  <!-- inputToReadLatch -->
  <line x1="100" y1="203" x2="148" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="124" y="196" text-anchor="middle" font-size="7" fill="#555">inputToReadLatch</text>

  <!-- readLatchToI0 -->
  <line x1="220" y1="203" x2="318" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="269" y="196" text-anchor="middle" font-size="7" fill="#333">readLatchToI0</text>

  <!-- i0ToDetectorLatch -->
  <line x1="410" y1="203" x2="488" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="449" y="196" text-anchor="middle" font-size="7" fill="#333">i0ToDetectorLatch</text>

  <!-- detectorLatchToI1 -->
  <line x1="560" y1="203" x2="658" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="609" y="196" text-anchor="middle" font-size="7" fill="#333">detectorLatchToI1</text>

  <!-- i1ToDetectorLatch1 -->
  <line x1="750" y1="203" x2="828" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="789" y="196" text-anchor="middle" font-size="7" fill="#333">i1ToDetectorLatch1</text>

  <!-- detectorLatch1ToI2 -->
  <line x1="900" y1="203" x2="968" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="934" y="196" text-anchor="middle" font-size="7" fill="#333">detLatch1ToI2</text>

  <!-- === CONTROL CONNECTIONS === -->

  <!-- in0ReadyToReadGate -->
  <line x1="100" y1="225" x2="100" y2="300" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="100" y1="300" x2="148" y2="300" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="75" y="268" text-anchor="middle" font-size="7" fill="#7b1fa2">in0Ready</text>
  <text x="75" y="278" text-anchor="middle" font-size="7" fill="#7b1fa2">ToReadGate</text>

  <!-- readGateToReadLatch -->
  <line x1="185" y1="285" x2="185" y2="223" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="185" y="253" text-anchor="middle" font-size="7" fill="#00838f">readGateTo</text>
  <text x="185" y="263" text-anchor="middle" font-size="7" fill="#00838f">ReadLatch</text>

  <!-- syncGateToDetectorLatch -->
  <line x1="525" y1="285" x2="525" y2="223" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="525" y="253" text-anchor="middle" font-size="7" fill="#00838f">syncGateTo</text>
  <text x="525" y="263" text-anchor="middle" font-size="7" fill="#00838f">DetectorLatch</text>

  <!-- syncGate1ToDetectorLatch1 -->
  <line x1="865" y1="285" x2="865" y2="223" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="865" y="253" text-anchor="middle" font-size="7" fill="#00838f">syncGate1To</text>
  <text x="865" y="263" text-anchor="middle" font-size="7" fill="#00838f">DetLatch1</text>

  <!-- detectorLatchAckToReadGate -->
  <path d="M505,221 L505,265 L165,265 L165,283" fill="none" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="335" y="260" text-anchor="middle" font-size="7" fill="#7b1fa2">detectorLatchAckToReadGate</text>

  <!-- detectorLatch1AckToSyncGate -->
  <path d="M850,221 L850,273 L508,273 L508,283" fill="none" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="679" y="269" text-anchor="middle" font-size="7" fill="#7b1fa2">detLatch1AckToSyncGate</text>

  <!-- sbd0DoneToSyncGate -->
  <line x1="315" y1="140" x2="315" y2="300" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="315" y1="300" x2="488" y2="300" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="415" y="291" text-anchor="middle" font-size="7" fill="#7b1fa2">sbd0DoneToSyncGate</text>

  <!-- sd0DoneToSyncGate -->
  <line x1="310" y1="345" x2="310" y2="310" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="310" y1="310" x2="488" y2="310" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="410" y="320" text-anchor="middle" font-size="7" fill="#7b1fa2">sd0DoneToSyncGate</text>

  <!-- sbd1DoneToSyncGate1 -->
  <line x1="655" y1="140" x2="655" y2="300" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="655" y1="300" x2="828" y2="300" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="755" y="291" text-anchor="middle" font-size="7" fill="#7b1fa2">sbd1DoneToSyncGate1</text>

  <!-- sd1DoneToSyncGate1 -->
  <line x1="650" y1="345" x2="650" y2="310" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="650" y1="310" x2="828" y2="310" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="750" y="320" text-anchor="middle" font-size="7" fill="#7b1fa2">sd1DoneToSyncGate1</text>

  <!-- === EDGE CONNECTIONS === -->

  <!-- i0 -> sbd0 (old value, blue) -->
  <line x1="340" y1="175" x2="290" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="303" y="158" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i0 -> sbd0 (new value, blue) -->
  <line x1="390" y1="175" x2="350" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="382" y="158" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i0 -> sd0 (old value, blue) -->
  <line x1="340" y1="235" x2="290" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="303" y="295" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i0 -> sd0 (new value, blue) -->
  <line x1="390" y1="235" x2="345" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="380" y="295" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i1 -> sbd1 (old value, blue) -->
  <line x1="680" y1="175" x2="630" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="643" y="158" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i1 -> sbd1 (new value, blue) -->
  <line x1="730" y1="175" x2="690" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="722" y="158" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i1 -> sd1 (old value, blue) -->
  <line x1="680" y1="235" x2="630" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="643" y="295" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i1 -> sd1 (new value, blue) -->
  <line x1="730" y1="235" x2="690" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="722" y="295" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- sbd0 -> a0 (indigo) -->
  <line x1="345" y1="100" x2="505" y2="85" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="425" y="88" text-anchor="middle" font-size="8" fill="#283593">0|1</text>

  <!-- sbd1 -> a0 (indigo) -->
  <line x1="625" y1="100" x2="565" y2="85" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="595" y="88" text-anchor="middle" font-size="8" fill="#283593">0|1</text>

  <!-- sd0 -> sd1 (green signal) -->
  <line x1="365" y1="365" x2="603" y2="365" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="484" y="361" text-anchor="middle" font-size="8" fill="#2e7d32">0|1</text>

  <!-- sd1 -> i1 (struct pointer, dashed orange) -->
  <line x1="690" y1="345" x2="735" y2="237" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- sd1 -> sbd1 (struct pointer, dashed orange) -->
  <line x1="680" y1="345" x2="680" y2="140" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- Behavior note -->
  <rect x="20" y="410" width="310" height="55" fill="#fff9c4" stroke="#f9a825" rx="4"/>
  <text x="175" y="428" text-anchor="middle" font-size="10" fill="#f57f17">Detect contrast first, then propagate.</text>
  <text x="175" y="442" text-anchor="middle" font-size="9" fill="#f57f17">Each detectorLatch acks the upstream gate →</text>
  <text x="175" y="456" text-anchor="middle" font-size="9" fill="#f57f17">backpressure: one value per pipeline cycle.</text>

  <!-- === LEGEND === -->
  <rect x="20" y="480" width="560" height="156" fill="#f0f0f0" rx="4" stroke="#ccc"/>

  <text x="85" y="498" text-anchor="start" font-weight="bold" fill="#333" font-size="11">Color</text>
  <text x="210" y="498" text-anchor="start" font-weight="bold" fill="#333" font-size="11">Description</text>
  <line x1="30" y1="503" x2="570" y2="503" stroke="#ccc" stroke-width="1"/>
  <line x1="200" y1="485" x2="200" y2="631" stroke="#ccc" stroke-width="0.5"/>

  <!-- Row 1 -->
  <line x1="40" y1="518" x2="70" y2="518" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="85" y="522" text-anchor="start" fill="#333" font-size="10">Chain</text>
  <text x="210" y="522" text-anchor="start" fill="#666" font-size="10">Data flow along inhibitor chain</text>

  <!-- Row 2 -->
  <line x1="40" y1="534" x2="70" y2="534" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="85" y="538" text-anchor="start" fill="#2266aa" font-size="10">Edge</text>
  <text x="210" y="538" text-anchor="start" fill="#666" font-size="10">Old + new values from inhibitor to detectors</text>

  <!-- Row 3 -->
  <line x1="40" y1="550" x2="70" y2="550" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="85" y="554" text-anchor="start" fill="#283593" font-size="10">AND out</text>
  <text x="210" y="554" text-anchor="start" fill="#666" font-size="10">Streak break outputs to pattern AND gate</text>

  <!-- Row 4 -->
  <line x1="40" y1="566" x2="70" y2="566" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="85" y="570" text-anchor="start" fill="#7b1fa2" font-size="10">Signal</text>
  <text x="210" y="570" text-anchor="start" fill="#666" font-size="10">Ready/done/ack signals to AND gates</text>

  <!-- Row 5 -->
  <line x1="40" y1="582" x2="70" y2="582" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="85" y="586" text-anchor="start" fill="#00838f" font-size="10">Release</text>
  <text x="210" y="586" text-anchor="start" fill="#666" font-size="10">AND gate output triggers latch to release value</text>

  <!-- Row 6 -->
  <line x1="40" y1="598" x2="70" y2="598" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="85" y="602" text-anchor="start" fill="#2e7d32" font-size="10">Streak</text>
  <text x="210" y="602" text-anchor="start" fill="#666" font-size="10">Streak detector signal chain sd0 to sd1</text>

  <!-- Row 7 -->
  <line x1="40" y1="614" x2="70" y2="614" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <text x="85" y="618" text-anchor="start" fill="#e65100" font-size="10">Pointer</text>
  <text x="210" y="618" text-anchor="start" fill="#666" font-size="10">Struct pointer to inhibitor/detector node</text>
</svg>
