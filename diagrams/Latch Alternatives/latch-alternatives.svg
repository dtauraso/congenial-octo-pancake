<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00838f"/>
    </marker>
    <marker id="arrow-magenta" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7b1fa2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="420" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Latch Alternatives</text>

  <!-- ======== OPTION A: Current (1 goroutine, flag) ======== -->

  <text x="175" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#444">A: One goroutine + flag</text>

  <!-- Single latch box -->
  <rect x="110" y="80" width="130" height="70" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="175" y="100" text-anchor="middle" font-weight="bold" font-size="10" fill="#00838f">latch</text>
  <text x="175" y="115" text-anchor="middle" font-size="9" fill="#00838f">1 goroutine</text>
  <text x="175" y="130" text-anchor="middle" font-size="9" fill="#00838f">HasVal flag</text>
  <text x="175" y="143" text-anchor="middle" font-size="8" fill="#666">flag=F: read | flag=T: release</text>

  <!-- FromIn arrow -->
  <line x1="40" y1="100" x2="108" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="74" y="94" text-anchor="middle" font-size="8" fill="#555">FromIn</text>

  <!-- Release arrow -->
  <line x1="40" y1="135" x2="108" y2="135" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="74" y="129" text-anchor="middle" font-size="8" fill="#7b1fa2">Release</text>

  <!-- ToOut arrow -->
  <line x1="240" y1="105" x2="310" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="99" text-anchor="middle" font-size="8" fill="#555">ToOut</text>

  <!-- ToAck arrow -->
  <line x1="240" y1="130" x2="310" y2="130" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="275" y="124" text-anchor="middle" font-size="8" fill="#7b1fa2">ToAck</text>

  <!-- Pros/Cons -->
  <text x="175" y="175" text-anchor="middle" font-size="9" fill="#2e7d32">+ 1 goroutine, lightweight</text>
  <text x="175" y="188" text-anchor="middle" font-size="9" fill="#c62828">− internal flag controls sequencing</text>

  <!-- ======== OPTION B: Two goroutines, no flag ======== -->

  <text x="525" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#444">B: Two goroutines, no flag</text>

  <!-- Reader box -->
  <rect x="420" y="80" width="90" height="50" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="465" y="100" text-anchor="middle" font-weight="bold" font-size="10" fill="#00838f">reader</text>
  <text x="465" y="115" text-anchor="middle" font-size="9" fill="#00838f">goroutine 1</text>

  <!-- Releaser box -->
  <rect x="560" y="80" width="90" height="50" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="605" y="100" text-anchor="middle" font-weight="bold" font-size="10" fill="#00838f">releaser</text>
  <text x="605" y="115" text-anchor="middle" font-size="9" fill="#00838f">goroutine 2</text>

  <!-- Channel between them -->
  <line x1="510" y1="105" x2="558" y2="105" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="534" y="99" text-anchor="middle" font-size="8" fill="#00838f">chan</text>

  <!-- FromIn arrow -->
  <line x1="370" y1="100" x2="418" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="394" y="94" text-anchor="middle" font-size="8" fill="#555">FromIn</text>

  <!-- Release arrow -->
  <line x1="560" y1="143" x2="560" y2="132" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="585" y="146" text-anchor="middle" font-size="8" fill="#7b1fa2">Release</text>

  <!-- ToOut arrow -->
  <line x1="650" y1="100" x2="680" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="668" y="94" text-anchor="middle" font-size="8" fill="#555">ToOut</text>

  <!-- ToAck arrow -->
  <line x1="650" y1="120" x2="680" y2="120" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="668" y="114" text-anchor="middle" font-size="8" fill="#7b1fa2">ToAck</text>

  <!-- Pros/Cons -->
  <text x="525" y="175" text-anchor="middle" font-size="9" fill="#2e7d32">+ no flag, channel enforces sequencing</text>
  <text x="525" y="188" text-anchor="middle" font-size="9" fill="#c62828">− 2 goroutines per latch, channel overhead</text>

  <!-- ======== COMPARISON ======== -->

  <line x1="20" y1="210" x2="680" y2="210" stroke="#ccc" stroke-width="1"/>

  <text x="350" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#444">Sequencing comparison</text>

  <!-- Option A flow -->
  <text x="175" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#00838f">A: flag flip</text>

  <rect x="50" y="280" width="80" height="30" fill="#e8f5e9" stroke="#2e7d32" rx="4" stroke-width="1.5"/>
  <text x="90" y="299" text-anchor="middle" font-size="9" fill="#2e7d32">read phase</text>

  <text x="145" y="299" text-anchor="middle" font-size="10" fill="#333">→</text>

  <rect x="160" y="280" width="30" height="30" fill="#fff3e0" stroke="#e65100" rx="4" stroke-width="1.5"/>
  <text x="175" y="299" text-anchor="middle" font-size="9" fill="#e65100">flag</text>

  <text x="205" y="299" text-anchor="middle" font-size="10" fill="#333">→</text>

  <rect x="220" y="280" width="80" height="30" fill="#fce4ec" stroke="#c62828" rx="4" stroke-width="1.5"/>
  <text x="260" y="299" text-anchor="middle" font-size="9" fill="#c62828">release phase</text>

  <!-- Option B flow -->
  <text x="525" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#00838f">B: channel block</text>

  <rect x="400" y="280" width="80" height="30" fill="#e8f5e9" stroke="#2e7d32" rx="4" stroke-width="1.5"/>
  <text x="440" y="299" text-anchor="middle" font-size="9" fill="#2e7d32">reader blocks</text>

  <text x="495" y="299" text-anchor="middle" font-size="10" fill="#333">→</text>

  <rect x="510" y="280" width="30" height="30" fill="#e0f7fa" stroke="#00838f" rx="4" stroke-width="1.5"/>
  <text x="525" y="299" text-anchor="middle" font-size="9" fill="#00838f">chan</text>

  <text x="555" y="299" text-anchor="middle" font-size="10" fill="#333">→</text>

  <rect x="570" y="280" width="80" height="30" fill="#fce4ec" stroke="#c62828" rx="4" stroke-width="1.5"/>
  <text x="610" y="299" text-anchor="middle" font-size="9" fill="#c62828">releaser blocks</text>

  <!-- Bottom note -->
  <rect x="50" y="335" width="600" height="70" fill="#f0f0f0" rx="4" stroke="#ccc"/>
  <text x="350" y="355" text-anchor="middle" font-size="10" fill="#444">Both express the same sequencing: "don't read next until current is released."</text>
  <text x="350" y="372" text-anchor="middle" font-size="10" fill="#444">A uses a boolean flag inside one loop. B uses a channel between two loops.</text>
  <text x="350" y="389" text-anchor="middle" font-size="10" fill="#444">The flag is the lightweight version of what the channel does.</text>
</svg>
