<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"
     font-family="ui-sans-serif, system-ui, sans-serif" font-weight="400">

<metadata>
{
  "title": "Polling Model — Proposed",
  "description": "Each node body polls its slot state each RAF step. Node.fill() is a pure state write. Backpressure: body sees wire in-flight, returns without consuming, retries next step.",
  "nodes": [
    { "id": "readgate", "role": "readgate" },
    { "id": "wire-out", "role": "wire" },
    { "id": "i0", "role": "inhibitor" },
    { "id": "raf-loop", "role": "scheduler", "label": "RAF step (shared)" }
  ],
  "edges": [
    { "id": "poll-readgate", "source": "raf-loop", "target": "readgate", "kind": "signal" },
    { "id": "poll-i0", "source": "raf-loop", "target": "i0", "kind": "signal" },
    { "id": "pulse1", "source": "readgate", "target": "wire-out", "kind": "chain", "note": "step N: partial fill, emit 0" },
    { "id": "pulse2-deferred", "source": "readgate", "target": "wire-out", "kind": "chain", "note": "step N+k: wire now empty, emit 1" }
  ]
}
</metadata>

<desc>
raf-loop — shared requestAnimationFrame loop; drives every body's run() each step
readgate — ReadGate body; run() checks slot state, loads wire if canAccept
wire-out — wire readGate.out → i0.in; in-flight blocks next load automatically
i0 — InhibitRightGate; its own poll loop; consumes slot when precondition holds
Backpressure: run() returns if !wire.canAccept; slot stays filled; retried next step
No subscription, no wake, no throw — wire transit time is the natural gate
</desc>

<style>
  .diagram-bg { fill: #fafafa; }
  .title-text { font-size: 16px; font-weight: 700; fill: #222; }
  .shape-readgate { fill: #e8eaf6; stroke: #283593; stroke-width: 2; }
  .shape-inhibitor { fill: #fff3e0; stroke: #e65100; stroke-width: 2; }
  .shape-raf { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }
  .shape-wire { fill: #f5f5f5; stroke: #999; stroke-width: 1.5; stroke-dasharray: 4 3; }
  .shape-wire-inflight { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2; }
  .chain { stroke: #333; stroke-width: 1.5; fill: none; }
  .signal { stroke: #2e7d32; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
  .edge-label { font-size: 11px; }
  .behavior-note-bg { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1; }
  .behavior-note-text { font-size: 11px; fill: #2e7d32; }
  .step-label { font-size: 11px; fill: #555; }
  .blocked-label { font-size: 11px; fill: #e65100; }
  .ok-label { font-size: 11px; fill: #283593; }
</style>

<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#333" />
  </marker>
  <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#2e7d32" />
  </marker>
  <marker id="arrow-indigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#283593" />
  </marker>
  <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#e65100" />
  </marker>
</defs>

<!-- Background -->
<rect class="diagram-bg" x="0" y="0" width="800" height="500" rx="8" />

<!-- Title -->
<text class="title-text" x="400" y="30" text-anchor="middle" font-weight="700" fill="#222" stroke="none">
  Polling Model — Proposed
</text>

<!-- ═══════ RAF LOOP (top center) ═══════ -->
<g id="node-raf-loop" data-role="scheduler">
  <rect class="shape-raf" x="300" y="60" width="200" height="50" rx="6" />
  <text x="400" y="82" text-anchor="middle" font-size="12" font-weight="100" fill="#2e7d32" stroke="none">requestAnimationFrame</text>
  <text x="400" y="98" text-anchor="middle" font-size="10" font-weight="100" fill="#2e7d32" stroke="none">shared step loop</text>
</g>

<!-- RAF poll arrows to nodes -->
<line class="signal" x1="340" y1="110" x2="210" y2="148" marker-end="url(#arrow-green)" />
<text x="258" y="128" text-anchor="middle" font-size="10" font-weight="300" fill="#2e7d32" stroke="none">run()</text>

<line class="signal" x1="460" y1="110" x2="590" y2="148" marker-end="url(#arrow-green)" />
<text x="532" y="128" text-anchor="middle" font-size="10" font-weight="300" fill="#2e7d32" stroke="none">run()</text>

<!-- ═══════ NODES ═══════ -->

<!-- ReadGate -->
<g id="node-readgate" data-role="readgate">
  <rect class="shape-readgate" x="110" y="150" width="140" height="60" rx="6" />
  <text x="180" y="175" text-anchor="middle" font-size="12" font-weight="100" fill="#283593" stroke="none">ReadGate</text>
  <text x="180" y="192" text-anchor="middle" font-size="10" font-weight="100" fill="#283593" stroke="none">AND-of-3 slots</text>
</g>

<!-- Wire (readGate.out → i0.in) — step N: in-flight -->
<g id="node-wire-inflight" data-role="wire">
  <rect class="shape-wire-inflight" x="300" y="163" width="160" height="34" rx="6" />
  <text x="380" y="180" text-anchor="middle" font-size="11" font-weight="100" fill="#1565c0" stroke="none">wire: in-flight(0)</text>
  <text x="380" y="193" text-anchor="middle" font-size="10" font-weight="100" fill="#1565c0" stroke="none">animating…</text>
</g>

<!-- i0 -->
<g id="node-i0" data-role="inhibitor">
  <rect class="shape-inhibitor" x="550" y="150" width="140" height="60" rx="6" />
  <text x="620" y="175" text-anchor="middle" font-size="12" font-weight="100" fill="#e65100" stroke="none">i0</text>
  <text x="620" y="192" text-anchor="middle" font-size="10" font-weight="100" fill="#e65100" stroke="none">InhibitRightGate</text>
</g>

<!-- Edges -->
<line class="chain" x1="250" y1="180" x2="298" y2="180" marker-end="url(#arrow)" />
<line class="chain" x1="460" y1="180" x2="548" y2="180" marker-end="url(#arrow)" />

<!-- ═══════ STEP N ANNOTATION ═══════ -->
<g id="step-n" data-role="annotation">
  <text x="40" y="265" font-size="12" font-weight="700" fill="#283593" stroke="none">Step N</text>

  <!-- ReadGate run() box -->
  <rect x="60" y="275" width="210" height="60" rx="4" fill="#e8eaf6" stroke="#283593" stroke-width="1" />
  <text x="165" y="293" text-anchor="middle" font-size="11" font-weight="100" fill="#283593" stroke="none">ReadGate.run()</text>
  <text x="165" y="308" text-anchor="middle" font-size="10" font-weight="100" fill="#283593" stroke="none">partial fill → emit 0</text>
  <text x="165" y="322" text-anchor="middle" font-size="10" font-weight="100" fill="#283593" stroke="none">wire.canAccept ✓ → wire.load(0)</text>

  <!-- Wire loads -->
  <rect x="310" y="275" width="180" height="60" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="400" y="293" text-anchor="middle" font-size="11" font-weight="100" fill="#1565c0" stroke="none">wire enters in-flight(0)</text>
  <text x="400" y="308" text-anchor="middle" font-size="10" font-weight="100" fill="#1565c0" stroke="none">animating toward i0.in</text>
  <text x="400" y="322" text-anchor="middle" font-size="10" font-weight="100" fill="#1565c0" stroke="none">canAccept = false now</text>

  <line stroke="#283593" stroke-width="1.5" fill="none" x1="270" y1="305" x2="308" y2="305" marker-end="url(#arrow-indigo)" />
</g>

<!-- ═══════ STEP N+1 ANNOTATION ═══════ -->
<g id="step-n1" data-role="annotation">
  <text x="40" y="365" font-size="12" font-weight="700" fill="#e65100" stroke="none">Step N+1</text>

  <!-- ReadGate run() blocked box -->
  <rect x="60" y="375" width="210" height="60" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="165" y="393" text-anchor="middle" font-size="11" font-weight="100" fill="#e65100" stroke="none">ReadGate.run()</text>
  <text x="165" y="408" text-anchor="middle" font-size="10" font-weight="100" fill="#e65100" stroke="none">full fill → would emit 1</text>
  <text x="165" y="422" text-anchor="middle" font-size="10" font-weight="100" fill="#e65100" stroke="none">wire.canAccept ✗ → return</text>

  <!-- Wire still in flight -->
  <rect x="310" y="375" width="180" height="60" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="400" y="393" text-anchor="middle" font-size="11" font-weight="100" fill="#1565c0" stroke="none">wire: still in-flight(0)</text>
  <text x="400" y="408" text-anchor="middle" font-size="10" font-weight="100" fill="#1565c0" stroke="none">slot stays filled</text>
  <text x="400" y="422" text-anchor="middle" font-size="10" font-weight="100" fill="#1565c0" stroke="none">retried next step ✓</text>

  <line stroke="#e65100" stroke-width="1.5" fill="none" stroke-dasharray="4 2" x1="270" y1="405" x2="308" y2="405" marker-end="url(#arrow-orange)" />
</g>

<!-- ═══════ BEHAVIOR NOTE ═══════ -->
<g id="behavior-note" data-role="annotation">
  <rect class="behavior-note-bg" x="40" y="450" width="720" height="36" rx="4" />
  <text x="400" y="466" text-anchor="middle" class="behavior-note-text" font-size="11" font-weight="300" fill="#2e7d32" stroke="none">
    Wire in-flight = natural backpressure. Body checks canAccept; if false, returns and retries next step. No subscription, no throw, no queue.
  </text>
  <text x="400" y="481" text-anchor="middle" class="behavior-note-text" font-size="11" font-weight="300" fill="#2e7d32" stroke="none">
    Node.fill() is a pure slot write. Slot stays filled until body consumes it. Second pulse waits for wire to clear.
  </text>
</g>

</svg>
