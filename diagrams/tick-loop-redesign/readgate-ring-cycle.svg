<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440"
     font-family="ui-sans-serif, system-ui, sans-serif" font-weight="400">

<metadata>
{
  "title": "ReadGate Ring Under Polling Model",
  "description": "ReadGate emits 0 (partial) then 1 (full) per cycle. Under polling, the second emit waits for the wire to clear. No crash.",
  "nodes": [
    { "id": "readgate", "role": "readgate" },
    { "id": "i0", "role": "inhibitor", "label": "i0 (InhibitRightGate)" }
  ],
  "edges": [
    { "id": "readGateOutToI0In", "source": "readgate", "target": "i0", "kind": "chain" }
  ],
  "timing": [
    { "t": 0.0, "event": "slot a fills; step: ReadGate emits 0, wire enters in-flight(0)" },
    { "t": 0.3, "event": "slot b fills; step: ReadGate wants to emit 1, wire still in-flight → blocked" },
    { "t": 0.6, "event": "wire arrives at i0.in, slot fills, wire returns empty" },
    { "t": 0.7, "event": "step: ReadGate sees wire empty, emits 1, wire enters in-flight(1)" },
    { "t": 1.0, "event": "wire arrives at i0.in again; both pulses delivered, no crash" }
  ]
}
</metadata>

<desc>
readgate — ReadGate node; fires Rule 2 (partial→emit 0) then Rule 1 (full→emit 1) per cycle
readGateOutToI0In — single wire; transit time separates the two pulses naturally
i0 — InhibitRightGate; receives pulse 0 then pulse 1 in sequence
Timeline shows: pulse 2 waits at "slot filled" until wire clears after pulse 1
</desc>

<style>
  .diagram-bg { fill: #fafafa; }
  .title-text { font-size: 15px; font-weight: 700; fill: #222; }
  .shape-readgate { fill: #e8eaf6; stroke: #283593; stroke-width: 2; }
  .shape-inhibitor { fill: #fff3e0; stroke: #e65100; stroke-width: 2; }
  .chain { stroke: #333; stroke-width: 1.5; fill: none; }
  .timeline-track { stroke: #ccc; stroke-width: 1.5; fill: none; }
  .pulse-ok { fill: #1565c0; }
  .pulse-wait { fill: #e65100; stroke: #e65100; stroke-width: 1; fill-opacity: 0.3; stroke-dasharray: 3 2; }
  .pulse-ok2 { fill: #283593; }
  .tick-mark { stroke: #aaa; stroke-width: 1; }
  .tick-label { font-size: 10px; fill: #888; }
  .event-label { font-size: 11px; fill: #333; }
  .blocked-label { font-size: 11px; fill: #e65100; }
  .ok-label { font-size: 11px; fill: #283593; }
  .behavior-note-bg { fill: #e8eaf6; stroke: #283593; stroke-width: 1; }
  .behavior-note-text { font-size: 11px; fill: #283593; }
</style>

<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#333" />
  </marker>
  <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#1565c0" />
  </marker>
  <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#e65100" />
  </marker>
  <marker id="arrow-indigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#283593" />
  </marker>
</defs>

<!-- Background -->
<rect class="diagram-bg" x="0" y="0" width="760" height="440" rx="8" />

<!-- Title -->
<text class="title-text" x="380" y="28" text-anchor="middle" font-weight="700" fill="#222" stroke="none">
  ReadGate Ring — Polling Model (No Crash)
</text>

<!-- ═══════ NODES ═══════ -->
<g id="node-readgate" data-role="readgate">
  <rect class="shape-readgate" x="80" y="55" width="130" height="56" rx="6" />
  <text x="145" y="78" text-anchor="middle" font-size="12" font-weight="100" fill="#283593" stroke="none">ReadGate</text>
  <text x="145" y="95" text-anchor="middle" font-size="10" font-weight="100" fill="#283593" stroke="none">AND-of-3 slots</text>
</g>

<g id="node-i0" data-role="inhibitor">
  <rect class="shape-inhibitor" x="560" y="55" width="130" height="56" rx="6" />
  <text x="625" y="78" text-anchor="middle" font-size="12" font-weight="100" fill="#e65100" stroke="none">i0</text>
  <text x="625" y="95" text-anchor="middle" font-size="10" font-weight="100" fill="#e65100" stroke="none">InhibitRightGate</text>
</g>

<!-- wire label -->
<text x="380" y="52" text-anchor="middle" font-size="10" font-weight="300" fill="#888" stroke="none">readGateOutToI0In</text>
<line class="chain" x1="210" y1="83" x2="558" y2="83" marker-end="url(#arrow)" />

<!-- ═══════ TIMELINE ═══════ -->
<!-- Track labels -->
<text x="30" y="162" font-size="10" font-weight="300" fill="#555" stroke="none" text-anchor="middle">ReadGate</text>
<text x="30" y="175" font-size="10" font-weight="300" fill="#555" stroke="none" text-anchor="middle">slots</text>
<text x="30" y="220" font-size="10" font-weight="300" fill="#1565c0" stroke="none" text-anchor="middle">wire</text>
<text x="30" y="233" font-size="10" font-weight="300" fill="#1565c0" stroke="none" text-anchor="middle">state</text>
<text x="30" y="290" font-size="10" font-weight="300" fill="#e65100" stroke="none" text-anchor="middle">i0.in</text>
<text x="30" y="303" font-size="10" font-weight="300" fill="#e65100" stroke="none" text-anchor="middle">slot</text>

<!-- Timeline x-axis -->
<line class="timeline-track" x1="60" y1="355" x2="720" y2="355" />

<!-- Time markers: 0, 1, 2, 3, 4, 5 (each ~130px) -->
<!-- x positions: 80, 210, 340, 470, 600, 720 -->
<line class="tick-mark" x1="80" y1="350" x2="80" y2="360" />
<text x="80" y="372" text-anchor="middle" class="tick-label" font-size="10" fill="#888" stroke="none">t=0</text>

<line class="tick-mark" x1="210" y1="350" x2="210" y2="360" />
<text x="210" y="372" text-anchor="middle" class="tick-label" font-size="10" fill="#888" stroke="none">t=1</text>

<line class="tick-mark" x1="340" y1="350" x2="340" y2="360" />
<text x="340" y="372" text-anchor="middle" class="tick-label" font-size="10" fill="#888" stroke="none">t=2</text>

<line class="tick-mark" x1="470" y1="350" x2="470" y2="360" />
<text x="470" y="372" text-anchor="middle" class="tick-label" font-size="10" fill="#888" stroke="none">t=3</text>

<line class="tick-mark" x1="600" y1="350" x2="600" y2="360" />
<text x="600" y="372" text-anchor="middle" class="tick-label" font-size="10" fill="#888" stroke="none">t=4</text>

<line class="tick-mark" x1="720" y1="350" x2="720" y2="360" />
<text x="720" y="372" text-anchor="middle" class="tick-label" font-size="10" fill="#888" stroke="none">t=5</text>

<!-- ═══ TRACK 1: ReadGate slots (y=150..175) ═══ -->
<!-- partial fill: t0..t1 -->
<rect x="80" y="148" width="130" height="20" rx="3" fill="#e8eaf6" stroke="#283593" stroke-width="1" />
<text x="145" y="162" text-anchor="middle" font-size="9" font-weight="300" fill="#283593" stroke="none">partial filled</text>

<!-- full fill: t1..t3 (waiting for wire to clear before consuming) -->
<rect x="210" y="148" width="260" height="20" rx="3" fill="#c5cae9" stroke="#283593" stroke-width="1.5" />
<text x="340" y="162" text-anchor="middle" font-size="9" font-weight="300" fill="#283593" stroke="none">fully filled — waiting canAccept</text>

<!-- consumed: t3..t4 -->
<rect x="470" y="148" width="130" height="20" rx="3" fill="#e8eaf6" stroke="#283593" stroke-width="1" stroke-dasharray="3 2" />
<text x="535" y="162" text-anchor="middle" font-size="9" font-weight="300" fill="#283593" stroke="none">consumed (emit 1)</text>

<!-- ═══ TRACK 2: wire state (y=210..235) ═══ -->
<!-- empty: t0 -->
<rect x="80" y="208" width="12" height="20" rx="2" fill="#eee" stroke="#aaa" stroke-width="1" />

<!-- in-flight(0): t0..t2 -->
<rect x="92" y="208" width="248" height="20" rx="3" fill="#1565c0" />
<text x="216" y="222" text-anchor="middle" font-size="9" font-weight="300" fill="#fff" stroke="none">in-flight(0)</text>

<!-- empty: t2..t3 -->
<rect x="340" y="208" width="130" height="20" rx="3" fill="#eee" stroke="#aaa" stroke-width="1" />
<text x="405" y="222" text-anchor="middle" font-size="9" font-weight="300" fill="#888" stroke="none">empty → canAccept ✓</text>

<!-- in-flight(1): t3..t5 -->
<rect x="470" y="208" width="250" height="20" rx="3" fill="#283593" />
<text x="595" y="222" text-anchor="middle" font-size="9" font-weight="300" fill="#fff" stroke="none">in-flight(1)</text>

<!-- ═══ TRACK 3: i0.in slot (y=278..303) ═══ -->
<!-- empty: t0..t2 -->
<rect x="80" y="278" width="260" height="20" rx="3" fill="#eee" stroke="#aaa" stroke-width="1" />
<text x="210" y="292" text-anchor="middle" font-size="9" font-weight="300" fill="#888" stroke="none">empty</text>

<!-- filled(0): t2..t3 -->
<rect x="340" y="278" width="130" height="20" rx="3" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
<text x="405" y="292" text-anchor="middle" font-size="9" font-weight="300" fill="#e65100" stroke="none">filled(0)</text>

<!-- empty again: t3..t5 -->
<rect x="470" y="278" width="250" height="20" rx="3" fill="#eee" stroke="#aaa" stroke-width="1" />
<text x="595" y="292" text-anchor="middle" font-size="9" font-weight="300" fill="#888" stroke="none">empty → filled(1) arrives at t=5</text>

<!-- Vertical event lines -->
<line stroke="#283593" stroke-width="1" stroke-dasharray="3 2" x1="80" y1="140" x2="80" y2="350" />
<line stroke="#1565c0" stroke-width="1" stroke-dasharray="3 2" x1="340" y1="140" x2="340" y2="350" />
<line stroke="#e65100" stroke-width="1" stroke-dasharray="3 2" x1="470" y1="140" x2="470" y2="350" />

<!-- Event annotations -->
<text x="83" y="140" font-size="9" font-weight="300" fill="#283593" stroke="none">slot a fills → emit 0</text>
<text x="343" y="140" font-size="9" font-weight="300" fill="#1565c0" stroke="none">wire arrives i0.in</text>
<text x="473" y="140" font-size="9" font-weight="300" fill="#e65100" stroke="none">canAccept ✓ → emit 1</text>

<!-- ═══════ BEHAVIOR NOTE ═══════ -->
<g id="behavior-note" data-role="annotation">
  <rect class="behavior-note-bg" x="60" y="390" width="640" height="36" rx="4" />
  <text x="380" y="406" text-anchor="middle" class="behavior-note-text" font-size="11" font-weight="300" fill="#283593" stroke="none">
    Pulse 2 (emit 1) is delayed, not dropped. ReadGate's slot stays filled; run() retries each step until wire is empty.
  </text>
  <text x="380" y="421" text-anchor="middle" class="behavior-note-text" font-size="11" font-weight="300" fill="#283593" stroke="none">
    Wire transit time is the natural inter-pulse gate. No assertion throw. No queue. No subscription.
  </text>
</g>

</svg>
