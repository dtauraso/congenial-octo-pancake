<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 640" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2266aa"/>
    </marker>
    <marker id="arrow-indigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#283593"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e65100"/>
    </marker>
    <marker id="arrow-magenta" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7b1fa2"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00838f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1060" height="640" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="530" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Line Topology — Split Latch (2 goroutines, no flag)</text>

  <!-- a0 (pattern AND gate) -->
  <rect x="520" y="45" width="70" height="40" fill="#e8eaf6" stroke="#283593" rx="6" stroke-width="2"/>
  <text x="555" y="62" text-anchor="middle" font-weight="bold" fill="#283593">a0</text>
  <text x="555" y="77" text-anchor="middle" font-size="10" fill="#283593">AND</text>

  <!-- === STREAK BREAK DETECTORS === -->

  <!-- sbd0 -->
  <rect x="320" y="100" width="110" height="40" fill="#ffebee" stroke="#c62828" rx="20" stroke-width="2"/>
  <text x="375" y="115" text-anchor="middle" font-weight="bold" font-size="10" fill="#c62828">sbd0</text>
  <text x="375" y="132" text-anchor="middle" font-size="8" fill="#c62828">Streak Break (1,-1|-1,1)</text>

  <!-- sbd1 -->
  <rect x="720" y="100" width="110" height="40" fill="#e3f2fd" stroke="#1565c0" rx="20" stroke-width="2"/>
  <text x="775" y="115" text-anchor="middle" font-weight="bold" font-size="10" fill="#1565c0">sbd1</text>
  <text x="775" y="132" text-anchor="middle" font-size="8" fill="#1565c0">Streak Break (1,-1|-1,1)</text>

  <!-- === MAIN CHAIN ROW (y=185) === -->

  <!-- InputNode -->
  <rect x="20" y="175" width="80" height="60" fill="#e0e0e0" stroke="#666" rx="6" stroke-width="2"/>
  <text x="60" y="200" text-anchor="middle" font-weight="bold" fill="#333">in0</text>
  <text x="60" y="215" text-anchor="middle" font-size="10" fill="#555">Input</text>
  <text x="60" y="227" text-anchor="middle" font-size="9" fill="#555">[-1,1,1,-1]→</text>

  <!-- readReader (goroutine 1 of readLatch) -->
  <rect x="140" y="185" width="60" height="36" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="170" y="199" text-anchor="middle" font-weight="bold" font-size="8" fill="#00838f">read</text>
  <text x="170" y="212" text-anchor="middle" font-size="8" fill="#00838f">Reader</text>

  <!-- readReleaser (goroutine 2 of readLatch) -->
  <rect x="225" y="185" width="60" height="36" fill="#b2ebf2" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="255" y="199" text-anchor="middle" font-weight="bold" font-size="8" fill="#00838f">read</text>
  <text x="255" y="212" text-anchor="middle" font-size="8" fill="#00838f">Releaser</text>

  <!-- i0 -->
  <rect x="350" y="175" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="395" y="195" text-anchor="middle" font-weight="bold" fill="#e65100">i0</text>
  <text x="395" y="210" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="395" y="225" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- syncReader (goroutine 1 of syncLatch) -->
  <rect x="505" y="185" width="60" height="36" fill="#e0f7fa" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="535" y="199" text-anchor="middle" font-weight="bold" font-size="8" fill="#00838f">sync</text>
  <text x="535" y="212" text-anchor="middle" font-size="8" fill="#00838f">Reader</text>

  <!-- syncReleaser (goroutine 2 of syncLatch) -->
  <rect x="590" y="185" width="60" height="36" fill="#b2ebf2" stroke="#00838f" rx="6" stroke-width="2"/>
  <text x="620" y="199" text-anchor="middle" font-weight="bold" font-size="8" fill="#00838f">sync</text>
  <text x="620" y="212" text-anchor="middle" font-size="8" fill="#00838f">Releaser</text>

  <!-- i1 -->
  <rect x="715" y="175" width="90" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="760" y="195" text-anchor="middle" font-weight="bold" fill="#e65100">i1</text>
  <text x="760" y="210" text-anchor="middle" font-size="10" fill="#bf360c">Chain</text>
  <text x="760" y="225" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- === AND GATES (control row, y=285) === -->

  <!-- readGate -->
  <rect x="215" y="285" width="70" height="36" fill="#f3e5f5" stroke="#7b1fa2" rx="6" stroke-width="2"/>
  <text x="250" y="300" text-anchor="middle" font-weight="bold" font-size="9" fill="#7b1fa2">readGate</text>
  <text x="250" y="314" text-anchor="middle" font-size="8" fill="#7b1fa2">AND</text>

  <!-- syncGate -->
  <rect x="580" y="285" width="70" height="36" fill="#f3e5f5" stroke="#7b1fa2" rx="6" stroke-width="2"/>
  <text x="615" y="300" text-anchor="middle" font-weight="bold" font-size="9" fill="#7b1fa2">syncGate</text>
  <text x="615" y="314" text-anchor="middle" font-size="8" fill="#7b1fa2">AND</text>

  <!-- === STREAK DETECTORS === -->

  <!-- sd0 -->
  <rect x="320" y="345" width="100" height="40" fill="#e8f5e9" stroke="#2e7d32" rx="20" stroke-width="2"/>
  <text x="370" y="360" text-anchor="middle" font-weight="bold" font-size="10" fill="#2e7d32">sd0</text>
  <text x="370" y="377" text-anchor="middle" font-size="8" fill="#2e7d32">Streak (-1,-1|1,1)</text>

  <!-- sd1 -->
  <rect x="720" y="345" width="100" height="40" fill="#e8f5e9" stroke="#2e7d32" rx="20" stroke-width="2"/>
  <text x="770" y="360" text-anchor="middle" font-weight="bold" font-size="10" fill="#2e7d32">sd1</text>
  <text x="770" y="377" text-anchor="middle" font-size="8" fill="#2e7d32">Streak (-1,-1|1,1)</text>

  <!-- === CHAIN CONNECTIONS === -->

  <!-- in0 -> readReader -->
  <line x1="100" y1="203" x2="138" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="119" y="196" text-anchor="middle" font-size="7" fill="#555">inputToReader</text>

  <!-- readReader -> readReleaser (internal channel, no flag) -->
  <line x1="200" y1="203" x2="223" y2="203" stroke="#00838f" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="212" y="196" text-anchor="middle" font-size="7" fill="#00838f">chan</text>

  <!-- readReleaser -> i0 -->
  <line x1="285" y1="203" x2="348" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="317" y="196" text-anchor="middle" font-size="7" fill="#333">releaserToI0</text>

  <!-- i0 -> syncReader -->
  <line x1="440" y1="203" x2="503" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="472" y="196" text-anchor="middle" font-size="7" fill="#333">i0ToSyncReader</text>

  <!-- syncReader -> syncReleaser (internal channel, no flag) -->
  <line x1="565" y1="203" x2="588" y2="203" stroke="#00838f" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="577" y="196" text-anchor="middle" font-size="7" fill="#00838f">chan</text>

  <!-- syncReleaser -> i1 -->
  <line x1="650" y1="203" x2="713" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="682" y="196" text-anchor="middle" font-size="7" fill="#333">releaserToI1</text>

  <!-- === CONTROL CONNECTIONS === -->

  <!-- in0 -> readGate (ready) -->
  <line x1="100" y1="225" x2="100" y2="300" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="100" y1="300" x2="213" y2="300" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="75" y="268" text-anchor="middle" font-size="7" fill="#7b1fa2">in0Ready</text>
  <text x="75" y="278" text-anchor="middle" font-size="7" fill="#7b1fa2">ToReadGate</text>

  <!-- readGate -> readReleaser (release) -->
  <line x1="250" y1="285" x2="250" y2="223" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="250" y="258" text-anchor="middle" font-size="7" fill="#00838f">readGateTo</text>
  <text x="250" y="268" text-anchor="middle" font-size="7" fill="#00838f">Releaser</text>

  <!-- syncGate -> syncReleaser (release) -->
  <line x1="615" y1="285" x2="615" y2="223" stroke="#00838f" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="615" y="258" text-anchor="middle" font-size="7" fill="#00838f">syncGateTo</text>
  <text x="615" y="268" text-anchor="middle" font-size="7" fill="#00838f">Releaser</text>

  <!-- syncReleaser -> readGate (ack, backwards) -->
  <path d="M600,221 L600,265 L230,265 L230,283" fill="none" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="415" y="260" text-anchor="middle" font-size="7" fill="#7b1fa2">syncReleaserAckToReadGate</text>

  <!-- sbd0 -> syncGate (done) -->
  <line x1="375" y1="140" x2="375" y2="300" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="375" y1="300" x2="578" y2="300" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="500" y="291" text-anchor="middle" font-size="7" fill="#7b1fa2">sbd0DoneToSyncGate</text>

  <!-- sd0 -> syncGate (done) -->
  <line x1="370" y1="345" x2="370" y2="310" stroke="#7b1fa2" stroke-width="1.5"/>
  <line x1="370" y1="310" x2="578" y2="310" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="500" y="320" text-anchor="middle" font-size="7" fill="#7b1fa2">sd0DoneToSyncGate</text>

  <!-- === EDGE CONNECTIONS === -->

  <!-- i0 -> sbd0 (old) -->
  <line x1="370" y1="175" x2="350" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="347" y="158" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i0 -> sbd0 (new) -->
  <line x1="420" y1="175" x2="415" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="430" y="158" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i0 -> sd0 (old) -->
  <line x1="370" y1="235" x2="345" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="345" y="295" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i0 -> sd0 (new) -->
  <line x1="420" y1="235" x2="400" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="420" y="295" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i1 -> sbd1 (old) -->
  <line x1="740" y1="175" x2="745" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="730" y="153" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i1 -> sbd1 (new) -->
  <line x1="780" y1="175" x2="810" y2="140" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="808" y="153" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- i1 -> sd1 (old) -->
  <line x1="740" y1="235" x2="745" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="730" y="295" text-anchor="middle" font-size="8" fill="#2266aa">old</text>

  <!-- i1 -> sd1 (new) -->
  <line x1="780" y1="235" x2="800" y2="345" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="802" y="295" text-anchor="middle" font-size="8" fill="#2266aa">new</text>

  <!-- sbd0 -> a0 -->
  <line x1="405" y1="100" x2="525" y2="85" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="465" y="88" text-anchor="middle" font-size="8" fill="#283593">0|1</text>

  <!-- sbd1 -> a0 -->
  <line x1="745" y1="100" x2="585" y2="85" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="665" y="88" text-anchor="middle" font-size="8" fill="#283593">0|1</text>

  <!-- sd0 -> sd1 -->
  <line x1="420" y1="365" x2="718" y2="365" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="569" y="361" text-anchor="middle" font-size="8" fill="#2e7d32">0|1</text>

  <!-- sd1 -> i1 (pointer) -->
  <line x1="805" y1="345" x2="800" y2="237" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- sd1 -> sbd1 (pointer) -->
  <line x1="790" y1="345" x2="790" y2="140" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- Behavior note -->
  <rect x="20" y="410" width="340" height="55" fill="#fff9c4" stroke="#f9a825" rx="4"/>
  <text x="190" y="428" text-anchor="middle" font-size="10" fill="#f57f17">Each latch = 2 goroutines (reader + releaser).</text>
  <text x="190" y="442" text-anchor="middle" font-size="9" fill="#f57f17">Internal channel blocks reader until releaser</text>
  <text x="190" y="456" text-anchor="middle" font-size="9" fill="#f57f17">consumes. No flag needed — channel IS the gate.</text>

  <!-- === LEGEND === -->
  <rect x="20" y="480" width="580" height="156" fill="#f0f0f0" rx="4" stroke="#ccc"/>

  <text x="85" y="498" text-anchor="start" font-weight="bold" fill="#333" font-size="11">Color</text>
  <text x="230" y="498" text-anchor="start" font-weight="bold" fill="#333" font-size="11">Description</text>
  <line x1="30" y1="503" x2="590" y2="503" stroke="#ccc" stroke-width="1"/>
  <line x1="220" y1="485" x2="220" y2="631" stroke="#ccc" stroke-width="0.5"/>

  <!-- Row 1 -->
  <line x1="40" y1="518" x2="70" y2="518" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="85" y="522" text-anchor="start" fill="#333" font-size="10">Chain</text>
  <text x="230" y="522" text-anchor="start" fill="#666" font-size="10">Data flow along inhibitor chain</text>

  <!-- Row 2 -->
  <line x1="40" y1="534" x2="70" y2="534" stroke="#00838f" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="85" y="538" text-anchor="start" fill="#00838f" font-size="10">Internal</text>
  <text x="230" y="538" text-anchor="start" fill="#666" font-size="10">Channel between reader/releaser (blocks, no flag)</text>

  <!-- Row 3 -->
  <line x1="40" y1="550" x2="70" y2="550" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="85" y="554" text-anchor="start" fill="#2266aa" font-size="10">Edge</text>
  <text x="230" y="554" text-anchor="start" fill="#666" font-size="10">Old + new values from inhibitor to detectors</text>

  <!-- Row 4 -->
  <line x1="40" y1="566" x2="70" y2="566" stroke="#7b1fa2" stroke-width="1.5" marker-end="url(#arrow-magenta)"/>
  <text x="85" y="570" text-anchor="start" fill="#7b1fa2" font-size="10">Signal</text>
  <text x="230" y="570" text-anchor="start" fill="#666" font-size="10">Ready/done/ack signals to AND gates</text>

  <!-- Row 5 -->
  <line x1="40" y1="582" x2="70" y2="582" stroke="#283593" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <text x="85" y="586" text-anchor="start" fill="#283593" font-size="10">AND out</text>
  <text x="230" y="586" text-anchor="start" fill="#666" font-size="10">Streak break outputs to pattern AND gate</text>

  <!-- Row 6 -->
  <line x1="40" y1="598" x2="70" y2="598" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="85" y="602" text-anchor="start" fill="#2e7d32" font-size="10">Streak</text>
  <text x="230" y="602" text-anchor="start" fill="#666" font-size="10">Streak detector signal chain sd0 to sd1</text>

  <!-- Row 7 -->
  <line x1="40" y1="614" x2="70" y2="614" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <text x="85" y="618" text-anchor="start" fill="#e65100" font-size="10">Pointer</text>
  <text x="230" y="618" text-anchor="start" fill="#666" font-size="10">Struct pointer to inhibitor/detector node</text>
</svg>
