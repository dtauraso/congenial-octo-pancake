<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "05-visual-options-A-vs-B",
    "title": "Q3 — Visual depiction of slots: Option A vs Option B",
    "nodes": [
      {"id": "src-a",  "role": "source",      "half": "left",  "option": "A"},
      {"id": "dst-a",  "role": "destination", "half": "left",  "option": "A"},
      {"id": "src-b",  "role": "source",      "half": "right", "option": "B"},
      {"id": "dst-b",  "role": "destination", "half": "right", "option": "B"}
    ],
    "edges": [
      {"id": "wire-a", "source": "src-a", "target": "dst-a", "kind": "chain"},
      {"id": "wire-b", "source": "src-b", "target": "dst-b", "kind": "chain"}
    ]
  }
  </metadata>

  <desc>
Option A (left)  — slot indicator is a small filled square drawn on the destination node's input port
                   Visual matches new ownership: value parked at node, not wire
Option B (right) — parked circle drawn at the wire's destination end (today's convention)
                   Visual unchanged from current model; contradicts revised ownership
src, dst         — same two-node topology in both halves; only visual rendering of parked state differs
divider          — dashed vertical; separates the two options
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }

    .diagram-bg      { fill: #fafafa; }
    .title-text      { font-size: 16px; font-weight: bold; fill: #222; text-anchor: middle; }

    .shape-input       { fill: #e0e0e0; stroke: #666;    stroke-width: 2; }
    .shape-destination { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }

    .chain { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }

    .node-title    { font-size: 12px; text-anchor: middle; }
    .node-sublabel { font-size: 10px; text-anchor: middle; }

    /* Option A: slot square on node input port */
    .slot-square-a  { fill: #2e7d32; }

    /* Option B: parked circle at wire destination end (old convention) */
    .parked-circle-b { fill: #333; }

    /* labels */
    .option-label      { font-size: 14px; font-weight: bold; text-anchor: middle; }
    .option-label-a    { fill: #1b5e20; }
    .option-label-b    { fill: #b71c1c; }
    .option-sublabel   { font-size: 11px; text-anchor: middle; fill: #555; }
    .pro-label         { font-size: 10px; fill: #1b5e20; }
    .con-label         { font-size: 10px; fill: #b71c1c; }

    .callout-a { fill: none; stroke: #2e7d32; stroke-width: 1; stroke-dasharray: 4 2; }
    .callout-b { fill: none; stroke: #333;    stroke-width: 1; stroke-dasharray: 4 2; }

    .divider { stroke: #aaa; stroke-width: 1; stroke-dasharray: 6 4; fill: none; }

    .lean-note-bg  { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1; }
    .lean-note-text { fill: #1b5e20; font-size: 11px; text-anchor: middle; }

    .legend-bg   { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
    .legend-text { font-size: 11px; fill: #444; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" rx="8" class="diagram-bg"/>

  <!-- Title -->
  <text x="450" y="28" class="title-text" font-weight="bold" fill="#222" stroke="none">Q3 — Visual Depiction of Slots: Option A vs Option B</text>
  <text x="450" y="46" class="node-sublabel" font-weight="300" fill="#555" stroke="none">MODEL-revised-draft.md § Open Question Q3</text>

  <!-- Divider -->
  <line x1="450" y1="56" x2="450" y2="410" class="divider"/>

  <!-- ═══════ LEFT — OPTION A: slot indicator on node ═══════ -->
  <text x="225" y="74" class="option-label option-label-a" font-weight="bold" fill="#1b5e20" stroke="none">Option A (tentative lean)</text>
  <text x="225" y="90" class="option-sublabel" fill="#555" stroke="none">Slot indicator on destination node's input port</text>

  <!-- src-a -->
  <g id="src-a" data-role="source">
    <rect x="50" y="140" width="90" height="50" rx="6" class="shape-input"/>
    <text x="95" y="160" class="node-title" font-weight="100" fill="#333" stroke="none">source</text>
    <text x="95" y="176" class="node-sublabel" font-weight="100" fill="#555" stroke="none">calls fill()</text>
  </g>

  <!-- wire-a — transient, no parked dot -->
  <g id="edge-wire-a" data-role="edge" class="chain">
    <line x1="140" y1="165" x2="296" y2="165" class="chain"/>
  </g>
  <text x="218" y="155" class="node-sublabel" font-weight="300" fill="#888" stroke="none">empty after arrival</text>

  <!-- dst-a -->
  <g id="dst-a" data-role="destination">
    <rect x="300" y="140" width="110" height="50" rx="6" class="shape-destination"/>
    <text x="355" y="160" class="node-title" font-weight="100" fill="#2e7d32" stroke="none">destination</text>
    <text x="355" y="176" class="node-sublabel" font-weight="100" fill="#555" stroke="none">owns slot map</text>
  </g>

  <!-- Slot square on dst-a input port (Option A visual) -->
  <g id="slot-sq-a" data-role="slot-indicator">
    <rect x="292" y="158" width="12" height="12" rx="2" class="slot-square-a"/>
  </g>

  <!-- Callout line and label for slot square -->
  <line x1="298" y1="158" x2="298" y2="110" stroke="#2e7d32" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <rect x="196" y="92" width="206" height="18" rx="3" style="fill:#e8f5e9;stroke:#2e7d32;stroke-width:1;"/>
  <text x="299" y="105" class="node-sublabel" font-weight="300" fill="#1b5e20" stroke="none">slot square on node input port</text>

  <!-- Pros -->
  <text x="55" y="215" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">✓ Visual matches new ownership</text>
  <text x="55" y="229" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">✓ in-flight vs parked visually distinct</text>
  <text x="55" y="243" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">✓ Model legible at a glance</text>
  <!-- Cons -->
  <text x="55" y="263" class="con-label" font-weight="300" fill="#b71c1c" stroke="none">✗ Node body busier</text>
  <text x="55" y="277" class="con-label" font-weight="300" fill="#b71c1c" stroke="none">✗ Diagram style guide needs update</text>

  <!-- ═══════ RIGHT — OPTION B: parked circle on wire ═══════ -->
  <text x="675" y="74" class="option-label option-label-b" font-weight="bold" fill="#b71c1c" stroke="none">Option B</text>
  <text x="675" y="90" class="option-sublabel" fill="#555" stroke="none">Parked circle at wire's destination end (today)</text>

  <!-- src-b -->
  <g id="src-b" data-role="source">
    <rect x="500" y="140" width="90" height="50" rx="6" class="shape-input"/>
    <text x="545" y="160" class="node-title" font-weight="100" fill="#333" stroke="none">source</text>
    <text x="545" y="176" class="node-sublabel" font-weight="100" fill="#555" stroke="none">calls fill()</text>
  </g>

  <!-- wire-b — with parked circle near destination (old visual convention) -->
  <g id="edge-wire-b" data-role="edge" class="chain">
    <line x1="590" y1="165" x2="756" y2="165" class="chain"/>
  </g>

  <!-- Parked circle at destination end of wire (Option B visual) -->
  <g id="parked-circle-b" data-role="parked-value">
    <circle cx="740" cy="165" r="9" class="parked-circle-b"/>
  </g>

  <!-- Callout for parked circle -->
  <line x1="740" y1="155" x2="740" y2="110" stroke="#333" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <rect x="638" y="92" width="210" height="18" rx="3" style="fill:#ffebee;stroke:#b71c1c;stroke-width:1;"/>
  <text x="743" y="105" class="node-sublabel" font-weight="300" fill="#b71c1c" stroke="none">parked dot near wire end (old)</text>

  <!-- dst-b -->
  <g id="dst-b" data-role="destination">
    <rect x="760" y="140" width="110" height="50" rx="6" class="shape-destination"/>
    <text x="815" y="160" class="node-title" font-weight="100" fill="#2e7d32" stroke="none">destination</text>
    <text x="815" y="176" class="node-sublabel" font-weight="100" fill="#555" stroke="none">owns slot map</text>
  </g>

  <!-- Pros -->
  <text x="505" y="215" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">✓ Minimal visual disruption</text>
  <text x="505" y="229" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">✓ User keeps existing mental picture</text>
  <text x="505" y="243" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">✓ No diagram updates needed</text>
  <!-- Cons -->
  <text x="505" y="263" class="con-label" font-weight="300" fill="#b71c1c" stroke="none">✗ Visual contradicts the model</text>
  <text x="505" y="277" class="con-label" font-weight="300" fill="#b71c1c" stroke="none">✗ Dot looks like it's on the wire</text>
  <text x="505" y="291" class="con-label" font-weight="300" fill="#b71c1c" stroke="none">✗ Future readers re-derive wrong ownership</text>

  <!-- Lean annotation -->
  <rect x="100" y="310" width="700" height="44" rx="4" class="lean-note-bg"/>
  <text x="450" y="328" class="lean-note-text" font-weight="300" fill="#1b5e20" stroke="none">Tentative lean: Option A. The whole motivation for the model change is that fusing concerns</text>
  <text x="450" y="344" class="lean-note-text" font-weight="300" fill="#1b5e20" stroke="none">causes confusion; preserving a visual that fuses them again undermines the point. (MODEL-revised-draft.md)</text>

  <!-- ═══════ LEGEND ═══════ -->
  <g id="legend" data-role="legend">
    <rect x="20" y="370" width="860" height="90" rx="4" class="legend-bg"/>
    <text x="40" y="388" class="legend-text" font-weight="bold" fill="#333" stroke="none">Legend:</text>
    <!-- slot square sample -->
    <rect x="100" y="378" width="12" height="12" rx="2" fill="#2e7d32"/>
    <text x="120" y="388" class="legend-text" fill="#1b5e20" stroke="none">Option A slot square — small filled rect on node input port; color = slot phase</text>
    <!-- parked dot sample -->
    <circle cx="104" cy="408" r="7" fill="#333"/>
    <text x="120" y="412" class="legend-text" fill="#b71c1c" stroke="none">Option B parked circle — small filled circle at wire's destination end (today)</text>
    <!-- phase colors -->
    <rect x="100" y="423" width="12" height="12" rx="2" fill="#2e7d32"/>
    <text x="120" y="433" class="legend-text" fill="#444" stroke="none">green = filled(v)</text>
    <rect x="220" y="423" width="12" height="12" rx="2" fill="#a5d6a7"/>
    <text x="240" y="433" class="legend-text" fill="#444" stroke="none">light green = consumed</text>
    <rect x="360" y="423" width="12" height="12" rx="2" fill="#ccc"/>
    <text x="380" y="433" class="legend-text" fill="#444" stroke="none">gray = empty</text>
    <text x="460" y="433" class="legend-text" fill="#555" stroke="none">Source (#e0e0e0/#666). Destination (#e8f5e9/#2e7d32) — new color this series.</text>
  </g>

</svg>
