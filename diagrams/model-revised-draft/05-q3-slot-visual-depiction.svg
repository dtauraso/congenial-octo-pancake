<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "05-q3-slot-visual-depiction",
    "title": "Q3 — Slot visualized on the destination node (resolved)",
    "nodes": [
      {"id": "src",  "role": "source"},
      {"id": "dst",  "role": "destination"}
    ],
    "edges": [
      {"id": "wire-src-dst", "source": "src", "target": "dst", "kind": "wire", "boundSlot": "s0"}
    ],
    "phases": [
      {"id": "empty",     "wire": "empty",        "slot": "empty"},
      {"id": "in-flight", "wire": "in-flight(v)", "slot": "empty"},
      {"id": "filled",    "wire": "empty",        "slot": "filled(v)"}
    ]
  }
  </metadata>

  <desc>
src         — source node
dst         — destination node; owns its slot
slot        — small filled square on dst's input port; renders empty / filled(v)
wire        — line between src and dst; carries an in-flight glyph mid-wire when transporting
phase row   — three snapshots showing empty, in-flight, and filled phases under the resolved visual
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }
    .diagram-bg      { fill: #fafafa; }
    .title-text      { font-size: 16px; font-weight: bold; fill: #222; text-anchor: middle; }
    .shape-node      { fill: #fff8e1; stroke: #e65100; stroke-width: 2; }
    .slot-empty      { fill: #ffffff; stroke: #2e7d32; stroke-width: 1.5; }
    .slot-filled     { fill: #c8e6c9; stroke: #2e7d32; stroke-width: 1.5; }
    .wire            { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrow-gray); }
    .pulse           { fill: #2e7d32; stroke: #1b5e20; stroke-width: 1; }
    .phase-divider   { stroke: #ccc; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
    .legend-bg       { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
    .note-bg         { fill: #fff9c4; stroke: #f9a825; stroke-width: 1; }
  </style>

  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
  </defs>

  <rect width="900" height="460" rx="8" class="diagram-bg"/>

  <text x="450" y="30" class="title-text" font-weight="bold" fill="#222" stroke="none">Q3 — Slot visualized on the destination node (resolved)</text>
  <text x="450" y="48" font-size="11" text-anchor="middle" font-weight="300" fill="#555" stroke="none">Parked value sits on the dst's input port. Wire renders only in-flight motion and is empty after arrival.</text>

  <!-- ═══════ Phase 1: empty ═══════ -->
  <text x="150" y="90" font-size="13" text-anchor="middle" font-weight="600" fill="#333" stroke="none">phase 1 — empty</text>
  <text x="150" y="106" font-size="10" text-anchor="middle" font-weight="300" fill="#666" stroke="none">wire: empty · slot: empty</text>

  <g id="src-1" data-role="source">
    <rect x="60" y="140" width="70" height="40" rx="6" class="shape-node"/>
    <text x="95" y="164" font-size="12" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">src</text>
  </g>
  <line x1="130" y1="160" x2="190" y2="160" class="wire"/>
  <g id="dst-1" data-role="destination">
    <rect x="200" y="140" width="70" height="40" rx="6" class="shape-node"/>
    <text x="235" y="164" font-size="12" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">dst</text>
    <rect x="204" y="148" width="14" height="14" rx="2" class="slot-empty"/>
    <text x="211" y="159" font-size="8" text-anchor="middle" font-weight="600" fill="#2e7d32" stroke="none">s0</text>
  </g>

  <line x1="290" y1="90" x2="290" y2="220" class="phase-divider"/>

  <!-- ═══════ Phase 2: in-flight ═══════ -->
  <text x="450" y="90" font-size="13" text-anchor="middle" font-weight="600" fill="#333" stroke="none">phase 2 — in-flight(v)</text>
  <text x="450" y="106" font-size="10" text-anchor="middle" font-weight="300" fill="#666" stroke="none">wire: in-flight(v) · slot: empty</text>

  <g id="src-2" data-role="source">
    <rect x="360" y="140" width="70" height="40" rx="6" class="shape-node"/>
    <text x="395" y="164" font-size="12" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">src</text>
  </g>
  <line x1="430" y1="160" x2="490" y2="160" class="wire"/>
  <circle cx="460" cy="160" r="7" class="pulse"/>
  <text x="460" y="143" font-size="9" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">v</text>
  <g id="dst-2" data-role="destination">
    <rect x="500" y="140" width="70" height="40" rx="6" class="shape-node"/>
    <text x="535" y="164" font-size="12" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">dst</text>
    <rect x="504" y="148" width="14" height="14" rx="2" class="slot-empty"/>
    <text x="511" y="159" font-size="8" text-anchor="middle" font-weight="600" fill="#2e7d32" stroke="none">s0</text>
  </g>

  <line x1="590" y1="90" x2="590" y2="220" class="phase-divider"/>

  <!-- ═══════ Phase 3: filled ═══════ -->
  <text x="750" y="90" font-size="13" text-anchor="middle" font-weight="600" fill="#333" stroke="none">phase 3 — filled(v)</text>
  <text x="750" y="106" font-size="10" text-anchor="middle" font-weight="300" fill="#666" stroke="none">wire: empty · slot: filled(v)</text>

  <g id="src-3" data-role="source">
    <rect x="660" y="140" width="70" height="40" rx="6" class="shape-node"/>
    <text x="695" y="164" font-size="12" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">src</text>
  </g>
  <line x1="730" y1="160" x2="790" y2="160" class="wire"/>
  <g id="dst-3" data-role="destination">
    <rect x="800" y="140" width="70" height="40" rx="6" class="shape-node"/>
    <text x="835" y="164" font-size="12" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">dst</text>
    <rect x="804" y="148" width="14" height="14" rx="2" class="slot-filled"/>
    <text x="811" y="159" font-size="8" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">v</text>
  </g>

  <!-- ═══════ Resolution note ═══════ -->
  <rect x="60" y="260" width="780" height="120" rx="6" class="note-bg"/>
  <text x="450" y="282" font-size="13" text-anchor="middle" font-weight="600" fill="#f57f17" stroke="none">Resolution — slot visualized on the destination node</text>
  <text x="450" y="304" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">The parked value lives on the destination node's input port, where the model says it lives. The wire shows only in-flight</text>
  <text x="450" y="320" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">motion: a pulse glyph mid-wire during transport, empty before and after. In-flight (wire) and parked (slot) are now</text>
  <text x="450" y="336" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">visually distinct, matching the ownership split in the revised model.</text>
  <text x="450" y="360" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">Cost: node bodies are marginally busier; the SVG style guide and reference SVGs need updating to match the new convention.</text>

  <!-- Legend -->
  <g id="legend" data-role="legend">
    <rect x="20" y="400" width="860" height="48" rx="4" class="legend-bg"/>
    <rect x="40" y="412" width="14" height="14" rx="2" class="slot-empty"/>
    <text x="64" y="423" font-size="11" font-weight="300" fill="#2e7d32" stroke="none">slot empty</text>
    <rect x="180" y="412" width="14" height="14" rx="2" class="slot-filled"/>
    <text x="204" y="423" font-size="11" font-weight="300" fill="#1b5e20" stroke="none">slot filled(v)</text>
    <circle cx="340" cy="419" r="7" class="pulse"/>
    <text x="354" y="423" font-size="11" font-weight="300" fill="#1b5e20" stroke="none">in-flight pulse on wire</text>
    <line x1="520" y1="419" x2="560" y2="419" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)"/>
    <text x="568" y="423" font-size="11" font-weight="300" fill="#555" stroke="none">wire (renders only when in-flight)</text>
    <text x="40" y="442" font-size="11" font-weight="300" fill="#444" stroke="none">node (kind label inside) — dst owns its slot at its input port</text>
  </g>

</svg>
