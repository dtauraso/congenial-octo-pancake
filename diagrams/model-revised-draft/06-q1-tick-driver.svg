<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "06-q1-tick-driver",
    "title": "Q1 — Tick-driver shape: self-scheduling nodes + global play/pause gate",
    "nodes": [
      {"id": "gate",   "role": "play-pause"},
      {"id": "node-0", "role": "node", "index": 0},
      {"id": "node-1", "role": "node", "index": 1},
      {"id": "node-2", "role": "node", "index": 2}
    ],
    "edges": [
      {"id": "self-0",     "source": "node-0", "target": "node-0", "kind": "self-loop"},
      {"id": "self-1",     "source": "node-1", "target": "node-1", "kind": "self-loop"},
      {"id": "self-2",     "source": "node-2", "target": "node-2", "kind": "self-loop"},
      {"id": "gate-to-0",  "source": "gate",   "target": "node-0", "kind": "gate"},
      {"id": "gate-to-1",  "source": "gate",   "target": "node-1", "kind": "gate"},
      {"id": "gate-to-2",  "source": "gate",   "target": "node-2", "kind": "gate"}
    ]
  }
  </metadata>

  <desc>
gate         — global play/pause master switch; halts or starts every node at once
node-0..2    — nodes with local slot subscriptions; fire reactively when slot precondition holds
self-loop    — each node's own subscription to its slot map
gate-edge    — gate suspends/resumes all node subscriptions; orthogonal to tick semantics
tick         — one cohort of simultaneously-firing edges (defined in diagram 13)
step         — cohort N released by the gate (mechanism in diagram 14)
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }

    .diagram-bg      { fill: #fafafa; }
    .title-text      { font-size: 16px; font-weight: bold; fill: #222; text-anchor: middle; }

    .shape-gate      { fill: #ede7f6; stroke: #4527a0; stroke-width: 2; }
    .shape-node      { fill: #fff3e0; stroke: #e65100; stroke-width: 2; }

    .self-loop       { stroke: #00838f; stroke-width: 1.5; fill: none; marker-end: url(#arrow-teal); stroke-dasharray: 4 2; }
    .gate-edge       { stroke: #4527a0; stroke-width: 1.5; fill: none; marker-end: url(#arrow-purple); stroke-dasharray: 2 3; }

    .node-title      { font-size: 12px; text-anchor: middle; }
    .node-sublabel   { font-size: 10px; text-anchor: middle; }

    .resolution-label{ font-size: 14px; font-weight: bold; text-anchor: middle; fill: #4527a0; }
    .resolution-sub  { font-size: 11px; text-anchor: middle; fill: #555; }

    .pro-label       { font-size: 11px; fill: #1b5e20; }
    .con-label       { font-size: 11px; fill: #b71c1c; }

    .resolution-bg   { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1; }
    .resolution-text { fill: #1b5e20; font-size: 11px; text-anchor: middle; }

    .legend-bg       { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
    .legend-text     { font-size: 11px; fill: #444; }
  </style>

  <defs>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00838f"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4527a0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="8" class="diagram-bg"/>

  <!-- Title -->
  <text x="450" y="28" class="title-text" font-weight="bold" fill="#222" stroke="none">Q1 — Tick-Driver: self-scheduling nodes + global play/pause gate</text>
  <text x="450" y="46" class="node-sublabel" font-weight="300" fill="#555" stroke="none">MODEL-revised-draft.md § Q1</text>

  <!-- Resolution label -->
  <text x="450" y="78" class="resolution-label" font-weight="bold" fill="#4527a0" stroke="none">Resolution</text>
  <text x="450" y="94" class="resolution-sub" fill="#555" stroke="none">No central walker. Nodes fire reactively; gate is the only global mechanism.</text>

  <!-- Global gate -->
  <g id="gate" data-role="play-pause">
    <rect x="355" y="115" width="190" height="40" rx="6" class="shape-gate"/>
    <text x="450" y="131" class="node-title" font-weight="100" fill="#4527a0" stroke="none">▶ / ❚❚  global gate</text>
    <text x="450" y="146" class="node-sublabel" font-weight="100" fill="#555" stroke="none">halts/starts all nodes; releases cohort N</text>
  </g>

  <!-- Nodes -->
  <g id="node-0" data-role="node" data-index="0">
    <rect x="275" y="210" width="90" height="40" rx="6" class="shape-node"/>
    <text x="320" y="226" class="node-title" font-weight="100" fill="#e65100" stroke="none">node 0</text>
    <text x="320" y="240" class="node-sublabel" font-weight="100" fill="#555" stroke="none">slot sub</text>
  </g>
  <g id="node-1" data-role="node" data-index="1">
    <rect x="405" y="210" width="90" height="40" rx="6" class="shape-node"/>
    <text x="450" y="226" class="node-title" font-weight="100" fill="#e65100" stroke="none">node 1</text>
    <text x="450" y="240" class="node-sublabel" font-weight="100" fill="#555" stroke="none">slot sub</text>
  </g>
  <g id="node-2" data-role="node" data-index="2">
    <rect x="535" y="210" width="90" height="40" rx="6" class="shape-node"/>
    <text x="580" y="226" class="node-title" font-weight="100" fill="#e65100" stroke="none">node 2</text>
    <text x="580" y="240" class="node-sublabel" font-weight="100" fill="#555" stroke="none">slot sub</text>
  </g>

  <!-- Gate edges -->
  <g id="edge-gate-to-0" data-role="edge" class="gate-edge">
    <path d="M405,155 L320,210" class="gate-edge"/>
  </g>
  <g id="edge-gate-to-1" data-role="edge" class="gate-edge">
    <line x1="450" y1="155" x2="450" y2="210" class="gate-edge"/>
  </g>
  <g id="edge-gate-to-2" data-role="edge" class="gate-edge">
    <path d="M495,155 L580,210" class="gate-edge"/>
  </g>

  <text x="365" y="190" class="node-sublabel" font-weight="300" fill="#4527a0" stroke="none">gate</text>
  <text x="462" y="188" class="node-sublabel" font-weight="300" fill="#4527a0" stroke="none">gate</text>
  <text x="542" y="188" class="node-sublabel" font-weight="300" fill="#4527a0" stroke="none">gate</text>

  <!-- Self-loops on nodes -->
  <g id="edge-self-0" data-role="edge" class="self-loop">
    <path d="M320,210 C320,188 365,188 365,210" class="self-loop"/>
  </g>
  <g id="edge-self-1" data-role="edge" class="self-loop">
    <path d="M450,210 C450,188 495,188 495,210" class="self-loop"/>
  </g>
  <g id="edge-self-2" data-role="edge" class="self-loop">
    <path d="M580,210 C580,188 625,188 625,210" class="self-loop"/>
  </g>

  <!-- Properties / Cost panel -->
  <text x="450" y="290" class="resolution-sub" fill="#444" font-weight="600" stroke="none">Properties</text>

  <text x="80"  y="312" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">&#x2713; Nothing happens when nothing changes — matches "topology IS the logic"</text>
  <text x="80"  y="328" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">&#x2713; Halt and step recovered cheaply via the master switch</text>
  <text x="80"  y="344" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">&#x2713; Ticks intrinsic to activity (edge cohorts — diagram 13); not imposed by a walker</text>
  <text x="80"  y="360" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">&#x2713; Cohort assigned at wire-time by the regular loop — no setup pass (diagram 14)</text>
  <text x="80"  y="376" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">&#x2713; Random-access stepping: gate releases cohort N only; cohorts &#x2260; N stay inert</text>
  <text x="80"  y="392" class="pro-label" font-weight="300" fill="#1b5e20" stroke="none">&#x2713; Within a cohort, wires have no causal dependency on each other — no runaway cascade</text>

  <text x="80"  y="414" class="con-label" font-weight="300" fill="#b71c1c" stroke="none">&#x2717; Implementation surface area: registry + gate plumbing</text>

  <!-- ═══════ LEGEND ═══════ -->
  <g id="legend" data-role="legend">
    <rect x="20" y="438" width="860" height="50" rx="4" class="legend-bg"/>
    <text x="40" y="456" class="legend-text" font-weight="bold" fill="#333" stroke="none">Legend:</text>
    <line x1="100" y1="454" x2="140" y2="454" stroke="#00838f" stroke-width="1.5" stroke-dasharray="4 2" fill="none" marker-end="url(#arrow-teal)"/>
    <text x="148" y="458" class="legend-text" fill="#00838f" stroke="none">self-loop subscription — node fires reactively on slot change</text>
    <line x1="540" y1="454" x2="580" y2="454" stroke="#4527a0" stroke-width="1.5" stroke-dasharray="2 3" fill="none" marker-end="url(#arrow-purple)"/>
    <text x="588" y="458" class="legend-text" fill="#4527a0" stroke="none">global gate — halts/starts all nodes; releases cohort N</text>
    <text x="100" y="478" class="legend-text" fill="#4527a0" stroke="none">global gate (#ede7f6 / #4527a0) — single master switch</text>
    <text x="500" y="478" class="legend-text" fill="#e65100" stroke="none">node (#fff3e0 / #e65100) — self-scheduling on slot subscription</text>
  </g>

</svg>
