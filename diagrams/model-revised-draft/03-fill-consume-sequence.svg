<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "03-fill-consume-sequence",
    "title": "Fill-consume sequence — animated 27s cycle",
    "nodes": [
      {"id": "src",  "role": "source",      "x": 100, "y": 220, "w": 80,  "h": 50},
      {"id": "dst",  "role": "destination", "x": 680, "y": 220, "w": 100, "h": 50}
    ],
    "edges": [
      {"id": "wire-src-dst", "source": "src", "target": "dst", "kind": "chain"}
    ],
    "timing": {
      "cycleSeconds": 27,
      "steps": [
        {"t": 0.00, "event": "source loads — calls dest.fill(slotId,v); wire enters in-flight"},
        {"t": 0.05, "event": "wire pulse departs source"},
        {"t": 0.50, "event": "wire pulse arrives at destination slot; wire returns to empty"},
        {"t": 0.55, "event": "destination slot transitions filled(v); source may observe slotPhase"},
        {"t": 0.65, "event": "destination firing rule fires; slots → consumed; dest calls fill on outputs"},
        {"t": 0.75, "event": "slot transitions consumed → empty"},
        {"t": 0.80, "event": "source observes dest.slotPhase = empty; free to load again"},
        {"t": 1.00, "event": "cycle repeats"}
      ]
    }
  }
  </metadata>

  <desc>
src              — source node (light gray, #666 stroke)
dst              — destination node (green tint, #2e7d32 stroke)
wire-src-dst     — .chain edge carrying value from src to dst
pulse-circle     — small filled circle animating along wire (in-flight indicator)
slot-sq-dst      — small square on dst input port; fills green when slot filled, fades on consume
slot-phase-label — text label on dst showing current slot phase
src-ready-label  — text label on src showing whether it may reload
Steps t=0..1 correspond to keyTimes on all animate elements (27s cycle)
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }

    .diagram-bg      { fill: #fafafa; }
    .title-text      { font-size: 16px; font-weight: bold; fill: #222; text-anchor: middle; }

    .shape-input       { fill: #e0e0e0; stroke: #666;    stroke-width: 2; }
    .shape-destination { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }

    .chain     { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .chain-pulse { stroke: #333; stroke-width: 3; fill: none; }

    .node-title    { font-size: 12px; text-anchor: middle; }
    .node-sublabel { font-size: 10px; text-anchor: middle; fill: #555; }

    .step-label    { font-size: 11px; text-anchor: middle; fill: #333; }
    .phase-label   { font-size: 11px; text-anchor: middle; }

    .slot-empty    { fill: #ccc; }
    .slot-filled   { fill: #2e7d32; }
    .slot-consumed { fill: #a5d6a7; }

    .src-observe   { font-size: 10px; text-anchor: middle; fill: #555; }

    .timeline-line { stroke: #bbb; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
    .tick-label    { font-size: 10px; text-anchor: middle; fill: #888; }

    .legend-bg   { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
    .legend-text { font-size: 11px; fill: #444; }

    .behavior-note-bg  { fill: #fff9c4; stroke: #f9a825; stroke-width: 1; }
    .behavior-note-text { fill: #f57f17; font-size: 10px; text-anchor: middle; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="arrow-blue-open" markerWidth="10" markerHeight="8" refX="0" refY="4" orient="auto">
      <path d="M10,0 L0,4 L10,8" fill="none" stroke="#2266aa" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="8" class="diagram-bg"/>

  <!-- Title -->
  <text x="450" y="28" class="title-text" font-weight="bold" fill="#222" stroke="none">Fill → Consume Sequence (27 s cycle, animated)</text>

  <!-- ═══════ STATIC GEOMETRY ═══════ -->

  <!-- source node -->
  <g id="src" data-role="source">
    <rect x="60" y="200" width="100" height="60" rx="6" class="shape-input"/>
    <text x="110" y="224" class="node-title" font-weight="100" fill="#333" stroke="none">source</text>
    <text x="110" y="240" class="node-sublabel" font-weight="100" fill="#555" stroke="none">calls dest.fill()</text>
    <text x="110" y="254" class="node-sublabel" font-weight="100" fill="#555" stroke="none">observes slotPhase</text>
  </g>

  <!-- static wire path -->
  <g id="edge-wire-src-dst" data-role="edge" class="chain">
    <line x1="160" y1="230" x2="730" y2="230" class="chain"/>
  </g>

  <!-- destination node -->
  <g id="dst" data-role="destination">
    <rect x="730" y="200" width="110" height="60" rx="6" class="shape-destination"/>
    <text x="785" y="222" class="node-title" font-weight="100" fill="#2e7d32" stroke="none">destination</text>
    <text x="785" y="238" class="node-sublabel" font-weight="100" fill="#555" stroke="none">owns slot map</text>
    <text x="785" y="254" class="node-sublabel" font-weight="100" fill="#555" stroke="none">firing rule local</text>
  </g>

  <!-- Slot indicator square (static, will be animated via opacity/fill) on input port of dst -->
  <!-- Initially shown as empty (gray) -->
  <g id="slot-sq-dst-empty" data-role="slot-indicator-empty">
    <rect x="722" y="222" width="14" height="14" rx="2" class="slot-empty"/>
  </g>

  <!-- Step labels below wire -->
  <!-- Label row at y=310 -->
  <text x="110" y="310" class="step-label" font-weight="300" fill="#333" stroke="none">① source</text>
  <text x="110" y="323" class="step-label" font-weight="300" fill="#333" stroke="none">calls fill()</text>

  <text x="450" y="310" class="step-label" font-weight="300" fill="#333" stroke="none">② pulse in-flight</text>
  <text x="450" y="323" class="step-label" font-weight="300" fill="#333" stroke="none">wire = in-flight(v)</text>

  <text x="785" y="310" class="step-label" font-weight="300" fill="#333" stroke="none">③ arrival writes slot</text>
  <text x="785" y="323" class="step-label" font-weight="300" fill="#333" stroke="none">wire → empty</text>

  <text x="785" y="345" class="step-label" font-weight="300" fill="#2e7d32" stroke="none">④ firing rule fires</text>
  <text x="785" y="358" class="step-label" font-weight="300" fill="#2e7d32" stroke="none">slot → consumed</text>

  <text x="110" y="345" class="step-label" font-weight="300" fill="#555" stroke="none">⑤ src observes</text>
  <text x="110" y="358" class="step-label" font-weight="300" fill="#555" stroke="none">slotPhase = empty</text>
  <text x="110" y="371" class="step-label" font-weight="300" fill="#555" stroke="none">→ free to reload</text>

  <!-- Observation arrow: source reads slotPhase from dst (dashed, open arrowhead convention) -->
  <path d="M160,265 L160,390 L730,390 L730,265" stroke="#2266aa" stroke-width="1.2" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow-blue-open)"/>
  <text x="445" y="406" class="src-observe" font-weight="300" fill="#2266aa" stroke="none">source observes dest.slotPhase(slotId) — no wire involved</text>

  <!-- Note box -->
  <rect x="230" y="420" width="440" height="32" rx="4" class="behavior-note-bg"/>
  <text x="450" y="434" class="behavior-note-text" font-weight="300" fill="#f57f17" stroke="none">Backpressure: source reads slotPhase directly on the node.</text>
  <text x="450" y="446" class="behavior-note-text" font-weight="300" fill="#f57f17" stroke="none">No wire.ack, no take — slot emptiness is the signal.</text>

  <!-- ═══════ ANIMATION ═══════ -->

  <!-- Pulse circle travelling along wire (x: 160 → 730, y=230, over t=0.05→0.50) -->
  <circle id="pulse" cx="160" cy="230" r="7" fill="#333" opacity="0">
    <animate attributeName="cx"
      values="160;160;730;730;730;160"
      keyTimes="0;0.05;0.50;0.65;0.80;1.0"
      dur="27s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0;1;1;0;0;0"
      keyTimes="0;0.05;0.48;0.52;0.80;1.0"
      dur="27s" repeatCount="indefinite"/>
  </circle>

  <!-- Slot indicator: empty (gray) → filled (green) → consumed (light green) → empty -->
  <rect id="slot-sq-animated" x="722" y="222" width="14" height="14" rx="2" fill="#ccc">
    <animate attributeName="fill"
      values="#ccc;#ccc;#2e7d32;#a5d6a7;#ccc;#ccc"
      keyTimes="0;0.49;0.55;0.70;0.78;1.0"
      dur="27s" repeatCount="indefinite"/>
  </rect>

  <!-- Slot phase text label on dst -->
  <!-- We use opacity switching between three text elements -->
  <text id="slot-label-empty" x="785" y="170" class="phase-label" font-weight="300" fill="#999" stroke="none" opacity="1">slot: empty
    <animate attributeName="opacity"
      values="1;1;0;0;0;1;1"
      keyTimes="0;0.04;0.05;0.54;0.79;0.80;1.0"
      dur="27s" repeatCount="indefinite"/>
  </text>
  <text id="slot-label-filled" x="785" y="170" class="phase-label" font-weight="300" fill="#2e7d32" stroke="none" opacity="0">slot: filled(v)
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.54;0.55;0.64;0.66;1.0"
      dur="27s" repeatCount="indefinite"/>
  </text>
  <text id="slot-label-consumed" x="785" y="170" class="phase-label" font-weight="300" fill="#a5d6a7" stroke="none" opacity="0">slot: consumed
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.65;0.66;0.77;0.79;1.0"
      dur="27s" repeatCount="indefinite"/>
  </text>

  <!-- Source "may load" label flash -->
  <text id="src-free-label" x="110" y="175" class="src-observe" font-weight="300" fill="#2e7d32" stroke="none" opacity="0">free to reload
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;0.79;0.80;0.98;1.0;1.0"
      dur="27s" repeatCount="indefinite"/>
  </text>

  <!-- Source node highlight on fire -->
  <rect x="60" y="200" width="100" height="60" rx="6" fill="white" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0.4;0;0;0"
      keyTimes="0;0.03;0.05;0.08;0.80;1.0"
      dur="27s" repeatCount="indefinite"/>
  </rect>

  <!-- Destination firing rule highlight -->
  <rect x="730" y="200" width="110" height="60" rx="6" fill="white" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0.4;0;0;0"
      keyTimes="0;0.63;0.65;0.68;0.80;1.0"
      dur="27s" repeatCount="indefinite"/>
  </rect>

  <!-- Legend -->
  <g id="legend" data-role="legend">
    <rect x="20" y="460" width="860" height="48" rx="4" class="legend-bg"/>
    <text x="40" y="477" class="legend-text" font-weight="bold" fill="#333" stroke="none">Legend:</text>
    <circle cx="100" cy="473" r="6" fill="#333"/>
    <text x="114" y="477" class="legend-text" fill="#444" stroke="none">pulse circle — in-flight value on wire</text>
    <rect x="290" y="466" width="14" height="14" rx="2" fill="#2e7d32"/>
    <text x="312" y="477" class="legend-text" fill="#444" stroke="none">filled slot square — slot on destination node</text>
    <rect x="530" y="466" width="14" height="14" rx="2" fill="#a5d6a7"/>
    <text x="552" y="477" class="legend-text" fill="#444" stroke="none">consumed slot</text>
    <text x="40" y="498" class="legend-text" fill="#2266aa" stroke="none">─ ─ ─ observe arrow: source reads dest.slotPhase — open arrowhead = read (not consume)</text>
  </g>

</svg>
