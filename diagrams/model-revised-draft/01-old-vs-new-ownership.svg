<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "01-old-vs-new-ownership",
    "title": "Wire ownership — current vs revised model",
    "nodes": [
      {"id": "src-old",  "role": "source",      "half": "left",  "model": "current"},
      {"id": "dst-old",  "role": "destination", "half": "left",  "model": "current"},
      {"id": "src-new",  "role": "source",      "half": "right", "model": "revised"},
      {"id": "dst-new",  "role": "destination", "half": "right", "model": "revised"}
    ],
    "edges": [
      {"id": "wire-old", "source": "src-old", "target": "dst-old", "kind": "chain"},
      {"id": "wire-new", "source": "src-new", "target": "dst-new", "kind": "chain"}
    ]
  }
  </metadata>

  <desc>
src, dst         — source and destination nodes (same topology both halves)
parked-dot (old) — filled circle on the wire near dst; wire owns loaded(v) after pulse arrival
slot-sq (new)    — filled square on dst's input port; node owns filled(v) after wire empties
wire (both)      — .chain edge: #333, 1.5px solid, filled triangle arrow
divider          — dashed vertical line separating the two model halves
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }

    .diagram-bg      { fill: #fafafa; }
    .title-text      { font-size: 16px; font-weight: bold; fill: #222; text-anchor: middle; }
    .half-label      { font-size: 13px; font-weight: bold; text-anchor: middle; }
    .half-label-old  { fill: #b71c1c; }
    .half-label-new  { fill: #1b5e20; }

    /* nodes */
    .shape-input       { fill: #e0e0e0; stroke: #666;    stroke-width: 2; }
    .shape-destination { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }

    /* edges */
    .chain { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }

    /* annotation elements */
    .parked-dot-old  { fill: #333; }
    .parked-label    { font-size: 11px; text-anchor: middle; fill: #333; }
    .slot-square-new { fill: #2e7d32; }
    .slot-label      { font-size: 11px; text-anchor: middle; fill: #2e7d32; }

    /* divider */
    .half-divider    { stroke: #999; stroke-width: 1; stroke-dasharray: 6 4; fill: none; }

    /* model ban annotation */
    .ban-note-bg   { fill: #fff9c4; stroke: #f9a825; stroke-width: 1; }
    .ban-note-text { fill: #f57f17; font-size: 10px; text-anchor: middle; }

    /* node text */
    .node-title    { font-size: 12px; text-anchor: middle; fill: #333; }
    .node-sublabel { font-size: 10px; text-anchor: middle; fill: #555; }
    .text-dst-new  { fill: #2e7d32; }

    /* legend */
    .legend-bg   { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
    .legend-text { font-size: 11px; fill: #444; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="8" class="diagram-bg"/>

  <!-- Title -->
  <text x="450" y="30" class="title-text" font-weight="bold" fill="#222" stroke="none">Wire Ownership — Current vs Revised Model</text>

  <!-- Divider -->
  <line x1="450" y1="50" x2="450" y2="380" class="half-divider"/>

  <!-- ═══════ LEFT HALF — CURRENT MODEL ═══════ -->
  <text x="225" y="65" class="half-label half-label-old" font-weight="bold" fill="#b71c1c" stroke="none">Current model</text>
  <text x="225" y="82" class="node-sublabel" fill="#b71c1c" stroke="none">wire owns parked loaded(v)</text>

  <!-- src-old node -->
  <g id="src-old" data-role="source">
    <rect x="60" y="160" width="80" height="50" rx="6" class="shape-input"/>
    <text x="100" y="180" class="node-title" font-weight="100" fill="#333" stroke="none">source</text>
    <text x="100" y="196" class="node-sublabel" font-weight="100" fill="#555" stroke="none">calls dest.load(v)</text>
  </g>

  <!-- wire-old edge — horizontal line -->
  <g id="edge-wire-old" data-role="edge" class="chain">
    <line x1="140" y1="185" x2="330" y2="185" class="chain"/>
  </g>

  <!-- parked dot on wire (near destination end) — the "old" model parked state -->
  <g id="parked-dot-old" data-role="parked-value">
    <circle cx="310" cy="185" r="9" class="parked-dot-old"/>
    <text x="310" y="213" class="parked-label" font-weight="300" fill="#333" stroke="none">loaded(v)</text>
    <text x="310" y="226" class="parked-label" font-weight="300" fill="#333" stroke="none">lives on wire</text>
    <!-- arrow pointing up to dot -->
    <line x1="310" y1="208" x2="310" y2="197" stroke="#333" stroke-width="1" fill="none"/>
  </g>

  <!-- dst-old node -->
  <g id="dst-old" data-role="destination">
    <rect x="340" y="160" width="80" height="50" rx="6" class="shape-destination"/>
    <text x="380" y="180" class="node-title text-dst-new" font-weight="100" fill="#2e7d32" stroke="none">dest</text>
    <text x="380" y="196" class="node-sublabel" font-weight="100" fill="#555" stroke="none">calls wire.take()</text>
  </g>

  <!-- wire phase label -->
  <rect x="100" y="240" width="260" height="38" rx="4" class="ban-note-bg"/>
  <text x="230" y="257" class="ban-note-text" font-weight="300" fill="#f57f17" stroke="none">Wire phase: empty → in-flight(v) →</text>
  <text x="230" y="271" class="ban-note-text" font-weight="300" fill="#f57f17" stroke="none">loaded(v) → taken(v) → empty</text>

  <!-- ═══════ RIGHT HALF — REVISED MODEL ═══════ -->
  <text x="675" y="65" class="half-label half-label-new" font-weight="bold" fill="#1b5e20" stroke="none">Revised model</text>
  <text x="675" y="82" class="node-sublabel" fill="#1b5e20" stroke="none">slot lives on destination node</text>

  <!-- src-new node -->
  <g id="src-new" data-role="source">
    <rect x="510" y="160" width="80" height="50" rx="6" class="shape-input"/>
    <text x="550" y="180" class="node-title" font-weight="100" fill="#333" stroke="none">source</text>
    <text x="550" y="196" class="node-sublabel" font-weight="100" fill="#555" stroke="none">calls dest.fill(id,v)</text>
  </g>

  <!-- wire-new edge — transient, becomes empty after arrival -->
  <g id="edge-wire-new" data-role="edge" class="chain">
    <line x1="590" y1="185" x2="775" y2="185" class="chain"/>
  </g>

  <!-- wire "empty after arrival" annotation above wire -->
  <text x="685" y="173" class="parked-label" font-weight="300" fill="#888" stroke="none">transient — empty after arrival</text>

  <!-- dst-new node with slot indicator on input port -->
  <g id="dst-new" data-role="destination">
    <rect x="780" y="160" width="80" height="50" rx="6" class="shape-destination"/>
    <text x="820" y="180" class="node-title text-dst-new" font-weight="100" fill="#2e7d32" stroke="none">dest</text>
    <text x="820" y="196" class="node-sublabel" font-weight="100" fill="#555" stroke="none">owns slot map</text>
  </g>

  <!-- slot indicator: small filled square on input port of dst-new -->
  <g id="slot-sq-new" data-role="slot-indicator">
    <rect x="772" y="178" width="12" height="12" rx="2" class="slot-square-new"/>
    <text x="820" y="226" class="slot-label" font-weight="300" fill="#2e7d32" stroke="none">filled(v)</text>
    <text x="820" y="239" class="slot-label" font-weight="300" fill="#2e7d32" stroke="none">lives on node</text>
    <!-- arrow pointing left to slot square -->
    <line x1="814" y1="232" x2="788" y2="192" stroke="#2e7d32" stroke-width="1" fill="none"/>
  </g>

  <!-- slot phases annotation -->
  <rect x="550" y="240" width="270" height="50" rx="4" class="ban-note-bg"/>
  <text x="685" y="257" class="ban-note-text" font-weight="300" fill="#f57f17" stroke="none">Wire phase: empty → in-flight(v) → empty</text>
  <text x="685" y="271" class="ban-note-text" font-weight="300" fill="#f57f17" stroke="none">Slot phase: empty → filled(v) → consumed</text>
  <text x="685" y="285" class="ban-note-text" font-weight="300" fill="#f57f17" stroke="none">(wire owns no parked state)</text>

  <!-- ═══════ LEGEND ═══════ -->
  <g id="legend" data-role="legend">
    <rect x="30" y="340" width="840" height="60" rx="4" class="legend-bg"/>
    <text x="50" y="358" class="legend-text" font-weight="bold" fill="#333" stroke="none">Legend:</text>
    <!-- dot sample -->
    <circle cx="120" cy="354" r="6" fill="#333"/>
    <text x="134" y="358" class="legend-text" fill="#444" stroke="none">parked dot (old): loaded(v) on wire</text>
    <!-- slot square sample -->
    <rect x="330" y="347" width="12" height="12" rx="2" fill="#2e7d32"/>
    <text x="350" y="358" class="legend-text" fill="#444" stroke="none">slot square (new): filled(v) on node input port</text>
    <!-- node colors -->
    <rect x="600" y="347" width="14" height="12" rx="2" fill="#e0e0e0" stroke="#666" stroke-width="1.5"/>
    <text x="622" y="358" class="legend-text" fill="#444" stroke="none">source node</text>
    <rect x="700" y="347" width="14" height="12" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="722" y="358" class="legend-text" fill="#444" stroke="none">destination node</text>

    <text x="50" y="386" class="legend-text" fill="#444" stroke="none">Destination node color (#e8f5e9 / #2e7d32) is new to this diagram series — not present in topology-chain-cascade.svg.</text>
  </g>

</svg>
