<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "02-wire-and-slot-phases",
    "title": "Phase state machines — old wire vs new wire + slot",
    "nodes": [
      {"id": "old-empty",      "role": "phase-state", "machine": "old-wire",  "phase": "empty"},
      {"id": "old-in-flight",  "role": "phase-state", "machine": "old-wire",  "phase": "in-flight(v)"},
      {"id": "old-loaded",     "role": "phase-state", "machine": "old-wire",  "phase": "loaded(v)"},
      {"id": "old-taken",      "role": "phase-state", "machine": "old-wire",  "phase": "taken(v)"},
      {"id": "new-wire-empty", "role": "phase-state", "machine": "new-wire",  "phase": "empty"},
      {"id": "new-wire-flight","role": "phase-state", "machine": "new-wire",  "phase": "in-flight(v)"},
      {"id": "new-slot-empty", "role": "phase-state", "machine": "new-slot",  "phase": "empty"},
      {"id": "new-slot-filled","role": "phase-state", "machine": "new-slot",  "phase": "filled(v)"},
      {"id": "new-slot-cons",  "role": "phase-state", "machine": "new-slot",  "phase": "consumed"}
    ],
    "edges": [
      {"id": "old-e-to-f",  "source": "old-empty",      "target": "old-in-flight", "kind": "phase-transition", "actor": "source"},
      {"id": "old-f-to-l",  "source": "old-in-flight",  "target": "old-loaded",    "kind": "phase-transition", "actor": "wire-arrival"},
      {"id": "old-l-to-t",  "source": "old-loaded",     "target": "old-taken",     "kind": "phase-transition", "actor": "destination"},
      {"id": "old-t-to-e",  "source": "old-taken",      "target": "old-empty",     "kind": "phase-transition", "actor": "wire"},
      {"id": "new-w-e-to-f","source": "new-wire-empty", "target": "new-wire-flight","kind": "phase-transition", "actor": "source"},
      {"id": "new-w-f-to-e","source": "new-wire-flight","target": "new-wire-empty", "kind": "phase-transition", "actor": "wire-arrival"},
      {"id": "new-s-e-to-f","source": "new-slot-empty", "target": "new-slot-filled","kind": "phase-transition", "actor": "wire-arrival"},
      {"id": "new-s-f-to-c","source": "new-slot-filled","target": "new-slot-cons",  "kind": "phase-transition", "actor": "firing-rule"},
      {"id": "new-s-c-to-e","source": "new-slot-cons",  "target": "new-slot-empty", "kind": "phase-transition", "actor": "firing-rule"}
    ]
  }
  </metadata>

  <desc>
Phase states        — rounded rectangles; each row is one state machine
Transitions         — arrows with actor label: source / wire-arrival / destination firing rule
Old wire machine    — left panel: 4-state chain (empty → in-flight → loaded → taken → empty)
New wire machine    — right top: 2-state transient (empty → in-flight → empty)
New slot machine    — right bottom: 3-state ordinal (empty → filled → consumed → empty)
Actor label color   — matches responsible party: source=gray, wire-arrival=dark, firing-rule=green
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }

    .diagram-bg      { fill: #fafafa; }
    .title-text      { font-size: 16px; font-weight: bold; fill: #222; text-anchor: middle; }
    .panel-label     { font-size: 13px; font-weight: bold; text-anchor: middle; }
    .panel-label-old { fill: #b71c1c; }
    .panel-label-new { fill: #1b5e20; }

    /* state bubbles */
    .shape-state-old  { fill: #ffebee; stroke: #b71c1c; stroke-width: 2; }
    .shape-state-wire { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2; }
    .shape-state-slot { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }

    .node-title    { font-size: 12px; text-anchor: middle; }
    .text-old      { fill: #b71c1c; }
    .text-wire     { fill: #1565c0; }
    .text-slot     { fill: #2e7d32; }

    /* transitions */
    .trans-arrow   { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrow-gray); }

    /* actor labels */
    .actor-source  { font-size: 10px; text-anchor: middle; fill: #555; }
    .actor-arrival { font-size: 10px; text-anchor: middle; fill: #333; }
    .actor-rule    { font-size: 10px; text-anchor: middle; fill: #2e7d32; }

    /* sub-machine label */
    .machine-label { font-size: 11px; font-weight: bold; text-anchor: middle; fill: #666; }

    /* panel bg */
    .panel-old-bg  { fill: #fff5f5; stroke: #f9a8a8; stroke-width: 1; }
    .panel-new-bg  { fill: #f5fff5; stroke: #a8f9a8; stroke-width: 1; }

    /* divider */
    .half-divider { stroke: #aaa; stroke-width: 1; stroke-dasharray: 6 4; fill: none; }

    /* legend */
    .legend-bg   { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
    .legend-text { font-size: 11px; fill: #444; }
  </style>

  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <marker id="arrow-gray-back" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="8" class="diagram-bg"/>

  <!-- Title -->
  <text x="450" y="30" class="title-text" font-weight="bold" fill="#222" stroke="none">Phase State Machines — Old Wire vs New Wire + Slot</text>

  <!-- Divider -->
  <line x1="450" y1="50" x2="450" y2="440" class="half-divider"/>

  <!-- ═══════ LEFT — OLD WIRE PHASE MACHINE ═══════ -->
  <rect x="20" y="55" width="415" height="350" rx="6" class="panel-old-bg"/>
  <text x="228" y="76" class="panel-label panel-label-old" font-weight="bold" fill="#b71c1c" stroke="none">Old Wire Phase Machine</text>
  <text x="228" y="92" class="machine-label" fill="#b71c1c" stroke="none">empty → in-flight(v) → loaded(v) → taken(v) → empty</text>

  <!-- State: empty (top) -->
  <g id="old-empty" data-role="phase-state">
    <rect x="163" y="110" width="130" height="40" rx="20" class="shape-state-old"/>
    <text x="228" y="135" class="node-title text-old" font-weight="100" fill="#b71c1c" stroke="none">empty</text>
  </g>

  <!-- Transition: empty → in-flight (source loads) -->
  <line x1="228" y1="150" x2="228" y2="178" class="trans-arrow"/>
  <text x="260" y="168" class="actor-source" font-weight="300" fill="#555" stroke="none">source loads</text>

  <!-- State: in-flight(v) -->
  <g id="old-in-flight" data-role="phase-state">
    <rect x="155" y="178" width="145" height="40" rx="20" class="shape-state-old"/>
    <text x="228" y="203" class="node-title text-old" font-weight="100" fill="#b71c1c" stroke="none">in-flight(v)</text>
  </g>

  <!-- Transition: in-flight → loaded (wire arrival) -->
  <line x1="228" y1="218" x2="228" y2="246" class="trans-arrow"/>
  <text x="290" y="236" class="actor-arrival" font-weight="300" fill="#333" stroke="none">wire arrival</text>

  <!-- State: loaded(v) -->
  <g id="old-loaded" data-role="phase-state">
    <rect x="155" y="246" width="145" height="40" rx="20" class="shape-state-old"/>
    <text x="228" y="271" class="node-title text-old" font-weight="100" fill="#b71c1c" stroke="none">loaded(v) ★</text>
  </g>

  <!-- Transition: loaded → taken (destination calls take) -->
  <line x1="228" y1="286" x2="228" y2="314" class="trans-arrow"/>
  <text x="310" y="304" class="actor-rule" font-weight="300" fill="#2e7d32" stroke="none">dest calls wire.take()</text>

  <!-- State: taken(v) -->
  <g id="old-taken" data-role="phase-state">
    <rect x="155" y="314" width="145" height="40" rx="20" class="shape-state-old"/>
    <text x="228" y="339" class="node-title text-old" font-weight="100" fill="#b71c1c" stroke="none">taken(v) ★</text>
  </g>

  <!-- Transition: taken → empty (wire resets) — arc back to top via left side -->
  <path d="M155,334 L90,334 L90,130 L163,130" class="trans-arrow"/>
  <text x="60" y="240" class="actor-arrival" font-weight="300" fill="#333" stroke="none" transform="rotate(-90,60,240)">wire resets</text>

  <!-- ★ Banned states note -->
  <rect x="30" y="368" width="395" height="30" rx="4" style="fill:#fff9c4;stroke:#f9a825;stroke-width:1;"/>
  <text x="228" y="381" class="actor-source" font-weight="300" fill="#f57f17" stroke="none">★ loaded(v) and taken(v) are banned vocabulary under the revised model.</text>
  <text x="228" y="393" class="actor-source" font-weight="300" fill="#f57f17" stroke="none">Wire no longer parks state after arrival.</text>

  <!-- ═══════ RIGHT — NEW WIRE + SLOT MACHINES ═══════ -->
  <rect x="458" y="55" width="424" height="350" rx="6" class="panel-new-bg"/>
  <text x="670" y="76" class="panel-label panel-label-new" font-weight="bold" fill="#1b5e20" stroke="none">Revised Model — Wire + Slot</text>

  <!-- Sub-label: Wire machine -->
  <text x="670" y="100" class="machine-label" fill="#1565c0" stroke="none">Wire (transient)</text>

  <!-- State: wire empty -->
  <g id="new-wire-empty" data-role="phase-state">
    <rect x="597" y="112" width="144" height="38" rx="19" class="shape-state-wire"/>
    <text x="669" y="136" class="node-title text-wire" font-weight="100" fill="#1565c0" stroke="none">empty</text>
  </g>

  <!-- arc loop: empty ⟶ in-flight ⟶ empty — layout as right mini-loop -->
  <!-- Transition: empty → in-flight(v) -->
  <path d="M741,131 L790,131 L790,168 L749,168" class="trans-arrow"/>
  <text x="820" y="153" class="actor-source" font-weight="300" fill="#555" stroke="none">source</text>
  <text x="820" y="165" class="actor-source" font-weight="300" fill="#555" stroke="none">loads</text>

  <!-- State: in-flight(v) -->
  <g id="new-wire-flight" data-role="phase-state">
    <rect x="597" y="150" width="144" height="38" rx="19" class="shape-state-wire"/>
    <text x="669" y="174" class="node-title text-wire" font-weight="100" fill="#1565c0" stroke="none">in-flight(v)</text>
  </g>

  <!-- Transition: in-flight → empty (wire arrival writes slot, wire resets) -->
  <path d="M597,169 L548,169 L548,131 L597,131" class="trans-arrow"/>
  <text x="476" y="143" class="actor-arrival" font-weight="300" fill="#333" stroke="none">arrival →</text>
  <text x="476" y="155" class="actor-arrival" font-weight="300" fill="#333" stroke="none">writes slot</text>

  <!-- Horizontal separator -->
  <line x1="470" y1="210" x2="872" y2="210" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" fill="none"/>

  <!-- Sub-label: Slot machine -->
  <text x="670" y="232" class="machine-label" fill="#2e7d32" stroke="none">Slot on destination node (ordinal)</text>

  <!-- State: slot empty -->
  <g id="new-slot-empty" data-role="phase-state">
    <rect x="474" y="244" width="130" height="38" rx="19" class="shape-state-slot"/>
    <text x="539" y="268" class="node-title text-slot" font-weight="100" fill="#2e7d32" stroke="none">empty</text>
  </g>

  <!-- Transition: slot empty → filled (wire arrival writes) -->
  <line x1="604" y1="263" x2="632" y2="263" class="trans-arrow"/>
  <text x="618" y="254" class="actor-arrival" font-weight="300" fill="#333" stroke="none">wire arrival</text>

  <!-- State: filled(v) -->
  <g id="new-slot-filled" data-role="phase-state">
    <rect x="633" y="244" width="130" height="38" rx="19" class="shape-state-slot"/>
    <text x="698" y="268" class="node-title text-slot" font-weight="100" fill="#2e7d32" stroke="none">filled(v)</text>
  </g>

  <!-- Transition: filled → consumed (firing rule fires) -->
  <line x1="763" y1="263" x2="791" y2="263" class="trans-arrow"/>
  <text x="777" y="254" class="actor-rule" font-weight="300" fill="#2e7d32" stroke="none">firing rule</text>

  <!-- State: consumed -->
  <g id="new-slot-cons" data-role="phase-state">
    <rect x="792" y="244" width="90" height="38" rx="19" class="shape-state-slot"/>
    <text x="837" y="268" class="node-title text-slot" font-weight="100" fill="#2e7d32" stroke="none">consumed</text>
  </g>

  <!-- Transition: consumed → empty (arc down and back) -->
  <path d="M837,282 L837,330 L539,330 L539,282" class="trans-arrow"/>
  <text x="688" y="348" class="actor-rule" font-weight="300" fill="#2e7d32" stroke="none">firing rule completes → slot resets</text>

  <!-- Key insight note -->
  <rect x="462" y="360" width="410" height="38" rx="4" style="fill:#fff9c4;stroke:#f9a825;stroke-width:1;"/>
  <text x="667" y="376" class="actor-source" font-weight="300" fill="#f57f17" stroke="none">Slot phase is ordinal: filled happened, then consumed happened.</text>
  <text x="667" y="390" class="actor-source" font-weight="300" fill="#f57f17" stroke="none">Source observes dest.slotPhase(id) to know when free to reload.</text>

  <!-- ═══════ LEGEND ═══════ -->
  <g id="legend" data-role="legend">
    <rect x="20" y="420" width="860" height="60" rx="4" class="legend-bg"/>
    <text x="40" y="438" class="legend-text" font-weight="bold" fill="#333" stroke="none">Actors:</text>
    <text x="100" y="438" class="legend-text" fill="#555" stroke="none">source — source node calls dest.fill(slotId,v)</text>
    <text x="370" y="438" class="legend-text" fill="#333" stroke="none">wire-arrival — animation completes, wire writes slot</text>
    <text x="660" y="438" class="legend-text" fill="#2e7d32" stroke="none">firing-rule — destination node's local firing rule</text>
    <text x="40" y="458" class="legend-text" fill="#b71c1c" stroke="none">Old wire shape (left): 4-state; loaded(v)/taken(v) are now banned vocabulary</text>
    <text x="460" y="458" class="legend-text" fill="#1565c0" stroke="none">New wire shape (right top): 2-state transient</text>
    <text x="700" y="458" class="legend-text" fill="#2e7d32" stroke="none">Slot (right bottom): 3-state ordinal</text>
  </g>

</svg>
