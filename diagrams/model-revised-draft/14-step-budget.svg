<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "14-step-budget",
    "title": "Cohorts decided by the regular animation loop during wiring — no separate setup pass",
    "nodes": [
      {"id": "gate",       "role": "play-pause-gate"},
      {"id": "enumerator", "role": "cohort-enumerator"},
      {"id": "target",     "role": "step-target"},
      {"id": "wire-A",     "role": "wire", "assignedCohort": 1},
      {"id": "wire-B",     "role": "wire", "assignedCohort": 2},
      {"id": "wire-C",     "role": "wire", "assignedCohort": 2},
      {"id": "wire-D",     "role": "wire", "assignedCohort": 3}
    ],
    "edges": [
      {"id": "assign-A", "source": "wire-A", "target": "enumerator", "kind": "cohort-assignment-on-wire"},
      {"id": "assign-B", "source": "wire-B", "target": "enumerator", "kind": "cohort-assignment-on-wire"},
      {"id": "assign-C", "source": "wire-C", "target": "enumerator", "kind": "cohort-assignment-on-wire"},
      {"id": "assign-D", "source": "wire-D", "target": "enumerator", "kind": "cohort-assignment-on-wire"},
      {"id": "select",   "source": "target", "target": "gate",       "kind": "select-step"},
      {"id": "release",  "source": "gate",   "target": "wire-B",     "kind": "release-cohort"},
      {"id": "release2", "source": "gate",   "target": "wire-C",     "kind": "release-cohort"}
    ]
  }
  </metadata>

  <desc>
gate         — global play/pause master switch
enumerator   — cohort registry; gets entries as wires are added during normal animation
target       — user-supplied "step N"
wire-A..D    — wires being created during the regular animation loop; each gets its cohort assigned at wire-time
no-setup     — there is no separate setup cohort; cohort assignment is a side product of wiring activity inside the running loop
release-N    — when user picks step N, gate releases only wires assigned cohort N
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }
    .diagram-bg      { fill: #fafafa; }
    .title-text      { font-size: 16px; font-weight: bold; fill: #222; text-anchor: middle; }
    .shape-gate-on   { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }
    .shape-gate-off  { fill: #ffebee; stroke: #c62828; stroke-width: 2; }
    .shape-enum      { fill: #ede7f6; stroke: #4527a0; stroke-width: 2; }
    .shape-target    { fill: #fff3e0; stroke: #e65100; stroke-width: 2; }
    .shape-wire      { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2; }
    .shape-wire-fresh{ fill: #fff8e1; stroke: #f9a825; stroke-width: 2; }
    .shape-wire-active { fill: #bbdefb; stroke: #0d47a1; stroke-width: 2.5; }
    .shape-wire-skip { fill: #fafafa; stroke: #ccc; stroke-width: 1.5; stroke-dasharray: 3 3; }
    .assign-arrow    { stroke: #4527a0; stroke-width: 1.5; fill: none; marker-end: url(#arrow-purple); stroke-dasharray: 3 2; }
    .release-arrow   { stroke: #2e7d32; stroke-width: 2; fill: none; marker-end: url(#arrow-green); }
    .halt-arrow      { stroke: #c62828; stroke-width: 2; fill: none; marker-end: url(#arrow-red); stroke-dasharray: 5 3; }
    .flow-arrow      { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#arrow-gray); }
    .legend-bg       { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
    .note-bg         { fill: #fff9c4; stroke: #f9a825; stroke-width: 1; }
    .snap-divider    { stroke: #ccc; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
  </style>

  <defs>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4527a0"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c62828"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
  </defs>

  <rect width="1000" height="600" rx="8" class="diagram-bg"/>

  <text x="500" y="30" class="title-text" font-weight="bold" fill="#222" stroke="none">Cohorts decided during wiring — no separate setup pass</text>
  <text x="500" y="48" font-size="11" text-anchor="middle" font-weight="300" fill="#555" stroke="none">The regular animation loop assigns cohort numbers as wires are added. Stepping infrastructure is just bookkeeping inside normal operation.</text>

  <!-- ═══════ Snapshot 1: wiring in progress — cohorts assigned as wires appear ═══════ -->
  <text x="170" y="90" font-size="13" text-anchor="middle" font-weight="600" fill="#333" stroke="none">snapshot 1 — wiring in progress</text>
  <text x="170" y="106" font-size="10" text-anchor="middle" font-weight="300" fill="#666" stroke="none">animation loop assigns cohort to each wire</text>

  <!-- wires being added, with their assigned cohort -->
  <g id="wire-A-snap1" data-role="wire">
    <rect x="80" y="130" width="60" height="32" rx="6" class="shape-wire"/>
    <text x="110" y="143" font-size="10" text-anchor="middle" font-weight="100" fill="#1565c0" stroke="none">wire A</text>
    <text x="110" y="156" font-size="10" text-anchor="middle" font-weight="600" fill="#1565c0" stroke="none">c=1</text>
  </g>

  <g id="wire-B-snap1" data-role="wire">
    <rect x="160" y="130" width="60" height="32" rx="6" class="shape-wire"/>
    <text x="190" y="143" font-size="10" text-anchor="middle" font-weight="100" fill="#1565c0" stroke="none">wire B</text>
    <text x="190" y="156" font-size="10" text-anchor="middle" font-weight="600" fill="#1565c0" stroke="none">c=2</text>
  </g>

  <g id="wire-C-snap1" data-role="wire">
    <rect x="80" y="172" width="60" height="32" rx="6" class="shape-wire"/>
    <text x="110" y="185" font-size="10" text-anchor="middle" font-weight="100" fill="#1565c0" stroke="none">wire C</text>
    <text x="110" y="198" font-size="10" text-anchor="middle" font-weight="600" fill="#1565c0" stroke="none">c=2</text>
  </g>

  <g id="wire-D-snap1" data-role="wire-fresh">
    <rect x="160" y="172" width="60" height="32" rx="6" class="shape-wire-fresh"/>
    <text x="190" y="185" font-size="10" text-anchor="middle" font-weight="100" fill="#f57f17" stroke="none">wire D</text>
    <text x="190" y="198" font-size="10" text-anchor="middle" font-weight="600" fill="#f57f17" stroke="none">c=3</text>
  </g>
  <text x="190" y="218" font-size="9" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">(just added)</text>

  <!-- enumerator (registry) -->
  <g id="enum-snap1" data-role="cohort-enumerator">
    <rect x="80" y="240" width="180" height="64" rx="6" class="shape-enum"/>
    <text x="170" y="258" font-size="10" text-anchor="middle" font-weight="100" fill="#4527a0" stroke="none">enumerator (registry)</text>
    <text x="170" y="276" font-size="11" text-anchor="middle" font-weight="600" fill="#4527a0" stroke="none">{1: [A]</text>
    <text x="170" y="290" font-size="11" text-anchor="middle" font-weight="600" fill="#4527a0" stroke="none">2: [B, C]</text>
    <text x="170" y="304" font-size="11" text-anchor="middle" font-weight="600" fill="#4527a0" stroke="none">3: [D] }</text>
  </g>

  <!-- assign arrows from each wire to enumerator -->
  <line x1="110" y1="162" x2="130" y2="240" class="assign-arrow"/>
  <line x1="190" y1="162" x2="180" y2="240" class="assign-arrow"/>
  <line x1="110" y1="204" x2="150" y2="240" class="assign-arrow"/>
  <line x1="190" y1="204" x2="200" y2="240" class="assign-arrow"/>
  <text x="245" y="245" font-size="9" font-weight="600" fill="#4527a0" stroke="none">assign-at-wire-time</text>

  <text x="170" y="330" font-size="10" text-anchor="middle" font-weight="300" fill="#666" stroke="none">cohort assignment = side product of wiring</text>

  <!-- ═══════ Snapshot 2: user picks step 2 — gate releases cohort 2 wires ═══════ -->
  <text x="500" y="90" font-size="13" text-anchor="middle" font-weight="600" fill="#333" stroke="none">snapshot 2 — user picks step 2</text>
  <text x="500" y="106" font-size="10" text-anchor="middle" font-weight="300" fill="#666" stroke="none">gate consults enumerator → release {B, C}</text>

  <g id="target-snap2" data-role="step-target">
    <rect x="450" y="120" width="100" height="32" rx="6" class="shape-target"/>
    <text x="500" y="135" font-size="10" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">target</text>
    <text x="500" y="148" font-size="13" text-anchor="middle" font-weight="600" fill="#e65100" stroke="none">2</text>
  </g>

  <g id="gate-snap2" data-role="play-pause-gate">
    <rect x="430" y="162" width="140" height="32" rx="6" class="shape-gate-on"/>
    <text x="500" y="178" text-anchor="middle" font-weight="100" fill="#2e7d32" stroke="none">▶ gate: release c=2</text>
    <text x="500" y="190" font-size="9" text-anchor="middle" font-weight="100" fill="#555" stroke="none">(single-cohort)</text>
  </g>

  <!-- wires in their cohort positions; c=2 active, others skip -->
  <g id="wires-snap2" data-role="wire-grid">
    <rect x="395" y="220" width="50" height="32" rx="6" class="shape-wire-skip"/>
    <text x="420" y="234" font-size="10" text-anchor="middle" font-weight="100" fill="#999" stroke="none">wire A</text>
    <text x="420" y="246" font-size="9" text-anchor="middle" font-weight="600" fill="#999" stroke="none">c=1 skip</text>

    <rect x="455" y="220" width="50" height="32" rx="6" class="shape-wire-active"/>
    <text x="480" y="234" font-size="10" text-anchor="middle" font-weight="100" fill="#0d47a1" stroke="none">wire B</text>
    <text x="480" y="246" font-size="9" text-anchor="middle" font-weight="600" fill="#0d47a1" stroke="none">c=2 FIRE</text>

    <rect x="515" y="220" width="50" height="32" rx="6" class="shape-wire-active"/>
    <text x="540" y="234" font-size="10" text-anchor="middle" font-weight="100" fill="#0d47a1" stroke="none">wire C</text>
    <text x="540" y="246" font-size="9" text-anchor="middle" font-weight="600" fill="#0d47a1" stroke="none">c=2 FIRE</text>

    <rect x="575" y="220" width="50" height="32" rx="6" class="shape-wire-skip"/>
    <text x="600" y="234" font-size="10" text-anchor="middle" font-weight="100" fill="#999" stroke="none">wire D</text>
    <text x="600" y="246" font-size="9" text-anchor="middle" font-weight="600" fill="#999" stroke="none">c=3 skip</text>
  </g>

  <!-- release arrows -->
  <line x1="490" y1="194" x2="480" y2="215" class="release-arrow"/>
  <line x1="510" y1="194" x2="535" y2="215" class="release-arrow"/>

  <g id="enum-snap2" data-role="cohort-enumerator">
    <rect x="410" y="280" width="180" height="46" rx="6" class="shape-enum"/>
    <text x="500" y="296" font-size="10" text-anchor="middle" font-weight="100" fill="#4527a0" stroke="none">enumerator</text>
    <text x="500" y="313" font-size="10" text-anchor="middle" font-weight="600" fill="#4527a0" stroke="none">lookup target=2 → [B, C]</text>
  </g>

  <line x1="500" y1="194" x2="500" y2="280" class="assign-arrow" opacity="0.4"/>

  <!-- ═══════ Snapshot 3: B,C fired, gate halts ═══════ -->
  <text x="830" y="90" font-size="13" text-anchor="middle" font-weight="600" fill="#333" stroke="none">snapshot 3 — c=2 fired, gate halts</text>
  <text x="830" y="106" font-size="10" text-anchor="middle" font-weight="300" fill="#666" stroke="none">wires A and D never ran</text>

  <g id="target-snap3" data-role="step-target">
    <rect x="780" y="120" width="100" height="32" rx="6" class="shape-target"/>
    <text x="830" y="135" font-size="10" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">target</text>
    <text x="830" y="148" font-size="13" text-anchor="middle" font-weight="600" fill="#e65100" stroke="none">2</text>
  </g>

  <g id="gate-snap3" data-role="play-pause-gate">
    <rect x="760" y="162" width="140" height="32" rx="6" class="shape-gate-off"/>
    <text x="830" y="178" text-anchor="middle" font-weight="100" fill="#c62828" stroke="none">❚❚ gate: paused</text>
    <text x="830" y="190" font-size="9" text-anchor="middle" font-weight="100" fill="#555" stroke="none">(cohort 2 spent)</text>
  </g>

  <g id="wires-snap3" data-role="wire-grid">
    <rect x="725" y="220" width="50" height="32" rx="6" class="shape-wire-skip"/>
    <text x="750" y="234" font-size="10" text-anchor="middle" font-weight="100" fill="#999" stroke="none">wire A</text>
    <text x="750" y="246" font-size="9" text-anchor="middle" font-weight="600" fill="#999" stroke="none">never</text>

    <rect x="785" y="220" width="50" height="32" rx="6" class="shape-wire-active" opacity="0.55"/>
    <text x="810" y="234" font-size="10" text-anchor="middle" font-weight="100" fill="#0d47a1" stroke="none">wire B</text>
    <text x="810" y="246" font-size="9" text-anchor="middle" font-weight="600" fill="#0d47a1" stroke="none">done</text>

    <rect x="845" y="220" width="50" height="32" rx="6" class="shape-wire-active" opacity="0.55"/>
    <text x="870" y="234" font-size="10" text-anchor="middle" font-weight="100" fill="#0d47a1" stroke="none">wire C</text>
    <text x="870" y="246" font-size="9" text-anchor="middle" font-weight="600" fill="#0d47a1" stroke="none">done</text>

    <rect x="905" y="220" width="50" height="32" rx="6" class="shape-wire-skip"/>
    <text x="930" y="234" font-size="10" text-anchor="middle" font-weight="100" fill="#999" stroke="none">wire D</text>
    <text x="930" y="246" font-size="9" text-anchor="middle" font-weight="600" fill="#999" stroke="none">never</text>
  </g>

  <!-- halt arrow -->
  <line x1="830" y1="218" x2="830" y2="196" class="halt-arrow"/>
  <text x="858" y="208" font-size="9" font-weight="600" fill="#c62828" stroke="none">halt</text>

  <!-- snapshot dividers -->
  <line x1="330" y1="80" x2="330" y2="350" class="snap-divider"/>
  <line x1="660" y1="80" x2="660" y2="350" class="snap-divider"/>

  <!-- flow arrows between snapshots -->
  <line x1="290" y1="230" x2="380" y2="230" class="flow-arrow"/>
  <line x1="600" y1="230" x2="710" y2="230" class="flow-arrow"/>

  <!-- ═══════ Note ═══════ -->
  <rect x="60" y="370" width="880" height="118" rx="4" class="note-bg"/>
  <text x="500" y="390" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">NO SETUP PASS. The regular animation loop already wires nodes and edges as the topology changes. The same loop decides each new</text>
  <text x="500" y="406" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">wire's cohort number at wire-time — by looking at its upstream wires' cohorts and taking max+1 (or 1 if it has no satisfied predecessors).</text>
  <text x="500" y="424" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">The cohort registry is a side product of normal wiring, not a separate initialization. As the topology grows, the registry grows with it.</text>
  <text x="500" y="442" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">"Step N" then becomes pure lookup: gate consults the registry for entries tagged N and releases only those wires. Cohorts &lt; N and &gt; N</text>
  <text x="500" y="460" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">stay inert. No setup overhead; cohort N exists exactly as soon as a wire is assigned cohort N during wiring.</text>
  <text x="500" y="478" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">Same loop, same activity — the step axis is bookkeeping the loop already does.</text>

  <!-- ═══════ Legend ═══════ -->
  <g id="legend" data-role="legend">
    <rect x="20" y="500" width="960" height="80" rx="4" class="legend-bg"/>
    <rect x="40"  y="510" width="36" height="18" rx="4" class="shape-wire"/>
    <text x="84"  y="523" font-size="11" font-weight="300" fill="#1565c0" stroke="none">wire (cohort assigned during wiring)</text>
    <rect x="280" y="510" width="36" height="18" rx="4" class="shape-wire-fresh"/>
    <text x="324" y="523" font-size="11" font-weight="300" fill="#f57f17" stroke="none">wire just added — cohort being computed</text>
    <rect x="540" y="510" width="36" height="18" rx="4" class="shape-wire-active"/>
    <text x="584" y="523" font-size="11" font-weight="300" fill="#0d47a1" stroke="none">wire firing in selected step</text>
    <rect x="780" y="510" width="36" height="18" rx="4" class="shape-wire-skip"/>
    <text x="824" y="523" font-size="11" font-weight="300" fill="#888" stroke="none">wire not in target cohort</text>
    <rect x="40"  y="535" width="36" height="18" rx="4" class="shape-enum"/>
    <text x="84"  y="548" font-size="11" font-weight="300" fill="#4527a0" stroke="none">enumerator: cohort → [wires] registry</text>
    <rect x="320" y="535" width="36" height="18" rx="4" class="shape-target"/>
    <text x="364" y="548" font-size="11" font-weight="300" fill="#e65100" stroke="none">user target = step N</text>
    <line x1="540" y1="544" x2="580" y2="544" stroke="#4527a0" stroke-width="1.5" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow-purple)"/>
    <text x="588" y="548" font-size="11" font-weight="300" fill="#4527a0" stroke="none">cohort-assignment at wire-time (no separate pass)</text>
    <line x1="40" y1="568" x2="80" y2="568" stroke="#2e7d32" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
    <text x="88" y="572" font-size="11" font-weight="300" fill="#2e7d32" stroke="none">single-cohort release</text>
    <line x1="320" y1="568" x2="360" y2="568" stroke="#c62828" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow-red)"/>
    <text x="368" y="572" font-size="11" font-weight="300" fill="#c62828" stroke="none">halt after target cohort fires</text>
  </g>

</svg>
