<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "13-tick-as-edge-cohort",
    "title": "Tick = one cohort of simultaneously-firing edges",
    "nodes": [
      {"id": "input",  "role": "external-input"},
      {"id": "node-A", "role": "node"},
      {"id": "node-B", "role": "node"},
      {"id": "node-C", "role": "node"},
      {"id": "node-D", "role": "node"},
      {"id": "node-E", "role": "node"},
      {"id": "node-F", "role": "node"}
    ],
    "edges": [
      {"id": "e-input-A", "source": "input",  "target": "node-A", "cohort": 1},
      {"id": "e-A-B",     "source": "node-A", "target": "node-B", "cohort": 2},
      {"id": "e-A-C",     "source": "node-A", "target": "node-C", "cohort": 2},
      {"id": "e-B-D",     "source": "node-B", "target": "node-D", "cohort": 3},
      {"id": "e-C-D",     "source": "node-C", "target": "node-D", "cohort": 3},
      {"id": "e-C-E",     "source": "node-C", "target": "node-E", "cohort": 3},
      {"id": "e-D-F",     "source": "node-D", "target": "node-F", "cohort": 4},
      {"id": "e-E-F",     "source": "node-E", "target": "node-F", "cohort": 4}
    ]
  }
  </metadata>

  <desc>
input          — external disturbance entering the topology
node-A..F      — nodes that fire reactively when their slot preconditions hold
cohort-N edge  — set of edges that fired at the same moment; cohort number is the tick count
tick-strip     — right-side strip showing each tick as one horizontal band, colored by cohort
gate           — global play/pause switch (orthogonal to ticking; not shown firing)
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }
    .diagram-bg      { fill: #fafafa; }
    .title-text      { font-size: 16px; font-weight: bold; fill: #222; text-anchor: middle; }
    .shape-node      { fill: #fff3e0; stroke: #e65100; stroke-width: 2; }
    .shape-input     { fill: #ffebee; stroke: #c62828; stroke-width: 2; }
    .shape-gate      { fill: #ede7f6; stroke: #4527a0; stroke-width: 2; }
    .cohort-1        { stroke: #c62828; stroke-width: 2.5; fill: none; marker-end: url(#arrow-c1); }
    .cohort-2        { stroke: #1565c0; stroke-width: 2.5; fill: none; marker-end: url(#arrow-c2); }
    .cohort-3        { stroke: #2e7d32; stroke-width: 2.5; fill: none; marker-end: url(#arrow-c3); }
    .cohort-4        { stroke: #4527a0; stroke-width: 2.5; fill: none; marker-end: url(#arrow-c4); }
    .band-1          { fill: #ffebee; stroke: #c62828; stroke-width: 1; }
    .band-2          { fill: #e3f2fd; stroke: #1565c0; stroke-width: 1; }
    .band-3          { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1; }
    .band-4          { fill: #ede7f6; stroke: #4527a0; stroke-width: 1; }
    .legend-bg       { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
    .note-bg         { fill: #fff9c4; stroke: #f9a825; stroke-width: 1; }
  </style>

  <defs>
    <marker id="arrow-c1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c62828"/>
    </marker>
    <marker id="arrow-c2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1565c0"/>
    </marker>
    <marker id="arrow-c3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-c4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4527a0"/>
    </marker>
  </defs>

  <rect width="1000" height="560" rx="8" class="diagram-bg"/>

  <text x="500" y="30" class="title-text" font-weight="bold" fill="#222" stroke="none">Tick = one cohort of simultaneously-firing edges</text>
  <text x="500" y="48" font-size="11" text-anchor="middle" font-weight="300" fill="#555" stroke="none">A tick is observable in the edges, not stored on any node. Counting ticks = counting cohort layers in a cascade.</text>

  <!-- Global play/pause gate (orthogonal annotation, top-right) -->
  <g id="gate" data-role="play-pause">
    <rect x="800" y="70" width="170" height="36" rx="6" class="shape-gate"/>
    <text x="885" y="86" text-anchor="middle" font-weight="100" fill="#4527a0" stroke="none">▶ / ❚❚  global gate</text>
    <text x="885" y="100" font-size="10" text-anchor="middle" font-weight="100" fill="#555" stroke="none">halts/starts everything (orthogonal)</text>
  </g>

  <!-- ═══════ DAG (left/center) ═══════ -->

  <!-- Input -->
  <g id="input" data-role="external-input">
    <rect x="60" y="100" width="100" height="40" rx="6" class="shape-input"/>
    <text x="110" y="118" text-anchor="middle" font-weight="100" fill="#c62828" stroke="none">disturbance</text>
    <text x="110" y="132" font-size="10" text-anchor="middle" font-weight="100" fill="#555" stroke="none">external input</text>
  </g>

  <!-- node-A -->
  <g id="node-A" data-role="node">
    <rect x="65" y="200" width="90" height="40" rx="6" class="shape-node"/>
    <text x="110" y="224" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">A</text>
  </g>

  <!-- node-B -->
  <g id="node-B" data-role="node">
    <rect x="220" y="300" width="90" height="40" rx="6" class="shape-node"/>
    <text x="265" y="324" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">B</text>
  </g>

  <!-- node-C -->
  <g id="node-C" data-role="node">
    <rect x="220" y="380" width="90" height="40" rx="6" class="shape-node"/>
    <text x="265" y="404" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">C</text>
  </g>

  <!-- node-D -->
  <g id="node-D" data-role="node">
    <rect x="400" y="300" width="90" height="40" rx="6" class="shape-node"/>
    <text x="445" y="324" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">D</text>
  </g>

  <!-- node-E -->
  <g id="node-E" data-role="node">
    <rect x="400" y="430" width="90" height="40" rx="6" class="shape-node"/>
    <text x="445" y="454" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">E</text>
  </g>

  <!-- node-F -->
  <g id="node-F" data-role="node">
    <rect x="580" y="370" width="90" height="40" rx="6" class="shape-node"/>
    <text x="625" y="394" text-anchor="middle" font-weight="100" fill="#e65100" stroke="none">F</text>
  </g>

  <!-- Edges, colored by cohort -->

  <!-- cohort 1: input -> A -->
  <g id="e-input-A" data-role="edge" class="cohort-1">
    <line x1="110" y1="140" x2="110" y2="200" class="cohort-1"/>
  </g>
  <text x="123" y="172" font-size="11" font-weight="600" fill="#c62828" stroke="none">t1</text>

  <!-- cohort 2: A -> B, A -> C -->
  <g id="e-A-B" data-role="edge" class="cohort-2">
    <path d="M155,235 L220,310" class="cohort-2"/>
  </g>
  <text x="178" y="265" font-size="11" font-weight="600" fill="#1565c0" stroke="none">t2</text>

  <g id="e-A-C" data-role="edge" class="cohort-2">
    <path d="M155,235 L220,395" class="cohort-2"/>
  </g>
  <text x="160" y="320" font-size="11" font-weight="600" fill="#1565c0" stroke="none">t2</text>

  <!-- cohort 3: B -> D, C -> D, C -> E -->
  <g id="e-B-D" data-role="edge" class="cohort-3">
    <line x1="310" y1="320" x2="400" y2="320" class="cohort-3"/>
  </g>
  <text x="350" y="312" font-size="11" font-weight="600" fill="#2e7d32" stroke="none">t3</text>

  <g id="e-C-D" data-role="edge" class="cohort-3">
    <path d="M310,395 L400,335" class="cohort-3"/>
  </g>
  <text x="350" y="380" font-size="11" font-weight="600" fill="#2e7d32" stroke="none">t3</text>

  <g id="e-C-E" data-role="edge" class="cohort-3">
    <path d="M310,410 L400,445" class="cohort-3"/>
  </g>
  <text x="350" y="440" font-size="11" font-weight="600" fill="#2e7d32" stroke="none">t3</text>

  <!-- cohort 4: D -> F, E -> F -->
  <g id="e-D-F" data-role="edge" class="cohort-4">
    <path d="M490,325 L580,380" class="cohort-4"/>
  </g>
  <text x="525" y="345" font-size="11" font-weight="600" fill="#4527a0" stroke="none">t4</text>

  <g id="e-E-F" data-role="edge" class="cohort-4">
    <path d="M490,445 L580,405" class="cohort-4"/>
  </g>
  <text x="525" y="440" font-size="11" font-weight="600" fill="#4527a0" stroke="none">t4</text>

  <!-- ═══════ Tick strip (right) ═══════ -->
  <text x="855" y="160" font-size="12" text-anchor="middle" font-weight="600" fill="#444" stroke="none">tick strip</text>
  <text x="855" y="176" font-size="10" text-anchor="middle" font-weight="300" fill="#666" stroke="none">one band = one simultaneity cohort</text>

  <!-- band 1 -->
  <rect x="740" y="190" width="230" height="40" rx="4" class="band-1"/>
  <text x="755" y="215" font-size="11" font-weight="600" fill="#c62828" stroke="none">tick 1</text>
  <text x="855" y="215" font-size="11" text-anchor="middle" font-weight="300" fill="#c62828" stroke="none">{ input → A }</text>
  <text x="955" y="215" font-size="10" text-anchor="end" font-weight="300" fill="#c62828" stroke="none">1 edge</text>

  <!-- band 2 -->
  <rect x="740" y="240" width="230" height="40" rx="4" class="band-2"/>
  <text x="755" y="265" font-size="11" font-weight="600" fill="#1565c0" stroke="none">tick 2</text>
  <text x="855" y="265" font-size="11" text-anchor="middle" font-weight="300" fill="#1565c0" stroke="none">{ A→B, A→C }</text>
  <text x="955" y="265" font-size="10" text-anchor="end" font-weight="300" fill="#1565c0" stroke="none">2 edges</text>

  <!-- band 3 -->
  <rect x="740" y="290" width="230" height="40" rx="4" class="band-3"/>
  <text x="755" y="315" font-size="11" font-weight="600" fill="#2e7d32" stroke="none">tick 3</text>
  <text x="855" y="315" font-size="11" text-anchor="middle" font-weight="300" fill="#2e7d32" stroke="none">{ B→D, C→D, C→E }</text>
  <text x="955" y="315" font-size="10" text-anchor="end" font-weight="300" fill="#2e7d32" stroke="none">3 edges</text>

  <!-- band 4 -->
  <rect x="740" y="340" width="230" height="40" rx="4" class="band-4"/>
  <text x="755" y="365" font-size="11" font-weight="600" fill="#4527a0" stroke="none">tick 4</text>
  <text x="855" y="365" font-size="11" text-anchor="middle" font-weight="300" fill="#4527a0" stroke="none">{ D→F, E→F }</text>
  <text x="955" y="365" font-size="10" text-anchor="end" font-weight="300" fill="#4527a0" stroke="none">2 edges</text>

  <text x="855" y="402" font-size="11" text-anchor="middle" font-weight="600" fill="#444" stroke="none">cascade depth = 4 ticks</text>

  <!-- ═══════ Note ═══════ -->
  <rect x="60" y="465" width="880" height="56" rx="4" class="note-bg"/>
  <text x="500" y="484" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">A tick is what the EDGES do, not what a node knows. Cohort 2 exists because A→B and A→C fired together;</text>
  <text x="500" y="500" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">cohort 3 exists because B→D, C→D, C→E fired together — each had to wait for a cohort-2 write before it could fire.</text>
  <text x="500" y="516" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">No node stores "I'm in tick N." The tick count is just the number of simultaneity layers an observer of the edges saw.</text>

  <!-- ═══════ Legend ═══════ -->
  <g id="legend" data-role="legend">
    <rect x="20" y="530" width="960" height="22" rx="4" class="legend-bg"/>
    <line x1="40"  y1="541" x2="80"  y2="541" stroke="#c62828" stroke-width="2.5" marker-end="url(#arrow-c1)"/>
    <text x="88"  y="545" font-size="11" font-weight="300" fill="#c62828" stroke="none">tick 1</text>
    <line x1="140" y1="541" x2="180" y2="541" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrow-c2)"/>
    <text x="188" y="545" font-size="11" font-weight="300" fill="#1565c0" stroke="none">tick 2</text>
    <line x1="240" y1="541" x2="280" y2="541" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-c3)"/>
    <text x="288" y="545" font-size="11" font-weight="300" fill="#2e7d32" stroke="none">tick 3</text>
    <line x1="340" y1="541" x2="380" y2="541" stroke="#4527a0" stroke-width="2.5" marker-end="url(#arrow-c4)"/>
    <text x="388" y="545" font-size="11" font-weight="300" fill="#4527a0" stroke="none">tick 4</text>
    <text x="500" y="545" font-size="11" font-weight="300" fill="#444" stroke="none">— edges within one cohort fired at the same moment; tick count = number of cohorts the cascade had</text>
  </g>

</svg>
