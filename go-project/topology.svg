<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2266aa"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#228844"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8833aa"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#cc2222"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Line Topology — Next Stage</text>

  <!-- Legend -->
  <rect x="20" y="540" width="860" height="50" fill="#f0f0f0" rx="4" stroke="#ccc"/>
  <line x1="40" y1="560" x2="80" y2="560" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="90" y="564" fill="#333" font-size="11">Data (ToNext)</text>
  <line x1="220" y1="560" x2="260" y2="560" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="270" y="564" fill="#2266aa" font-size="11">Edge (XOR)</text>
  <line x1="380" y1="560" x2="420" y2="560" stroke="#228844" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="430" y="564" fill="#228844" font-size="11">Partition</text>
  <line x1="530" y1="560" x2="570" y2="560" stroke="#cc2222" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="580" y="564" fill="#cc2222" font-size="11">Stop Growing</text>
  <line x1="700" y1="560" x2="740" y2="560" stroke="#228844" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <text x="750" y="564" fill="#228844" font-size="11">Recognition</text>

  <!-- Input -->
  <rect x="20" y="100" width="70" height="40" fill="#eee" stroke="#999" rx="4"/>
  <text x="55" y="124" text-anchor="middle" fill="#555">Input</text>

  <!-- i0 - Starting Inhibitor -->
  <rect x="130" y="90" width="100" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="180" y="115" text-anchor="middle" font-weight="bold" fill="#e65100">i0</text>
  <text x="180" y="135" text-anchor="middle" font-size="10" fill="#bf360c">Starting</text>

  <!-- edn0 - Edge Node (STOP GROWING detector) -->
  <rect x="180" y="200" width="80" height="50" fill="#ffebee" stroke="#c62828" rx="20" stroke-width="2"/>
  <text x="220" y="222" text-anchor="middle" font-weight="bold" fill="#c62828">edn0</text>
  <text x="220" y="238" text-anchor="middle" font-size="10" fill="#c62828">XOR</text>

  <!-- i1 - Start of Partition -->
  <rect x="290" y="90" width="100" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="340" y="112" text-anchor="middle" font-weight="bold" fill="#e65100">i1</text>
  <text x="340" y="130" text-anchor="middle" font-size="10" fill="#bf360c">Partition</text>
  <text x="340" y="142" text-anchor="middle" font-size="9" fill="#228844">START</text>

  <!-- Partition Node -->
  <rect x="370" y="380" width="160" height="60" fill="#e8f5e9" stroke="#2e7d32" rx="6" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-weight="bold" fill="#2e7d32">p0</text>
  <text x="450" y="422" text-anchor="middle" font-size="10" fill="#1b5e20">Partition Node</text>

  <!-- edn1 - Edge Node -->
  <rect x="380" y="200" width="80" height="50" fill="#e3f2fd" stroke="#1565c0" rx="20" stroke-width="2"/>
  <text x="420" y="222" text-anchor="middle" font-weight="bold" fill="#1565c0">edn1</text>
  <text x="420" y="238" text-anchor="middle" font-size="10" fill="#0d47a1">XOR</text>

  <!-- i2 -->
  <rect x="500" y="90" width="100" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="550" y="115" text-anchor="middle" font-weight="bold" fill="#e65100">i2</text>
  <text x="550" y="135" text-anchor="middle" font-size="10" fill="#bf360c">Inhibitor</text>

  <!-- edn2 - Edge Node -->
  <rect x="590" y="200" width="80" height="50" fill="#e3f2fd" stroke="#1565c0" rx="20" stroke-width="2"/>
  <text x="630" y="222" text-anchor="middle" font-weight="bold" fill="#1565c0">edn2</text>
  <text x="630" y="238" text-anchor="middle" font-size="10" fill="#0d47a1">XOR</text>

  <!-- i3 - End of Partition -->
  <rect x="710" y="90" width="100" height="60" fill="#fff3e0" stroke="#e65100" rx="6" stroke-width="2"/>
  <text x="760" y="112" text-anchor="middle" font-weight="bold" fill="#e65100">i3</text>
  <text x="760" y="130" text-anchor="middle" font-size="10" fill="#bf360c">Partition</text>
  <text x="760" y="142" text-anchor="middle" font-size="9" fill="#228844">END</text>

  <!-- === DATA CASCADE === -->
  <line x1="90" y1="120" x2="128" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="115" x2="288" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="115" x2="498" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="115" x2="708" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- === EDGE CONNECTIONS === -->

  <!-- i0 -> edn0 -->
  <line x1="170" y1="150" x2="205" y2="198" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- edn0 -> i0 -->
  <line x1="200" y1="200" x2="165" y2="152" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- i1 -> edn0 -->
  <line x1="310" y1="150" x2="240" y2="198" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- i1 -> edn1 -->
  <line x1="370" y1="150" x2="405" y2="198" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- edn1 -> i1 -->
  <line x1="400" y1="200" x2="365" y2="152" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- i2 -> edn1 -->
  <line x1="520" y1="150" x2="440" y2="198" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- i3 -> edn2 -->
  <line x1="730" y1="150" x2="650" y2="198" stroke="#2266aa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- === STOP GROWING: edn0 -> partition === -->
  <path d="M 220 250 C 220 330, 370 360, 370 390" fill="none" stroke="#cc2222" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="270" y="320" text-anchor="middle" font-size="10" font-weight="bold" fill="#cc2222">STOP</text>
  <text x="270" y="332" text-anchor="middle" font-size="10" font-weight="bold" fill="#cc2222">GROWING</text>

  <!-- === PARTITION BIDIRECTIONAL TO EACH INHIBITOR === -->

  <!-- partition <-> i1 (start) -->
  <line x1="400" y1="380" x2="335" y2="152" stroke="#228844" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <line x1="345" y1="150" x2="410" y2="378" stroke="#228844" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- partition <-> i2 -->
  <line x1="470" y1="380" x2="540" y2="152" stroke="#228844" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <line x1="555" y1="150" x2="480" y2="378" stroke="#228844" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- partition <-> i3 (end) -->
  <line x1="530" y1="400" x2="750" y2="152" stroke="#228844" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <line x1="765" y1="150" x2="530" y2="410" stroke="#228844" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- Partition labels for start/end awareness -->
  <text x="450" y="450" text-anchor="middle" font-size="10" fill="#2e7d32">knows START (i1) and END (i3)</text>

  <!-- Recognition label -->
  <text x="550" y="340" text-anchor="middle" font-size="9" fill="#228844" font-style="italic">partial → full</text>
  <text x="550" y="352" text-anchor="middle" font-size="9" fill="#228844" font-style="italic">recognition</text>

  <!-- Signals TBD note -->
  <rect x="660" y="360" width="200" height="50" fill="#fff9c4" stroke="#f9a825" rx="4"/>
  <text x="760" y="380" text-anchor="middle" font-size="10" fill="#f57f17">Signal types TBD:</text>
  <text x="760" y="395" text-anchor="middle" font-size="9" fill="#f57f17">partial/full recognition,</text>
  <text x="760" y="407" text-anchor="middle" font-size="9" fill="#f57f17">suppression, growth end</text>
</svg>
