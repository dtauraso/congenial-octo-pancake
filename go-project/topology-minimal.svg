<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" font-family="monospace" font-size="8">
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4" fill="#555"/>
    </marker>
    <marker id="arr-r" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4" fill="#cc2222"/>
    </marker>
    <marker id="arr-g" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4" fill="#228844"/>
    </marker>
    <marker id="arr-o" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4" fill="#e65100"/>
    </marker>
  </defs>

  <rect width="280" height="280" fill="#fafafa" rx="4"/>

  <!-- ========================================= -->
  <!-- === VERTICAL (top, rotated CCW 90deg) === -->
  <!-- ========================================= -->
  <!-- chain at x=183 to align with bottom p0 -->

  <!-- p1 -->
  <circle cx="133" cy="48" r="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="133" y="51" text-anchor="middle" font-size="6" fill="#2e7d32">p1</text>

  <!-- e2, e3 -->
  <circle cx="158" cy="105" r="5" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="158" y="107" text-anchor="middle" font-size="5" fill="#c62828">e2</text>
  <circle cx="158" cy="45" r="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="158" y="47" text-anchor="middle" font-size="5" fill="#1565c0">e3</text>

  <!-- in1 -->
  <circle cx="183" cy="155" r="5" fill="#e0e0e0" stroke="#666" stroke-width="1"/>
  <text x="183" y="157" text-anchor="middle" font-size="5" fill="#333">in1</text>

  <!-- i3, i4, i5 -->
  <circle cx="183" cy="130" r="7" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="183" y="132" text-anchor="middle" font-size="6" fill="#e65100">i3</text>

  <circle cx="183" cy="75" r="7" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="183" y="77" text-anchor="middle" font-size="6" fill="#e65100">i4</text>

  <circle cx="183" cy="20" r="7" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="183" y="22" text-anchor="middle" font-size="6" fill="#e65100">i5</text>

  <!-- in1 -> i3 -->
  <line x1="183" y1="150" x2="183" y2="139" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <!-- i3 -> i4 -->
  <line x1="183" y1="123" x2="183" y2="84" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <!-- i4 -> i5 -->
  <line x1="183" y1="68" x2="183" y2="29" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>

  <!-- i3 <-> e2 -->
  <line x1="176" y1="126" x2="161" y2="110" stroke="#2266aa" stroke-width="0.5"/>
  <line x1="159" y1="108" x2="176" y2="125" stroke="#2266aa" stroke-width="0.5"/>
  <!-- i4 -> e2 -->
  <line x1="176" y1="80" x2="161" y2="110" stroke="#2266aa" stroke-width="0.5"/>
  <!-- i4 <-> e3 -->
  <line x1="176" y1="70" x2="161" y2="50" stroke="#2266aa" stroke-width="0.5"/>
  <line x1="159" y1="48" x2="176" y2="70" stroke="#2266aa" stroke-width="0.5"/>
  <!-- i5 -> e3 -->
  <line x1="176" y1="24" x2="161" y2="50" stroke="#2266aa" stroke-width="0.5"/>

  <!-- e2 -> p1 -->
  <line x1="153" y1="102" x2="140" y2="55" stroke="#cc2222" stroke-width="0.8" marker-end="url(#arr-r)"/>
  <!-- p1 -> i4 -->
  <line x1="141" y1="50" x2="174" y2="73" stroke="#228844" stroke-width="0.7" marker-end="url(#arr-g)"/>
  <!-- i5 -> p1 -->
  <path d="M 176 22 C 148 22, 133 32, 133 38" fill="none" stroke="#e65100" stroke-width="0.7" marker-end="url(#arr-o)"/>

  <!-- ========================================= -->
  <!-- === HORIZONTAL (bottom) ================= -->
  <!-- ========================================= -->

  <!-- p0 (between i1 x=150 and i2 x=215, midpoint x=183) -->
  <circle cx="183" cy="190" r="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="183" y="193" text-anchor="middle" font-size="6" fill="#2e7d32">p0</text>

  <!-- e0, e1 -->
  <circle cx="120" cy="215" r="5" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="120" y="217" text-anchor="middle" font-size="5" fill="#c62828">e0</text>
  <circle cx="185" cy="215" r="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="185" y="217" text-anchor="middle" font-size="5" fill="#1565c0">e1</text>

  <!-- in0 -->
  <circle cx="50" cy="240" r="5" fill="#e0e0e0" stroke="#666" stroke-width="1"/>
  <text x="50" y="242" text-anchor="middle" font-size="5" fill="#333">in0</text>

  <!-- i0, i1, i2 -->
  <circle cx="85" cy="240" r="7" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="85" y="242" text-anchor="middle" font-size="6" fill="#e65100">i0</text>
  <text x="85" y="255" text-anchor="middle" font-size="6" fill="#999">0</text>

  <circle cx="150" cy="240" r="7" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="150" y="242" text-anchor="middle" font-size="6" fill="#e65100">i1</text>
  <text x="150" y="255" text-anchor="middle" font-size="6" fill="#999">1</text>

  <circle cx="215" cy="240" r="7" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="215" y="242" text-anchor="middle" font-size="6" fill="#e65100">i2</text>
  <text x="215" y="255" text-anchor="middle" font-size="6" fill="#999">1</text>

  <!-- in0 -> i0 -->
  <line x1="55" y1="240" x2="76" y2="240" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <!-- i0 -> i1 -->
  <line x1="92" y1="240" x2="141" y2="240" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <!-- i1 -> i2 -->
  <line x1="157" y1="240" x2="206" y2="240" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>

  <!-- i0 <-> e0 -->
  <line x1="83" y1="233" x2="117" y2="221" stroke="#2266aa" stroke-width="0.5"/>
  <line x1="119" y1="219" x2="85" y2="233" stroke="#2266aa" stroke-width="0.5"/>
  <!-- i1 -> e0 -->
  <line x1="145" y1="233" x2="124" y2="221" stroke="#2266aa" stroke-width="0.5"/>
  <!-- i1 <-> e1 -->
  <line x1="155" y1="233" x2="182" y2="221" stroke="#2266aa" stroke-width="0.5"/>
  <line x1="184" y1="219" x2="157" y2="233" stroke="#2266aa" stroke-width="0.5"/>
  <!-- i2 -> e1 -->
  <line x1="210" y1="233" x2="189" y2="221" stroke="#2266aa" stroke-width="0.5"/>

  <!-- e0 -> p0 -->
  <line x1="125" y1="212" x2="175" y2="196" stroke="#cc2222" stroke-width="0.8" marker-end="url(#arr-r)"/>
  <!-- p0 -> i1 -->
  <line x1="178" y1="198" x2="155" y2="231" stroke="#228844" stroke-width="0.7" marker-end="url(#arr-g)"/>
  <!-- i2 -> p0 -->
  <path d="M 215 233 C 215 215, 200 198, 191 193" fill="none" stroke="#e65100" stroke-width="0.7" marker-end="url(#arr-o)"/>
</svg>
