<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="monospace" font-size="10">
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4" fill="#555"/>
    </marker>
  </defs>

  <rect width="400" height="300" fill="#1a1a2e" rx="6"/>

  <text x="200" y="22" text-anchor="middle" font-size="11" fill="#888">Shift Register Cascade — [1, 1, 0]</text>

  <!-- Static structure -->

  <!-- in0 -->
  <circle cx="40" cy="150" r="8" fill="none" stroke="#555" stroke-width="1"/>
  <text x="40" y="153" text-anchor="middle" font-size="7" fill="#555">in0</text>

  <!-- i0 -->
  <circle cx="100" cy="150" r="10" fill="none" stroke="#e65100" stroke-width="1.5" id="i0"/>
  <text x="100" y="153" text-anchor="middle" font-size="8" fill="#e65100">i0</text>

  <!-- edn0 -->
  <circle cx="160" cy="80" r="8" fill="none" stroke="#c62828" stroke-width="1"/>
  <text x="160" y="83" text-anchor="middle" font-size="7" fill="#c62828">e0</text>

  <!-- i1 -->
  <circle cx="220" cy="150" r="10" fill="none" stroke="#e65100" stroke-width="1.5" id="i1"/>
  <text x="220" y="153" text-anchor="middle" font-size="8" fill="#e65100">i1</text>

  <!-- p0 -->
  <circle cx="270" cy="60" r="10" fill="none" stroke="#2e7d32" stroke-width="1.5" id="p0"/>
  <text x="270" y="63" text-anchor="middle" font-size="8" fill="#2e7d32">p0</text>

  <!-- edn1 -->
  <circle cx="280" cy="80" r="8" fill="none" stroke="#1565c0" stroke-width="1"/>
  <text x="280" y="83" text-anchor="middle" font-size="7" fill="#1565c0">e1</text>

  <!-- i2 -->
  <circle cx="340" cy="150" r="10" fill="none" stroke="#e65100" stroke-width="1.5" id="i2"/>
  <text x="340" y="153" text-anchor="middle" font-size="8" fill="#e65100">i2</text>

  <!-- Static lines -->
  <line x1="48" y1="150" x2="88" y2="150" stroke="#333" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="110" y1="150" x2="208" y2="150" stroke="#333" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="230" y1="150" x2="328" y2="150" stroke="#333" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="105" y1="140" x2="155" y2="90" stroke="#2266aa" stroke-width="0.5"/>
  <line x1="215" y1="140" x2="165" y2="90" stroke="#2266aa" stroke-width="0.5"/>
  <line x1="225" y1="140" x2="275" y2="90" stroke="#2266aa" stroke-width="0.5"/>
  <line x1="335" y1="140" x2="285" y2="90" stroke="#2266aa" stroke-width="0.5"/>
  <line x1="163" y1="72" x2="260" y2="65" stroke="#c62828" stroke-width="0.5"/>

  <!-- ========= ANIMATION ========= -->

  <!-- Step labels -->
  <text x="200" y="280" text-anchor="middle" font-size="9" fill="#444">
    <animate attributeName="fill" values="#444;#888;#444;#444;#444;#444;#444;#444" dur="12s" repeatCount="indefinite"/>
    Step 1: input 1 → i0 holds 1
  </text>
  <text x="200" y="280" text-anchor="middle" font-size="9" fill="#444">
    <animate attributeName="fill" values="#444;#444;#444;#888;#444;#444;#444;#444" dur="12s" repeatCount="indefinite"/>
    Step 2: input 1 → i0 pushes 1 to i1, holds 1
  </text>
  <text x="200" y="280" text-anchor="middle" font-size="9" fill="#444">
    <animate attributeName="fill" values="#444;#444;#444;#444;#444;#888;#444;#444" dur="12s" repeatCount="indefinite"/>
    Step 3: input 0 → i0 pushes 1 to i1, i1 pushes 1 to i2
  </text>

  <!-- Value displays under each node -->
  <!-- i0 value -->
  <text x="100" y="175" text-anchor="middle" font-size="9" font-weight="bold">
    <animate attributeName="fill" values="#333;#ffab40;#ffab40;#ffab40;#ffab40;#ffab40;#ffab40;#ffab40" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="text-anchor" values="middle" dur="12s" repeatCount="indefinite"/>
    —
    <set attributeName="textContent" to="—" begin="0s"/>
  </text>
  <!-- i0 held value indicator -->
  <circle cx="100" cy="170" r="4" fill="none">
    <!-- Step 1: receives 1, holds 1 -->
    <animate attributeName="fill" values="none;#ffab40;#ffab40;#ffab40;#ffab40;#66bb6a;#66bb6a;none" dur="12s" repeatCount="indefinite"/>
  </circle>
  <text x="100" y="173" text-anchor="middle" font-size="7" fill="#1a1a2e">
    <animate attributeName="fill" values="#1a1a2e;#1a1a2e;#1a1a2e;#1a1a2e;#1a1a2e;#1a1a2e;#1a1a2e;#1a1a2e" dur="12s" repeatCount="indefinite"/>
  </text>

  <!-- i1 held value indicator -->
  <circle cx="220" cy="170" r="4" fill="none">
    <!-- Step 2: receives 1, holds 1 -->
    <animate attributeName="fill" values="none;none;none;#ffab40;#ffab40;#ffab40;#ffab40;none" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- i2 held value indicator -->
  <circle cx="340" cy="170" r="4" fill="none">
    <!-- Step 3: receives 1, holds 1 -->
    <animate attributeName="fill" values="none;none;none;none;none;#ffab40;#ffab40;none" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Held value text for i0 -->
  <text x="100" y="188" text-anchor="middle" font-size="8" fill="#333">
    <animate attributeName="fill" values="#333;#ffab40;#ffab40;#ffab40;#ffab40;#66bb6a;#66bb6a;#333" dur="12s" repeatCount="indefinite"/>
    <set attributeName="textContent" to="" begin="0s"/>
    <set attributeName="textContent" to="1" begin="1.5s"/>
    <set attributeName="textContent" to="1" begin="3s"/>
    <set attributeName="textContent" to="1" begin="4.5s"/>
    <set attributeName="textContent" to="0" begin="7.5s"/>
  </text>

  <!-- Held value text for i1 -->
  <text x="220" y="188" text-anchor="middle" font-size="8" fill="#333">
    <animate attributeName="fill" values="#333;#333;#333;#ffab40;#ffab40;#ffab40;#ffab40;#333" dur="12s" repeatCount="indefinite"/>
    <set attributeName="textContent" to="" begin="0s"/>
    <set attributeName="textContent" to="1" begin="4.5s"/>
  </text>

  <!-- Held value text for i2 -->
  <text x="340" y="188" text-anchor="middle" font-size="8" fill="#333">
    <animate attributeName="fill" values="#333;#333;#333;#333;#333;#ffab40;#ffab40;#333" dur="12s" repeatCount="indefinite"/>
    <set attributeName="textContent" to="" begin="0s"/>
    <set attributeName="textContent" to="1" begin="7.5s"/>
  </text>

  <!-- Traveling data pulses -->

  <!-- Pulse 1: in0 -> i0 (value 1) -->
  <circle r="3" fill="#ffab40">
    <animate attributeName="cx" values="40;100" dur="1s" begin="0.5s;12.5s" fill="freeze"/>
    <animate attributeName="cy" values="150;150" dur="1s" begin="0.5s;12.5s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" begin="0.5s;12.5s" fill="freeze"/>
  </circle>

  <!-- Pulse 2: in0 -> i0 (value 1, second) -->
  <circle r="3" fill="#ffab40">
    <animate attributeName="cx" values="40;100" dur="1s" begin="3s;15s" fill="freeze"/>
    <animate attributeName="cy" values="150;150" dur="1s" begin="3s;15s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" begin="3s;15s" fill="freeze"/>
  </circle>

  <!-- Pulse 2b: i0 -> i1 (push held 1) -->
  <circle r="3" fill="#ffab40">
    <animate attributeName="cx" values="100;220" dur="1s" begin="3.5s;15.5s" fill="freeze"/>
    <animate attributeName="cy" values="150;150" dur="1s" begin="3.5s;15.5s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" begin="3.5s;15.5s" fill="freeze"/>
  </circle>

  <!-- Pulse 3: in0 -> i0 (value 0) -->
  <circle r="3" fill="#66bb6a">
    <animate attributeName="cx" values="40;100" dur="1s" begin="6s;18s" fill="freeze"/>
    <animate attributeName="cy" values="150;150" dur="1s" begin="6s;18s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" begin="6s;18s" fill="freeze"/>
  </circle>

  <!-- Pulse 3b: i0 -> i1 (push held 1) -->
  <circle r="3" fill="#ffab40">
    <animate attributeName="cx" values="100;220" dur="1s" begin="6.5s;18.5s" fill="freeze"/>
    <animate attributeName="cy" values="150;150" dur="1s" begin="6.5s;18.5s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" begin="6.5s;18.5s" fill="freeze"/>
  </circle>

  <!-- Pulse 3c: i1 -> i2 (push held 1) -->
  <circle r="3" fill="#ffab40">
    <animate attributeName="cx" values="220;340" dur="1s" begin="7s;19s" fill="freeze"/>
    <animate attributeName="cy" values="150;150" dur="1s" begin="7s;19s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" begin="7s;19s" fill="freeze"/>
  </circle>

  <!-- Pulse: i0 -> edn0 (contrast check) -->
  <circle r="2" fill="#c62828">
    <animate attributeName="cx" values="105;160" dur="0.5s" begin="4s;16s" fill="freeze"/>
    <animate attributeName="cy" values="140;85" dur="0.5s" begin="4s;16s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1s" begin="4s;16s" fill="freeze"/>
  </circle>

  <!-- Pulse: edn0 -> p0 (contrast=1, start growing) -->
  <circle r="2" fill="#2e7d32">
    <animate attributeName="cx" values="165;265" dur="0.5s" begin="4.8s;16.8s" fill="freeze"/>
    <animate attributeName="cy" values="78;63" dur="0.5s" begin="4.8s;16.8s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1s" begin="4.8s;16.8s" fill="freeze"/>
  </circle>

  <!-- p0 glow on start growing -->
  <circle cx="270" cy="60" r="14" fill="none" stroke="#2e7d32" stroke-width="0" opacity="0">
    <animate attributeName="stroke-width" values="0;2;0" dur="1.5s" begin="5.3s;17.3s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="5.3s;17.3s" fill="freeze"/>
  </circle>

  <!-- p0 state text -->
  <text x="270" y="45" text-anchor="middle" font-size="7" fill="#333">
    <animate attributeName="fill" values="#333;#333;#333;#333;#2e7d32;#2e7d32;#2e7d32;#333" dur="12s" repeatCount="indefinite"/>
    <set attributeName="textContent" to="" begin="0s"/>
    <set attributeName="textContent" to="Growing" begin="5.3s"/>
  </text>

  <!-- Final state label -->
  <text x="200" y="220" text-anchor="middle" font-size="8" fill="#333">
    <animate attributeName="fill" values="#333;#333;#333;#333;#333;#333;#888;#888" dur="12s" repeatCount="indefinite"/>
    <set attributeName="textContent" to="" begin="0s"/>
    <set attributeName="textContent" to="settled: i0=0  i1=1  i2=1" begin="9s"/>
  </text>
</svg>
