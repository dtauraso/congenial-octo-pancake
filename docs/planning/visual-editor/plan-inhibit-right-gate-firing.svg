<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "plan-inhibit-right-gate-firing",
    "title": "InhibitRightGate firing trace — slot phases and run() decision",
    "nodes": [
      {"id": "i0",            "role": "inhibitor",         "note": "i1 fires first in cascade (like cascade SVG); i0 fires second"},
      {"id": "i1",            "role": "inhibitor",         "note": "fires first — sends to inhibitRight0.left"},
      {"id": "inhibitRight0", "role": "inhibit-right-gate","slots": ["left","right"],"output": "out"}
    ],
    "rounds": [
      {
        "id": "round1",
        "label": "Round 1 — both fill (L=1, R=1) — gate does NOT fire",
        "steps": [
          {"t": 0, "event": "start: left=empty, right=empty"},
          {"t": 1, "event": "i0 fires → sends to right slot (inhibitOut)"},
          {"t": 2, "event": "right=filled(1); i1 fires → sends to left slot"},
          {"t": 3, "event": "left=filled(1); run(): R filled → gate skips"},
          {"t": 4, "event": "left consumed, right consumed; no out pulse"}
        ]
      },
      {
        "id": "round2",
        "label": "Round 2 — only left fills (L=1, R=0) — gate fires",
        "steps": [
          {"t": 0, "event": "start: left=empty, right=empty"},
          {"t": 1, "event": "i1 fires → sends to left slot (inhibitOut)"},
          {"t": 2, "event": "left=filled(1); right still empty; run(): L=1,R=empty → fire"},
          {"t": 3, "event": "left consumed; out wire loaded(1) — pulse emitted"}
        ]
      }
    ],
    "decisions": [
      {"id": "risk2", "text": "Is firing when R never arrives the intended behavior?", "status": "confirm intent"}
    ]
  }
  </metadata>

  <desc>
Two-round slot-phase trace for inhibitRight0 (InhibitRightGate).
Round 1 (top): i0 → right, i1 → left; both fill; R=1 so gate skips; both slots consumed, no pulse.
Round 2 (bottom): only i1 → left fills; right stays empty; L=1 AND R=empty → gate fires, out loaded(1).
Trigger: left filled AND right empty AND out canAccept → consume left, load 1 on out.
Cascade timing: i1 fires before i0 (matching topology-chain-cascade.svg i1-fires-first order).
DECISION R2 box: confirm fire-on-L-alone is intended behavior.
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }
    .diagram-bg    { fill: #fafafa; }
    .row-bg-no     { fill: #fff8f8; stroke: #e0b0b0; stroke-width: 1; }
    .row-bg-yes    { fill: #f8fff8; stroke: #a0c8a0; stroke-width: 1; }

    .slot-empty    { fill: #f5f5f5; stroke: #ccc;    stroke-width: 1.5; }
    .slot-filled   { fill: #fce4ec; stroke: #880e4f; stroke-width: 1.5; }
    .slot-consumed { fill: #e8f5e9; stroke: #388e3c; stroke-width: 1.5; }

    .slot-label    { font-size: 10px; text-anchor: middle; }
    .phase-label   { font-size: 11px; text-anchor: middle; }
    .event-label   { font-size: 9px;  text-anchor: middle; }
    .row-title     { font-size: 11px; text-anchor: start; }

    .wire-in       { stroke: #880e4f; stroke-width: 1.5; fill: none; marker-end: url(#arrow-pink); }
    .wire-out      { stroke: #283593; stroke-width: 1.5; fill: none; marker-end: url(#arrow-indigo); }
    .wire-blocked  { stroke: #ccc;    stroke-width: 1.5; fill: none; stroke-dasharray: 4 3; }

    .outcome-yes   { font-size: 11px; fill: #2e7d32; text-anchor: middle; }
    .outcome-no    { font-size: 11px; fill: #c62828; text-anchor: middle; }

    .trigger-rule-bg   { fill: #e8f4fd; stroke: #1565c0; stroke-width: 1; }
    .trigger-rule-text { font-size: 10px; fill: #1565c0; text-anchor: middle; }

    .col-sep    { stroke: #e0e0e0; stroke-width: 1; stroke-dasharray: 3 3; }
    .axis-label { font-size: 9px;  fill: #999; text-anchor: middle; }

    .title-text { font-size: 14px; font-weight: 600; fill: #222; text-anchor: middle; }

    /* ── DECISION badge ── */
    .decision-bg         { fill: #fff3cd; stroke: #b45309; stroke-width: 1.5; }
    .decision-badge      { fill: #b45309; }
    .decision-badge-text { font-size: 9px; font-weight: 700; fill: #fff; text-anchor: middle; }
    .decision-body       { font-size: 10px; fill: #7c3a00; text-anchor: start; }
  </style>

  <defs>
    <marker id="arrow-pink"   markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#880e4f"/></marker>
    <marker id="arrow-indigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#283593"/></marker>
  </defs>

  <!-- Background -->
  <rect class="diagram-bg" x="0" y="0" width="880" height="520" rx="8"/>
  <text class="title-text" x="440" y="22" font-weight="600" fill="#222" stroke="none">InhibitRightGate — Slot Phases and run() Decision</text>

  <!-- Trigger rule banner -->
  <rect class="trigger-rule-bg" x="10" y="34" width="860" height="18" rx="4"/>
  <text class="trigger-rule-text" x="440" y="47" font-weight="300" stroke="none">Trigger: left=filled AND right=empty AND out.canAccept → consume left, load 1 on out wire   |   Cascade order: i1 fires before i0</text>

  <!-- ── Column phase labels (shared) ── -->
  <!-- columns at x≈85, 195, 330, 460, 590, 720 -->
  <text class="phase-label" x="85"  y="68" font-weight="600" fill="#333" stroke="none">t=0 start</text>
  <text class="phase-label" x="210" y="68" font-weight="600" fill="#333" stroke="none">t=1 i0 sends→R</text>
  <text class="phase-label" x="345" y="68" font-weight="600" fill="#333" stroke="none">t=2 i1 sends→L</text>
  <text class="phase-label" x="490" y="68" font-weight="600" fill="#333" stroke="none">t=3 run()</text>
  <text class="phase-label" x="650" y="68" font-weight="600" fill="#333" stroke="none">outcome</text>

  <!-- Column separator lines -->
  <line class="col-sep" x1="140" y1="60" x2="140" y2="415"/>
  <line class="col-sep" x1="275" y1="60" x2="275" y2="415"/>
  <line class="col-sep" x1="415" y1="60" x2="415" y2="415"/>
  <line class="col-sep" x1="555" y1="60" x2="555" y2="415"/>

  <!-- ═══════ ROUND 1: both fill, no fire ═══════ -->
  <rect class="row-bg-no" x="10" y="75" width="860" height="160" rx="6"/>
  <text class="row-title" x="18" y="91" font-weight="600" fill="#c62828" stroke="none">Round 1 — i0→right, i1→left; L=1 R=1 → gate skips, no pulse</text>

  <!-- t=0: both empty -->
  <rect class="slot-empty" x="55"  y="100" width="60" height="22" rx="3"/>
  <text class="slot-label" x="85"  y="115" font-weight="300" fill="#999" stroke="none">left: ∅</text>
  <rect class="slot-empty" x="55"  y="127" width="60" height="22" rx="3"/>
  <text class="slot-label" x="85"  y="142" font-weight="300" fill="#999" stroke="none">right: ∅</text>
  <text class="event-label" x="85"  y="162" font-weight="300" fill="#555" stroke="none">both empty</text>

  <!-- wire: i0 → right slot (t=0→1) -->
  <line class="wire-in" x1="120" y1="138" x2="168" y2="138"/>
  <text class="axis-label" x="144" y="155" stroke="none">i0.inhibitOut</text>

  <!-- t=1: right filled -->
  <rect class="slot-empty"  x="175" y="100" width="60" height="22" rx="3"/>
  <text class="slot-label"  x="205" y="115" font-weight="300" fill="#999"    stroke="none">left: ∅</text>
  <rect class="slot-filled" x="175" y="127" width="60" height="22" rx="3"/>
  <text class="slot-label"  x="205" y="142" font-weight="300" fill="#880e4f" stroke="none">right: 1</text>
  <text class="event-label" x="205" y="162" font-weight="300" fill="#555"    stroke="none">right filled</text>

  <!-- wire: i1 → left slot (t=1→2) -->
  <line class="wire-in" x1="240" y1="111" x2="308" y2="111"/>
  <text class="axis-label" x="274" y="128" stroke="none">i1.inhibitOut</text>

  <!-- t=2: both filled -->
  <rect class="slot-filled" x="315" y="100" width="60" height="22" rx="3"/>
  <text class="slot-label"  x="345" y="115" font-weight="300" fill="#880e4f" stroke="none">left: 1</text>
  <rect class="slot-filled" x="315" y="127" width="60" height="22" rx="3"/>
  <text class="slot-label"  x="345" y="142" font-weight="300" fill="#880e4f" stroke="none">right: 1</text>
  <text class="event-label" x="345" y="162" font-weight="300" fill="#555"    stroke="none">both filled; run()</text>

  <!-- run(): R=1 → skip -->
  <rect class="slot-consumed" x="455" y="100" width="60" height="22" rx="3"/>
  <text class="slot-label"    x="485" y="115" font-weight="300" fill="#2e7d32" stroke="none">left: ✓</text>
  <rect class="slot-consumed" x="455" y="127" width="60" height="22" rx="3"/>
  <text class="slot-label"    x="485" y="142" font-weight="300" fill="#2e7d32" stroke="none">right: ✓</text>
  <text class="event-label"   x="485" y="162" font-weight="300" fill="#555"    stroke="none">both consumed silently</text>

  <!-- wire blocked -->
  <line class="wire-blocked" x1="517" y1="111" x2="580" y2="111"/>

  <!-- outcome: no fire -->
  <text class="outcome-no" x="720" y="110" font-weight="600" stroke="none">left=1 AND right=empty?</text>
  <text class="outcome-no" x="720" y="126" font-weight="600" stroke="none">NO — right filled</text>
  <text class="outcome-no" x="720" y="142" font-weight="600" stroke="none">no pulse emitted</text>
  <text class="outcome-no" x="720" y="158" font-weight="300" fill="#c62828" stroke="none">(right consumed silently)</text>

  <!-- ═══════ ROUND 2: only L fills, gate fires ═══════ -->
  <rect class="row-bg-yes" x="10" y="245" width="860" height="160" rx="6"/>
  <text class="row-title" x="18" y="261" font-weight="600" fill="#2e7d32" stroke="none">Round 2 — only i1→left; i0 does not fire; L=1 R=∅ → gate fires, out loaded(1)</text>

  <!-- t=0: both empty -->
  <rect class="slot-empty" x="55"  y="270" width="60" height="22" rx="3"/>
  <text class="slot-label" x="85"  y="285" font-weight="300" fill="#999" stroke="none">left: ∅</text>
  <rect class="slot-empty" x="55"  y="297" width="60" height="22" rx="3"/>
  <text class="slot-label" x="85"  y="312" font-weight="300" fill="#999" stroke="none">right: ∅</text>
  <text class="event-label" x="85"  y="332" font-weight="300" fill="#555" stroke="none">both empty</text>
  <text class="event-label" x="85"  y="343" font-weight="300" fill="#999" stroke="none">(i0 did not fire)</text>

  <!-- t=1: no right wire this round — skip col 1, show empty at t=1 too -->
  <rect class="slot-empty" x="175" y="270" width="60" height="22" rx="3"/>
  <text class="slot-label" x="205" y="285" font-weight="300" fill="#999"    stroke="none">left: ∅</text>
  <rect class="slot-empty" x="175" y="297" width="60" height="22" rx="3"/>
  <text class="slot-label" x="205" y="312" font-weight="300" fill="#999"    stroke="none">right: ∅</text>
  <text class="event-label" x="205" y="332" font-weight="300" fill="#aaa"    stroke="none">i0 silent this round</text>

  <!-- wire: i1 → left (t=1→2) -->
  <line class="wire-in" x1="240" y1="281" x2="308" y2="281"/>
  <text class="axis-label" x="274" y="298" stroke="none">i1.inhibitOut</text>

  <!-- t=2: left filled, right empty -->
  <rect class="slot-filled" x="315" y="270" width="60" height="22" rx="3"/>
  <text class="slot-label"  x="345" y="285" font-weight="300" fill="#880e4f" stroke="none">left: 1</text>
  <rect class="slot-empty"  x="315" y="297" width="60" height="22" rx="3"/>
  <text class="slot-label"  x="345" y="312" font-weight="300" fill="#999"    stroke="none">right: ∅</text>
  <text class="event-label" x="345" y="332" font-weight="300" fill="#555"    stroke="none">left filled; run()</text>
  <text class="event-label" x="345" y="343" font-weight="300" fill="#2e7d32" stroke="none">right empty → fire!</text>

  <!-- out wire pulse -->
  <line class="wire-out" x1="377" y1="281" x2="510" y2="281"/>
  <text class="axis-label" x="444" y="296" stroke="none">out wire loaded(1)</text>

  <!-- t=3: left consumed, right still empty -->
  <rect class="slot-consumed" x="455" y="270" width="60" height="22" rx="3"/>
  <text class="slot-label"    x="485" y="285" font-weight="300" fill="#2e7d32" stroke="none">left: ✓</text>
  <rect class="slot-empty"    x="455" y="297" width="60" height="22" rx="3"/>
  <text class="slot-label"    x="485" y="312" font-weight="300" fill="#999"    stroke="none">right: ∅</text>
  <text class="event-label"   x="485" y="332" font-weight="300" fill="#555"    stroke="none">left consumed</text>
  <text class="event-label"   x="485" y="343" font-weight="300" fill="#2e7d32" stroke="none">out wire → pulse</text>

  <!-- outcome: fires -->
  <text class="outcome-yes" x="720" y="280" font-weight="600" stroke="none">left=1 AND right=empty?</text>
  <text class="outcome-yes" x="720" y="296" font-weight="600" stroke="none">YES</text>
  <text class="outcome-yes" x="720" y="312" font-weight="600" stroke="none">consume left</text>
  <text class="outcome-yes" x="720" y="328" font-weight="600" stroke="none">load 1 on out wire ✓</text>

  <!-- ═══════ SUBSTRATE NOTE ═══════ -->
  <rect x="10" y="415" width="860" height="20" rx="4" fill="#f0f4ff" stroke="#c5cef0" stroke-width="1"/>
  <text x="440" y="429" font-size="9" text-anchor="middle" font-weight="300" fill="#3949ab" stroke="none">Substrate: wire arrival writes slot (filled); run() evaluates; consuming = node-local transition filled→empty. No central walker. out.canAccept checked before emitting.</text>

  <!-- ═══════ DECISION R2 ═══════ -->
  <g id="decision-risk2" data-role="decision" data-risk="2">
    <rect class="decision-bg" x="10" y="445" width="860" height="52" rx="5"/>
    <rect class="decision-badge" x="10" y="445" width="72" height="16" rx="3"/>
    <text class="decision-badge-text" x="46" y="456" stroke="none">DECISION R2</text>
    <text class="decision-body" x="90" y="457" font-weight="300" stroke="none">Round 2 shows gate firing when right never arrives in that round (i0 did not fire). This is correct per INHIBIT(L=1, R=0) semantics:</text>
    <text class="decision-body" x="18" y="472" font-weight="300" stroke="none">if the inhibiting signal is absent, the gate passes. Confirm this matches intended circuit behavior before landing §3 (InhibitRightGateBody).</text>
    <text class="decision-body" x="18" y="487" font-weight="300" stroke="none">If intent is "gate must receive right before deciding", a timeout/wait mechanism would be needed — that is a larger model change.</text>
  </g>

</svg>
