<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="400">
  <metadata>
{
  "title": "Pause as a substrate property",
  "panels": [
    {
      "id": "local",
      "label": "Local pause (current)",
      "nodes": [
        {"id": "in0-L", "role": "input"},
        {"id": "readGate-L", "role": "gate"},
        {"id": "i0-L", "role": "inhibitor"},
        {"id": "i1-L", "role": "inhibitor"}
      ],
      "edges": [
        {"id": "in0ToReadGate-L", "source": "in0-L", "target": "readGate-L", "paused": true},
        {"id": "readGateToI0-L", "source": "readGate-L", "target": "i0-L", "paused": false},
        {"id": "i0ToI1-L", "source": "i0-L", "target": "i1-L", "paused": false}
      ],
      "pauseScope": "single-wire"
    },
    {
      "id": "substrate",
      "label": "Substrate pause (target)",
      "nodes": [
        {"id": "in0-S", "role": "input"},
        {"id": "readGate-S", "role": "gate"},
        {"id": "i0-S", "role": "inhibitor"},
        {"id": "i1-S", "role": "inhibitor"}
      ],
      "edges": [
        {"id": "in0ToReadGate-S", "source": "in0-S", "target": "readGate-S", "paused": true},
        {"id": "readGateToI0-S", "source": "readGate-S", "target": "i0-S", "paused": true},
        {"id": "i0ToI1-S", "source": "i0-S", "target": "i1-S", "paused": true}
      ],
      "pauseScope": "all-wires"
    }
  ],
  "claim": "Pause is a property of wire advancement, not of any node. Lifting it from one wire to the substrate layer makes pause compose with self-sustaining loops for free."
}
  </metadata>
  <desc>
Two panels contrasting pause scope.
Left: pause currently halts only in0->readGate; other wires keep advancing.
Right: pause halts every wire's pulse uniformly; no node knows pause exists.
Frozen pulse = filled circle with dashed halo. Live pulse = filled circle.
Pause control sits at the substrate layer (bottom band), not on any node.
  </desc>

  <defs>
    <marker id="arrow" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#333"/>
    </marker>
    <style>
      .diagram-bg { fill: #fafafa; }
      .panel-bg { fill: #ffffff; stroke: #ddd; stroke-width: 1; }
      .panel-bg-wrong { fill: #fff5f5; stroke: #e0b4b4; stroke-width: 1; }
      .panel-bg-right { fill: #f3faf4; stroke: #b4d4b4; stroke-width: 1; }
      .title-text { font-size: 16px; font-weight: 600; fill: #222; text-anchor: middle; }
      .panel-title { font-size: 13px; font-weight: 600; text-anchor: middle; }
      .shape-input { fill: #e0e0e0; stroke: #666; stroke-width: 2; }
      .shape-gate { fill: #e0f7fa; stroke: #00838f; stroke-width: 2; }
      .shape-inhibitor { fill: #fff3e0; stroke: #e65100; stroke-width: 2; }
      .wire-live { stroke: #333; stroke-width: 1.5; fill: none; }
      .wire-paused { stroke: #888; stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
      .pulse-live { fill: #2266aa; stroke: none; }
      .pulse-frozen { fill: #2266aa; stroke: #2266aa; stroke-width: 1; stroke-dasharray: 2 2; fill-opacity: 0.6; }
      .substrate-band { fill: #f0e9ff; stroke: #7b1fa2; stroke-width: 1.5; }
      .substrate-band-inactive { fill: #f5f5f5; stroke: #bbb; stroke-width: 1; stroke-dasharray: 3 3; }
      .substrate-label { font-size: 11px; font-weight: 600; fill: #7b1fa2; text-anchor: middle; }
      .substrate-label-inactive { font-size: 11px; font-weight: 400; fill: #888; text-anchor: middle; }
      .note { font-size: 11px; fill: #555; text-anchor: middle; }
      .pause-icon { fill: #7b1fa2; }
      .pause-icon-weak { fill: #c62828; }
    </style>
  </defs>

  <rect class="diagram-bg" x="0" y="0" width="980" height="460" rx="8"/>
  <text class="title-text" x="490" y="28">Pause as a property of wire advancement</text>

  <!-- ═══════════ LEFT PANEL: local pause (current) ═══════════ -->
  <g id="panel-local" data-role="panel" data-variant="wrong">
    <rect class="panel-bg-wrong" x="30" y="60" width="440" height="370" rx="8"/>
    <text class="panel-title" x="250" y="84" fill="#c62828">Local pause (current)</text>
    <text class="note" x="250" y="102">pause lives on one wire; other wires keep running</text>

    <!-- nodes -->
    <g id="node-in0-L" data-role="input">
      <rect class="shape-input" x="60" y="160" width="70" height="50" rx="6"/>
      <text x="95" y="190" font-size="12" font-weight="100" text-anchor="middle" fill="#444" stroke="none">in0</text>
    </g>
    <g id="node-readGate-L" data-role="gate">
      <rect class="shape-gate" x="180" y="160" width="80" height="50" rx="6"/>
      <text x="220" y="190" font-size="12" font-weight="100" text-anchor="middle" fill="#00838f" stroke="none">readGate</text>
    </g>
    <g id="node-i0-L" data-role="inhibitor">
      <rect class="shape-inhibitor" x="300" y="160" width="60" height="50" rx="6"/>
      <text x="330" y="190" font-size="12" font-weight="100" text-anchor="middle" fill="#e65100" stroke="none">i0</text>
    </g>
    <g id="node-i1-L" data-role="inhibitor">
      <rect class="shape-inhibitor" x="390" y="160" width="60" height="50" rx="6"/>
      <text x="420" y="190" font-size="12" font-weight="100" text-anchor="middle" fill="#e65100" stroke="none">i1</text>
    </g>

    <!-- wires -->
    <g id="edge-in0ToReadGate-L" data-role="wire" data-paused="true">
      <line class="wire-paused" x1="132" y1="185" x2="178" y2="185" marker-end="url(#arrow)"/>
      <circle class="pulse-frozen" cx="155" cy="185" r="5"/>
      <text class="note" x="155" y="165" fill="#c62828">PAUSED</text>
    </g>
    <g id="edge-readGateToI0-L" data-role="wire" data-paused="false">
      <line class="wire-live" x1="262" y1="185" x2="298" y2="185" marker-end="url(#arrow)"/>
      <circle class="pulse-live" cx="280" cy="185" r="5"/>
      <text class="note" x="280" y="165">live</text>
    </g>
    <g id="edge-i0ToI1-L" data-role="wire" data-paused="false">
      <line class="wire-live" x1="362" y1="185" x2="388" y2="185" marker-end="url(#arrow)"/>
      <circle class="pulse-live" cx="375" cy="165" r="5"/>
      <text class="note" x="375" y="148">live</text>
    </g>

    <!-- pause "control" — attached to one wire only -->
    <g id="pause-local">
      <rect x="135" y="245" width="40" height="28" rx="4" fill="#fff" stroke="#c62828" stroke-width="1.5"/>
      <path d="M145,251 L145,267 M155,251 L155,267 M165,251 L165,267" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text class="note" x="155" y="290" fill="#c62828">pause (this wire only)</text>
      <line x1="155" y1="243" x2="155" y2="200" stroke="#c62828" stroke-width="1" stroke-dasharray="2 2"/>
    </g>

    <!-- substrate band (not engaged) -->
    <g id="substrate-local">
      <rect class="substrate-band-inactive" x="50" y="370" width="400" height="36" rx="6"/>
      <text class="substrate-label-inactive" x="250" y="392">substrate layer — pause does not live here</text>
    </g>
  </g>

  <!-- ═══════════ RIGHT PANEL: substrate pause (target) ═══════════ -->
  <g id="panel-substrate" data-role="panel" data-variant="right">
    <rect class="panel-bg-right" x="510" y="60" width="440" height="370" rx="8"/>
    <text class="panel-title" x="730" y="84" fill="#2e7d32">Substrate pause (target)</text>
    <text class="note" x="730" y="102">pause halts all wire advancement; no node knows</text>

    <!-- nodes -->
    <g id="node-in0-S" data-role="input">
      <rect class="shape-input" x="540" y="160" width="70" height="50" rx="6"/>
      <text x="575" y="190" font-size="12" font-weight="100" text-anchor="middle" fill="#444" stroke="none">in0</text>
    </g>
    <g id="node-readGate-S" data-role="gate">
      <rect class="shape-gate" x="660" y="160" width="80" height="50" rx="6"/>
      <text x="700" y="190" font-size="12" font-weight="100" text-anchor="middle" fill="#00838f" stroke="none">readGate</text>
    </g>
    <g id="node-i0-S" data-role="inhibitor">
      <rect class="shape-inhibitor" x="780" y="160" width="60" height="50" rx="6"/>
      <text x="810" y="190" font-size="12" font-weight="100" text-anchor="middle" fill="#e65100" stroke="none">i0</text>
    </g>
    <g id="node-i1-S" data-role="inhibitor">
      <rect class="shape-inhibitor" x="870" y="160" width="60" height="50" rx="6"/>
      <text x="900" y="190" font-size="12" font-weight="100" text-anchor="middle" fill="#e65100" stroke="none">i1</text>
    </g>

    <!-- wires (all paused) -->
    <g id="edge-in0ToReadGate-S" data-role="wire" data-paused="true">
      <line class="wire-paused" x1="612" y1="185" x2="658" y2="185" marker-end="url(#arrow)"/>
      <circle class="pulse-frozen" cx="635" cy="185" r="5"/>
    </g>
    <g id="edge-readGateToI0-S" data-role="wire" data-paused="true">
      <line class="wire-paused" x1="742" y1="185" x2="778" y2="185" marker-end="url(#arrow)"/>
      <circle class="pulse-frozen" cx="760" cy="185" r="5"/>
    </g>
    <g id="edge-i0ToI1-S" data-role="wire" data-paused="true">
      <line class="wire-paused" x1="842" y1="185" x2="868" y2="185" marker-end="url(#arrow)"/>
      <circle class="pulse-frozen" cx="855" cy="170" r="5"/>
    </g>
    <text class="note" x="730" y="148" fill="#7b1fa2">all wire pulses frozen in place</text>

    <!-- substrate band engaged -->
    <g id="substrate-substrate">
      <rect class="substrate-band" x="530" y="370" width="400" height="36" rx="6"/>
      <text class="substrate-label" x="730" y="385">substrate layer — wire advancement gate</text>
      <g id="pause-icon-substrate">
        <rect x="710" y="392" width="40" height="12" rx="3" fill="#fff" stroke="#7b1fa2" stroke-width="1.2"/>
        <path d="M720,395 L720,401 M730,395 L730,401 M740,395 L740,401" stroke="#7b1fa2" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </g>
      <!-- substrate gates every wire uniformly -->
      <line x1="635" y1="368" x2="635" y2="220" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="2 2"/>
      <line x1="760" y1="368" x2="760" y2="220" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="2 2"/>
      <line x1="855" y1="368" x2="855" y2="220" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="2 2"/>
    </g>
  </g>

  <!-- bottom annotation -->
  <text class="note" x="490" y="448" font-size="11" fill="#555">
    Pause belongs at the layer that drives wire advancement (the tick driver / wire RAF), not on any node. Then self-sustaining loops pause for free.
  </text>
</svg>
