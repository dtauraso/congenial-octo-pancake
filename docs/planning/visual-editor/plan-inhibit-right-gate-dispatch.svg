    <text class="box-sublabel" x="392" y="219" font-weight="300" fill="#880e4f" stroke="none">new — concept-bounded</text>
    <text class="box-sublabel" x="392" y="232" font-weight="300" fill="#880e4f" stroke="none">InhibitRightGateBody</text>
  </g>

