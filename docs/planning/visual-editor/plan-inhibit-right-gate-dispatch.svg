    <text class="box-sublabel" x="100" y="89" font-weight="300" fill="#388e3c" stroke="none">schema — already present</text>
    <text class="box-sublabel" x="100" y="102" font-weight="300" fill="#388e3c" stroke="none">InhibitRightGate entry ✓</text>
  </g>

