  </g>

  <!-- ═══════ DECISION R1 — three options ═══════ -->
  <g id="decision-risk1" data-role="decision" data-risk="1">
    <rect class="decision-bg" x="10" y="410" width="880" height="235" rx="5"/>
    <rect class="decision-badge" x="10" y="410" width="72" height="16" rx="3"/>
    <text class="decision-badge-text" x="46" y="421" stroke="none">DECISION R1</text>
    <text class="decision-section-hdr" x="90" y="422" stroke="none">ChainInhibitorBody second output wire — choose one structure for KindBodyCtx before writing code</text>

    <!-- Option (a): array -->
    <g id="option-a" data-role="option" data-option="a">
      <rect class="option-box" x="18" y="435" width="270" height="155" rx="4"/>
      <text class="option-label" x="153" y="452" stroke="none">(a) outWireRefs: WireRef[]</text>
      <text class="option-code" x="26" y="470" stroke="none">KindBodyCtx {</text>
      <text class="option-code" x="26" y="483" stroke="none">  outWireRefs: WireRef[]</text>
      <text class="option-code" x="26" y="496" stroke="none">  // [0] = out, [1] = inhibitOut</text>
      <text class="option-code" x="26" y="509" stroke="none">}</text>
      <text class="option-code" x="26" y="525" stroke="none">// usage:</text>
      <text class="option-code" x="26" y="538" stroke="none">outWireRefs[0].load(1) // out</text>
      <text class="option-code" x="26" y="551" stroke="none">outWireRefs[1].load(1) // inhibitOut</text>
      <text class="option-lean" x="153" y="572" stroke="none">compact; positional; brittle ordering</text>
    </g>

    <!-- Option (b): named map -->
    <g id="option-b" data-role="option" data-option="b">
      <rect class="option-box" x="310" y="435" width="278" height="155" rx="4"/>
      <text class="option-label" x="449" y="452" stroke="none">(b) outWireRefs: { main, inhibitOut }</text>
      <text class="option-code" x="318" y="470" stroke="none">KindBodyCtx {</text>
      <text class="option-code" x="318" y="483" stroke="none">  outWireRefs: {</text>
      <text class="option-code" x="318" y="496" stroke="none">    main: WireRef</text>
      <text class="option-code" x="318" y="509" stroke="none">    inhibitOut: WireRef</text>
      <text class="option-code" x="318" y="522" stroke="none">  }</text>
      <text class="option-code" x="318" y="535" stroke="none">}</text>
      <text class="option-code" x="318" y="551" stroke="none">outWireRefs.main.load(1)</text>
      <text class="option-lean" x="449" y="572" stroke="none">named; requires map every call-site</text>
    </g>

    <!-- Option (c): second named field -->
    <g id="option-c" data-role="option" data-option="c">
      <rect class="option-box" x="610" y="435" width="272" height="155" rx="4"/>
      <text class="option-label" x="746" y="452" stroke="none">(c) separate named fields</text>
      <text class="option-code" x="618" y="470" stroke="none">KindBodyCtx {</text>
      <text class="option-code" x="618" y="483" stroke="none">  outWireRef: WireRef        // out</text>
      <text class="option-code" x="618" y="496" stroke="none">  inhibitOutWireRef: WireRef // inhibitOut</text>
      <text class="option-code" x="618" y="509" stroke="none">}</text>
      <text class="option-code" x="618" y="525" stroke="none">// usage:</text>
      <text class="option-code" x="618" y="538" stroke="none">outWireRef.load(1)</text>
      <text class="option-code" x="618" y="551" stroke="none">inhibitOutWireRef.load(1)</text>
      <text class="option-lean" x="746" y="572" stroke="none">no rename; explicit; grows with ports</text>
    </g>

    <text class="decision-body" x="18" y="628" font-weight="300" stroke="none">Plan leans: NONE — open. Pick (a) if future kinds may have N outputs; pick (c) if named ports are the norm; pick (b) as middle ground.</text>
    <text class="decision-body" x="18" y="643" font-weight="300" stroke="none">Decision must be made before writing ChainInhibitorBody change (§5 of plan).</text>
  </g>

  <!-- ═══════ LEGEND ═══════ -->
  <g id="legend" data-role="legend">
