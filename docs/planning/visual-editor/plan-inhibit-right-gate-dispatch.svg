    <text class="box-sublabel" x="672" y="89" font-weight="300" fill="#1565c0" stroke="none">+ case 'inhibitrightgate'</text>
    <text class="box-sublabel" x="672" y="102" font-weight="300" fill="#1565c0" stroke="none">in renderKindBody</text>
  </g>

  <!-- ChainInhibitor body (decision pending) -->
  <g id="file-chain-inhibitor" data-role="kind-impl" data-status="maybe">
    <rect class="box-maybe" x="580" y="180" width="185" height="60" rx="6"/>
    <text class="box-label" x="672" y="203" font-weight="600" fill="#7b1fa2" stroke="none">ChainInhibitor body</text>
    <text class="box-sublabel" x="672" y="219" font-weight="300" fill="#7b1fa2" stroke="none">inhibitOut handle</text>
    <text class="box-sublabel" x="672" y="232" font-weight="300" fill="#7b1fa2" stroke="none">⬇ DECISION R1 below</text>
  </g>

