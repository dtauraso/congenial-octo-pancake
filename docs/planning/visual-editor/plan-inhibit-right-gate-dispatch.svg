    <text class="box-label" x="380" y="73" font-weight="600" fill="#1565c0" stroke="none">spec.ts</text>
    <text class="box-sublabel" x="380" y="89" font-weight="300" fill="#1565c0" stroke="none">+ RNodeKind union</text>
    <text class="box-sublabel" x="380" y="102" font-weight="300" fill="#1565c0" stroke="none">+ toRNodeKind + PORTS</text>
  </g>

