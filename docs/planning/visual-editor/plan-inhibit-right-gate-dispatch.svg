<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "plan-inhibit-right-gate-dispatch",
    "title": "File-level change map for InhibitRightGate landing",
    "files": [
      {"id": "node-types",    "role": "schema",    "status": "exists", "note": "InhibitRightGate entry present"},
      {"id": "spec-ts",       "role": "spec",      "status": "add",    "note": "extend RNodeKind, toRNodeKind, NODE_KIND_PORTS"},
      {"id": "new-kind-file", "role": "kind-impl", "status": "create", "note": "inhibit-right-gate.tsx — InhibitRightGateBody"},
      {"id": "node-kinds",    "role": "dispatch",  "status": "add",    "note": "renderKindBody case 'inhibitrightgate'"},
      {"id": "chain-inhibitor","role": "kind-impl","status": "maybe",  "note": "inhibitOut port — render-only (no new wire props)"},
      {"id": "topology-json", "role": "fixture",   "status": "edit",   "note": "revert join1; add inhibitRight0 + 2 inhibit-in edges"},
      {"id": "topology-view", "role": "fixture",   "status": "edit",   "note": "revert join1 view entry; add inhibitRight0 position"}
    ],
    "arrows": [
      {"from": "node-types",     "to": "spec-ts",       "label": "mirrors PascalCase → lowercase"},
      {"from": "spec-ts",        "to": "node-kinds",    "label": "RNodeKind feeds switch"},
      {"from": "node-kinds",     "to": "new-kind-file", "label": "case delegates to body"},
      {"from": "new-kind-file",  "to": "topology-json", "label": "runtime fires when topology uses it"},
      {"from": "chain-inhibitor","to": "topology-json", "label": "inhibitOut handle sourced from i0/i1"}
    ]
  }
  </metadata>

  <desc>
node-types.ts    — InhibitRightGate schema already exists (ports: left, right in; out out).
spec.ts          — must add 'inhibitrightgate' to RNodeKind union, toRNodeKind switch, NODE_KIND_PORTS.
inhibit-right-gate.tsx — new concept-bounded kind file; contains InhibitRightGateBody.
node-kinds.tsx   — renderKindBody must add case for 'inhibitrightgate'.
ChainInhibitor   — inhibitOut is already a declared output in schema; confirm handle in render only.
topology.json    — revert join1 + its edges; add inhibitRight0 node + 2 inhibit-in wires.
topology.view.json — revert join1 view entry; add inhibitRight0 x/y position.
  </desc>

