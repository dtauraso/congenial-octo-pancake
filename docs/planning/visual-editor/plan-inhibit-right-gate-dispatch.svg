<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "plan-inhibit-right-gate-dispatch",
    "title": "File-level change map for InhibitRightGate landing — with Risk 1 multi-output options",
    "files": [
      {"id": "node-types",     "role": "schema",    "status": "exists", "note": "InhibitRightGate entry present"},
      {"id": "spec-ts",        "role": "spec",      "status": "add",    "note": "extend RNodeKind, toRNodeKind, NODE_KIND_PORTS"},
      {"id": "new-kind-file",  "role": "kind-impl", "status": "create", "note": "inhibit-right-gate.tsx — InhibitRightGateBody"},
      {"id": "node-kinds",     "role": "dispatch",  "status": "add",    "note": "renderKindBody case 'inhibitrightgate'"},
      {"id": "chain-inhibitor","role": "kind-impl", "status": "maybe",  "note": "inhibitOut port — DECISION R1 below"},
      {"id": "topology-json",  "role": "fixture",   "status": "edit",   "note": "revert join1; add inhibitRight0 + 2 inhibit-in edges"},
      {"id": "topology-view",  "role": "fixture",   "status": "edit",   "note": "revert join1 view entry; add inhibitRight0 position"}
    ],
    "decisions": [
      {"id": "risk1", "text": "KindBodyCtx multi-output structure for ChainInhibitorBody", "options": ["array", "named-map", "second-field"]}
    ]
  }
  </metadata>

  <desc>
node-types.ts         — InhibitRightGate schema already exists (ports: left, right in; out out).
spec.ts               — must add 'inhibitrightgate' to RNodeKind, toRNodeKind, NODE_KIND_PORTS.
inhibit-right-gate.tsx — new concept-bounded kind file; InhibitRightGateBody.
node-kinds.tsx        — renderKindBody add case 'inhibitrightgate'.
ChainInhibitor body   — DECISION R1: how to express second outWireRef for inhibitOut (3 options below).
topology.json         — revert join1; add inhibitRight0 + 2 inhibit-in wires.
topology.view.json    — revert join1 view entry; add inhibitRight0 position.
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }
    .diagram-bg    { fill: #fafafa; }
    .box-exists    { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; }
    .box-add       { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2; }
    .box-create    { fill: #fce4ec; stroke: #880e4f; stroke-width: 2; }
    .box-edit      { fill: #fff8e1; stroke: #f57f17; stroke-width: 2; }
    .box-maybe     { fill: #f3e5f5; stroke: #7b1fa2; stroke-width: 1.5; stroke-dasharray: 5 3; }
    .box-label     { font-size: 12px; text-anchor: middle; }
    .box-sublabel  { font-size: 10px; text-anchor: middle; }
    .edge-flow     { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrow-gray); }
    .edge-label    { font-size: 10px; text-anchor: middle; fill: #555; }
    .title-text    { font-size: 14px; font-weight: 600; fill: #222; text-anchor: middle; }

    /* ── DECISION badge ── */
    .decision-bg          { fill: #fff3cd; stroke: #b45309; stroke-width: 1.5; }
    .decision-badge       { fill: #b45309; }
    .decision-badge-text  { font-size: 9px; font-weight: 700; fill: #fff; text-anchor: middle; }
    .decision-section-hdr { font-size: 11px; font-weight: 600; fill: #7c3a00; text-anchor: start; }
    .decision-body        { font-size: 10px; fill: #7c3a00; text-anchor: start; }

    /* ── Option boxes inside the decision zone ── */
    .option-box   { fill: #fffbf0; stroke: #b45309; stroke-width: 1; stroke-dasharray: 4 3; }
    .option-label { font-size: 10px; font-weight: 600; fill: #7c3a00; text-anchor: middle; }
    .option-code  { font-size: 9px;  fill: #5a3e00; text-anchor: start; font-family: "ui-monospace, monospace"; }
    .option-lean  { font-size: 9px;  fill: #888;    text-anchor: middle; font-style: italic; }

    /* Legend */
    .legend-text { font-size: 10px; fill: #333; }
  </style>

