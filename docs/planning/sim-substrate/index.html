<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>sim-substrate sketches</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font: 14px/1.4 system-ui, sans-serif; background: #fafafa; color: #222; }
  header { padding: 12px 24px 0; }
  header h1 { font-size: 16px; margin: 0 0 4px; }
  header p { margin: 0 0 8px; color: #666; max-width: 760px; font-size: 13px; }
  nav.tabs { display: flex; gap: 0; padding: 0 24px; border-bottom: 1px solid #ccc; flex-wrap: wrap; }
  nav.tabs button {
    font: inherit; padding: 8px 14px; cursor: pointer;
    background: transparent; border: 1px solid transparent; border-bottom: none;
    border-radius: 4px 4px 0 0; margin-bottom: -1px; color: #555;
  }
  nav.tabs button.active { background: #fff; border-color: #ccc; color: #222; font-weight: 600; }
  nav.tabs button:hover:not(.active) { background: #eee; }
  .frame-wrap { height: calc(100vh - 110px); background: #fff; border-top: 1px solid #ddd; }
  iframe { width: 100%; height: 100%; border: 0; display: block; background: #fafafa; }
</style>
</head>
<body>
<header>
  <h1>sim-substrate sketches</h1>
  <p>Visible-state sketches for the chan primitive: a snapshot view and a motion view.</p>
</header>
<nav class="tabs" id="tabs"></nav>
<div class="frame-wrap"><iframe id="frame" src="chan-anim.html"></iframe></div>

<script>
const TABS = [
  { id: 'chan-anim', label: 'Chan' },
  { id: 'chan-wire', label: 'Chan (wire)' },
];

const tabsEl = document.getElementById('tabs');
const frame = document.getElementById('frame');

function selectTab(id, push) {
  for (const btn of tabsEl.children) btn.classList.toggle('active', btn.dataset.id === id);
  frame.src = id + '.html';
  if (push) history.replaceState(null, '', '#' + id);
}

for (const t of TABS) {
  const btn = document.createElement('button');
  btn.textContent = t.label;
  btn.dataset.id = t.id;
  btn.addEventListener('click', () => selectTab(t.id, true));
  tabsEl.appendChild(btn);
}

const initial = (location.hash || '#chan-anim').slice(1);
selectTab(TABS.some(t => t.id === initial) ? initial : 'chan-anim', false);
</script>
</body>
</html>
