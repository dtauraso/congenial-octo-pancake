<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>wirefold webview test harness</title>
  <link rel="stylesheet" href="../out/webview.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
    .toolbar { display: none; }
    #app { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
  </style>
</head>
<body>
  <!--
    Test-only HTML shell for the webview bundle.

    The real vscode host posts {type:'load', text} after receiving 'ready'
    from the webview. This stub does the same thing, sourcing the spec from
    window.__wirefold_fixture (set via page.addInitScript before navigation).

    Tradeoff vs. @vscode/test-electron: gives up host-side save round-trip
    fidelity (no real workspaceEdit, no real sidecar), but the spec mutation
    that gestures cause is observable in __wirefold_test.getSpec(), and the
    save attempt is observable in __wirefold_sent. The host-side path is
    already covered by Tier 1 round-trip tests.
  -->
  <div class="toolbar">
    <span id="status" class="clean">saved</span>
    <span id="topogen-status" class="topogen-ok"></span>
    <button id="run-btn" class="run-btn">▶ run</button>
    <span id="run-status" class="run-idle"></span>
  </div>
  <div id="app"></div>
  <script>
    window.__wirefold_sent = [];
    window.acquireVsCodeApi = function () {
      return {
        postMessage(msg) {
          window.__wirefold_sent.push(msg);
          if (msg && msg.type === "ready") {
            window.postMessage(
              { type: "load", text: window.__wirefold_fixture },
              "*",
            );
            window.postMessage({ type: "view-load", text: undefined }, "*");
          }
        },
        setState() {},
        getState() { return undefined; },
      };
    };
  </script>
  <script src="../out/webview.js"></script>
</body>
</html>
